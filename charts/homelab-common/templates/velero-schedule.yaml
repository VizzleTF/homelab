{{- $hc := index .Values "homelab-common" | default dict }}
{{- $schedules := $hc.veleroSchedules | default list }}
{{- $defaults := $hc.veleroScheduleDefaults | default dict }}
{{- range $schedules }}
{{- $s := . }}
{{- /* Deep-merge defaults с user template. mergeOverwrite мутирует первый аргумент — копируем defaults через deepCopy. */ -}}
{{- $tmpl := mergeOverwrite (deepCopy $defaults) (default dict $s.template) }}
{{- /* includedNamespaces по умолчанию [.Release.Namespace] если user не задал. */ -}}
{{- if not $tmpl.includedNamespaces }}
{{- $_ := set $tmpl "includedNamespaces" (list $.Release.Namespace) }}
{{- end }}
---
# Velero Schedule cluster-scoped по интенту (live в namespace velero),
# но owned by app's ArgoCD Application — backup config per-app живёт
# вместе с values приложения. Defaults — homelab-common.veleroScheduleDefaults.
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: {{ $s.name }}
  namespace: velero
  {{- with $s.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  schedule: {{ $s.schedule | quote }}
  {{- if hasKey $s "paused" }}
  paused: {{ $s.paused }}
  {{- end }}
  {{- if hasKey $s "useOwnerReferencesInBackup" }}
  useOwnerReferencesInBackup: {{ $s.useOwnerReferencesInBackup }}
  {{- end }}
  template:
    {{- toYaml $tmpl | nindent 4 }}
{{- end }}
