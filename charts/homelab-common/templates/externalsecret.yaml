{{- $hc := index .Values "homelab-common" | default dict }}
{{- $g := .Values.global | default dict }}
{{- $vault := $g.vault | default dict }}
{{- $vs := $vault.secretStore | default "vault-backend-cluster" }}
{{- $vsk := $vault.secretStoreKind | default "ClusterSecretStore" }}
{{- $vr := $vault.refreshInterval | default "1h" }}
{{- $vp := $vault.pathPrefix | default "homelab/k8s" }}
{{- $secrets := $hc.externalSecrets | default list }}
{{- range $secrets }}
{{- $secret := . }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .name }}
  namespace: {{ .namespace | default $.Release.Namespace }}
spec:
  refreshInterval: {{ .refreshInterval | default $vr }}
  secretStoreRef:
    name: {{ $vs }}
    kind: {{ $vsk }}
  target:
    name: {{ .targetName | default .name }}
    creationPolicy: Owner
    {{- if .deletionPolicy }}
    deletionPolicy: {{ .deletionPolicy }}
    {{- end }}
    {{- if or .templateData .templateEngineVersion .templateMetadata }}
    template:
      type: {{ .templateType | default "Opaque" }}
      {{- if .templateEngineVersion }}
      engineVersion: {{ .templateEngineVersion }}
      {{- end }}
      {{- if .templateMetadata }}
      metadata:
        {{- toYaml .templateMetadata | nindent 8 }}
      {{- end }}
      {{- if .templateData }}
      data:
        {{- range $key, $value := .templateData }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
  data:
  {{- range .data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        {{- if .vaultPath }}
        key: {{ printf "%s/%s" $vp .vaultPath }}
        {{- else if $secret.vaultPath }}
        key: {{ printf "%s/%s" $vp $secret.vaultPath }}
        {{- else }}
        key: {{ printf "%s/%s/%s" $vp $.Release.Namespace .secretKey }}
        {{- end }}
        property: {{ .property }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
  {{- end }}
{{- end }}
