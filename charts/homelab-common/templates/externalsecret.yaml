{{- $hc := index .Values "homelab-common" | default dict }}
{{- $secrets := $hc.externalSecrets | default list }}
{{- range $secrets }}
{{- $secret := . }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .name }}
  namespace: {{ .namespace | default $.Release.Namespace }}
spec:
  refreshInterval: {{ .refreshInterval | default "1h" }}
  secretStoreRef:
    name: vault-backend-cluster
    kind: ClusterSecretStore
  target:
    name: {{ .targetName | default .name }}
    creationPolicy: Owner
    {{- if .deletionPolicy }}
    deletionPolicy: {{ .deletionPolicy }}
    {{- end }}
    {{- if or .templateData .templateEngineVersion .templateMetadata }}
    template:
      type: {{ .templateType | default "Opaque" }}
      {{- if .templateEngineVersion }}
      engineVersion: {{ .templateEngineVersion }}
      {{- end }}
      {{- if .templateMetadata }}
      metadata:
        {{- toYaml .templateMetadata | nindent 8 }}
      {{- end }}
      {{- if .templateData }}
      data:
        {{- range $key, $value := .templateData }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
  data:
  {{- range .data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        {{- if .vaultPath }}
        key: homelab/k8s/{{ .vaultPath }}
        {{- else if $secret.vaultPath }}
        key: homelab/k8s/{{ $secret.vaultPath }}
        {{- else }}
        key: homelab/k8s/{{ $.Release.Namespace }}/{{ .secretKey }}
        {{- end }}
        property: {{ .property }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
  {{- end }}
{{- end }}
