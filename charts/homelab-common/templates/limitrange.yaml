{{- $hc := index .Values "homelab-common" | default dict }}
{{- $lr := $hc.limitRange }}
{{- if $lr }}
{{- if $lr.enabled }}
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: {{ $.Release.Namespace }}
spec:
  limits:
    - type: Container
      default:
        cpu: {{ $lr.defaults.cpu | default "500m" }}
        memory: {{ $lr.defaults.memory | default "512Mi" }}
      defaultRequest:
        cpu: {{ $lr.defaultRequests.cpu | default "50m" }}
        memory: {{ $lr.defaultRequests.memory | default "64Mi" }}
{{- end }}
{{- end }}
