{{- $hc := index .Values "homelab-common" | default dict }}
{{- $lr := $hc.limitRange }}
{{- if $lr }}
{{- if $lr.enabled }}
{{- $def := $lr.defaults | default dict }}
{{- $defReq := $lr.defaultRequests | default dict }}
---
apiVersion: v1
kind: LimitRange
metadata:
  name: {{ $lr.name | default "default-limits" }}
  namespace: {{ $.Release.Namespace }}
spec:
  limits:
    - type: Container
      default:
        cpu: {{ $def.cpu | default "500m" }}
        memory: {{ $def.memory | default "512Mi" }}
      defaultRequest:
        cpu: {{ $defReq.cpu | default "50m" }}
        memory: {{ $defReq.memory | default "64Mi" }}
{{- end }}
{{- end }}
