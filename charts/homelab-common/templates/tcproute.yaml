{{- $hc := index .Values "homelab-common" | default dict }}
{{- $g := .Values.global | default dict }}
{{- $gwInt := $g.gateway | default dict | dig "internal" dict }}
{{- $gwIntName := $gwInt.name | default "cilium-gateway-internal" }}
{{- $gwIntNs := $gwInt.namespace | default "kube-system" }}
{{- $routes := $hc.tcpRoutes | default list }}
{{- range $routes }}
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .gatewayName | default $gwIntName }}
      namespace: {{ .gatewayNamespace | default $gwIntNs }}
      sectionName: {{ .sectionName | default "ssh" }}
  rules:
    - backendRefs:
        - name: {{ .service.name }}
          port: {{ .service.port | int }}
{{- end }}
