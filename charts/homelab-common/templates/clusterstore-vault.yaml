{{- $hc := index .Values "homelab-common" | default dict }}
{{- $css := $hc.clusterSecretStore }}
{{- if and $css $css.enabled }}
{{- $v := $css.vault | default dict }}
{{- $kube := ($v.auth | default dict).kubernetes | default dict }}
{{- $sar := $kube.serviceAccountRef | default dict }}
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ $css.name | default "vault-backend-cluster" }}
spec:
  provider:
    vault:
      server: {{ $v.server | default "http://vault.vault.svc.cluster.local:8200" | quote }}
      path: {{ $v.path | default "home" | quote }}
      version: {{ $v.version | default "v2" | quote }}
      auth:
        kubernetes:
          mountPath: {{ $kube.mountPath | default "kubernetes" | quote }}
          role: {{ $kube.role | default "homelab-universal" | quote }}
          serviceAccountRef:
            name: {{ $sar.name | default "vault-auth" }}
            namespace: {{ $sar.namespace | default "vault" }}
{{- end }}
