{{- $hc := index .Values "homelab-common" | default dict }}
{{- $css := $hc.clusterSecretStore }}
{{- if and $css $css.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ $css.name | default "vault-backend-cluster" }}
spec:
  provider:
    vault:
      server: {{ $css.vault.server | default "http://vault.vault.svc.cluster.local:8200" | quote }}
      path: {{ $css.vault.path | default "home" | quote }}
      version: {{ $css.vault.version | default "v2" | quote }}
      auth:
        kubernetes:
          mountPath: {{ $css.vault.auth.kubernetes.mountPath | default "kubernetes" | quote }}
          role: {{ $css.vault.auth.kubernetes.role | default "homelab-universal" | quote }}
          serviceAccountRef:
            name: {{ $css.vault.auth.kubernetes.serviceAccountRef.name | default "vault-auth" }}
            namespace: {{ $css.vault.auth.kubernetes.serviceAccountRef.namespace | default "vault" }}
{{- end }}
