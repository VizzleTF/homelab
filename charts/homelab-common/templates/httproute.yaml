{{- $hc := index .Values "homelab-common" | default dict }}
{{- $routes := $hc.httpRoutes | default list }}
{{- range $routes }}
{{- $gateway := .gateway | default "external" }}
{{- $hostname := .hostname }}
{{- if not (contains "." $hostname) }}
{{- $hostname = printf "%s.vaka.work" $hostname }}
{{- end }}

{{- if or (eq $gateway "external") (eq $gateway "both") }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}{{ if eq $gateway "both" }}-external{{ end }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
    external-dns.alpha.kubernetes.io/hostname: {{ $hostname }}
    external-dns.alpha.kubernetes.io/cloudflare-proxied: {{ .cloudflareProxied | default "true" | quote }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cilium-gateway
      namespace: kube-system
  hostnames:
    - {{ $hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .service.name }}
          port: {{ .service.port }}
{{- end }}

{{- if or (eq $gateway "internal") (eq $gateway "both") }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}{{ if eq $gateway "both" }}-internal{{ end }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
    external-dns.alpha.kubernetes.io/hostname: {{ $hostname }}
    external-dns.alpha.kubernetes.io/internal-dns: "true"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cilium-gateway-internal
      namespace: kube-system
  hostnames:
    - {{ $hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .service.name }}
          port: {{ .service.port }}
{{- end }}

{{- end }}
