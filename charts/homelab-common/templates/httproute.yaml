{{- $hc := index .Values "homelab-common" | default dict }}
{{- $g := .Values.global | default dict }}
{{- $gwExt := $g.gateway | default dict | dig "external" dict }}
{{- $gwInt := $g.gateway | default dict | dig "internal" dict }}
{{- $gwExtName := $gwExt.name | default "cilium-gateway" }}
{{- $gwExtNs := $gwExt.namespace | default "kube-system" }}
{{- $gwIntName := $gwInt.name | default "cilium-gateway-internal" }}
{{- $gwIntNs := $gwInt.namespace | default "kube-system" }}
{{- $domain := $g.dns | default dict | dig "domain" "vaka.work" }}
{{- $internalTarget := $g.gateway | default dict | dig "internal" dict | dig "ip" "10.11.11.138" }}
{{- $routes := $hc.httpRoutes | default list }}
{{- range $routes }}
{{- $gateway := .gateway | default "external" }}
{{- $hostname := .hostname }}
{{- if not (contains "." $hostname) }}
{{- $hostname = printf "%s.%s" $hostname $domain }}
{{- end }}

{{- if or (eq $gateway "external") (eq $gateway "both") }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}{{ if eq $gateway "both" }}-external{{ end }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
    external-dns.alpha.kubernetes.io/hostname: {{ $hostname }}
    external-dns.alpha.kubernetes.io/cloudflare-proxied: {{ .cloudflareProxied | default "true" | quote }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gwExtName }}
      namespace: {{ $gwExtNs }}
  hostnames:
    - {{ $hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .service.name }}
          port: {{ .service.port }}
{{- end }}

{{- if or (eq $gateway "internal") (eq $gateway "both") }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}{{ if eq $gateway "both" }}-internal{{ end }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
    external-dns.alpha.kubernetes.io/hostname: {{ $hostname }}
    external-dns.alpha.kubernetes.io/target: {{ $internalTarget | quote }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gwIntName }}
      namespace: {{ $gwIntNs }}
  hostnames:
    - {{ $hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .service.name }}
          port: {{ .service.port }}
{{- end }}

{{- end }}
