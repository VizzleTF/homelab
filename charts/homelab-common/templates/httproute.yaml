{{- $hc := index .Values "homelab-common" | default dict }}
{{- $g := .Values.global | default dict }}
{{- $gwExt := $g.gateway | default dict | dig "external" dict }}
{{- $gwInt := $g.gateway | default dict | dig "internal" dict }}
{{- $gwExtName := $gwExt.name | default "cilium-gateway" }}
{{- $gwExtNs := $gwExt.namespace | default "kube-system" }}
{{- $gwIntName := $gwInt.name | default "cilium-gateway-internal" }}
{{- $gwIntNs := $gwInt.namespace | default "kube-system" }}
{{- $domain := $g.dns | default dict | dig "domain" "example.com" }}
{{- $internalTarget := $g.gateway | default dict | dig "internal" dict | dig "ip" "10.11.11.138" }}
{{- $routes := $hc.httpRoutes | default list }}
{{- range $routes }}
{{- $gateway := .gateway | default "external" }}
{{- $hostname := .hostname }}
{{- if not (contains "." $hostname) }}
{{- $hostname = printf "%s.%s" $hostname $domain }}
{{- end }}

{{/* kedaColdStartLoadingPage: shortcut that routes via the keda-loading-proxy
     nginx front-door instead of the bare interceptor. Renders a Russian
     "service is starting" loading page during scale-from-zero.
     See argocd/manifests/infrastructure/keda-add-ons-http/loading-proxy-*.yaml */}}
{{- $svc := .service | default dict }}
{{- $svcName := $svc.name }}
{{- $svcNs   := $svc.namespace }}
{{- $svcPort := $svc.port }}
{{- if .kedaColdStartLoadingPage }}
{{- $svcName = "keda-loading-proxy" }}
{{- $svcNs   = "keda" }}
{{- $svcPort = 8080 }}
{{- end }}

{{- if or (eq $gateway "external") (eq $gateway "both") }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}{{ if eq $gateway "both" }}-external{{ end }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
    external-dns.alpha.kubernetes.io/hostname: {{ $hostname }}
    external-dns.alpha.kubernetes.io/cloudflare-proxied: {{ .cloudflareProxied | default "true" | quote }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gwExtName }}
      namespace: {{ $gwExtNs }}
  hostnames:
    - {{ $hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .pathPrefix | default "/" }}
      {{- if .filters }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ $svcName }}
          {{- if $svcNs }}
          namespace: {{ $svcNs }}
          {{- end }}
          port: {{ $svcPort }}
{{- end }}

{{- if or (eq $gateway "internal") (eq $gateway "both") }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}{{ if eq $gateway "both" }}-internal{{ end }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
    external-dns.alpha.kubernetes.io/hostname: {{ $hostname }}
    external-dns.alpha.kubernetes.io/target: {{ $internalTarget | quote }}
    external-dns.alpha.kubernetes.io/internal-dns: "true"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gwIntName }}
      namespace: {{ $gwIntNs }}
  hostnames:
    - {{ $hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .pathPrefix | default "/" }}
      {{- if .filters }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ $svcName }}
          {{- if $svcNs }}
          namespace: {{ $svcNs }}
          {{- end }}
          port: {{ $svcPort }}
{{- end }}

{{- end }}
