{{- $hc := index .Values "homelab-common" | default dict }}
{{- $apps := $hc.apps | default list }}
{{- range $apps }}
{{- if (.enabled | default true) }}
{{- $ctx := dict "app" . "root" $ }}
{{- $fullname := include "homelab-common.app.fullname" $ctx }}
{{- $root := $ }}
{{- with .secret }}
{{- $meta := merge (dict "name" $fullname) (.metadata | default dict) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $meta.name }}
  namespace: {{ $meta.namespace | default $root.Release.Namespace }}
  {{- with $meta.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $meta.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: {{ .type | default "Opaque" }}
{{- with .stringData }}
stringData:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- with .data }}
data:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
