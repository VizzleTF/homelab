{{- $hc := index .Values "homelab-common" | default dict }}
{{- $jobs := $hc.cronJobs | default list }}
{{- range $jobs }}
{{- if (.enabled | default true) }}
{{- $ctx := dict "app" . "root" $ }}
{{- $fullname := include "homelab-common.app.fullname" $ctx }}
{{- $root := $ }}
{{- $meta := merge (dict "name" $fullname) (.metadata | default dict) }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $meta.name }}
  namespace: {{ $meta.namespace | default $root.Release.Namespace }}
  {{- with $meta.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $meta.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- toYaml .spec | nindent 2 }}
{{- end }}
{{- end }}
