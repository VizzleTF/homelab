{{- $hc := index .Values "homelab-common" | default dict }}
{{- $jobs := $hc.backupCronJobs | default list }}
{{- $nfs := (.Values.global).backup | default dict | dig "nfs" dict }}
{{- $webdav := (.Values.global).backup | default dict | dig "webdav" dict }}
{{- $rcloneImage := (.Values.global).backup | default dict | dig "rcloneImage" "rclone/rclone:1.69" }}
{{- range $jobs }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
spec:
  schedule: {{ .schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ .failedJobsHistoryLimit | default 3 }}
  jobTemplate:
    spec:
      backoffLimit: {{ .backoffLimit | default 2 }}
      template:
        spec:
          restartPolicy: OnFailure
          {{- if eq .type "rsync" }}
          containers:
            - name: sync
              image: instrumentisto/rsync-ssh
              {{- if .command }}
              command:
{{- toYaml .command | nindent 16 }}
              {{- else }}
              command: ["rsync", "-avz", "--no-owner", "--no-group", "--no-times", "--delete", "/source/", "/destination/"]
              {{- end }}
              {{- if .securityContext }}
              securityContext:
                {{- toYaml .securityContext | nindent 16 }}
              {{- end }}
              volumeMounts:
                - name: source-volume
                  mountPath: /source
                  {{- if .source.subPath }}
                  subPath: {{ .source.subPath }}
                  {{- end }}
                - name: dest-volume
                  mountPath: /destination
              resources:
{{- if .resources }}
{{- toYaml .resources | nindent 16 }}
{{- else }}
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
{{- end }}
          volumes:
            - name: source-volume
              persistentVolumeClaim:
                claimName: {{ .source.pvc }}
            - name: dest-volume
              nfs:
                server: {{ $nfs.server }}
                path: {{ printf "%s%s" $nfs.basePath .destination.path }}
          {{- else if eq .type "rclone" }}
          {{- $remoteName := .destination.remote | splitList ":" | first | upper }}
          containers:
            - name: rclone
              image: {{ $rcloneImage }}
              {{- if .securityContext }}
              securityContext:
                {{- toYaml .securityContext | nindent 16 }}
              {{- end }}
              args:
                - sync
                - /source
                - {{ .destination.remote }}
                {{- range .rcloneArgs }}
                - {{ . | quote }}
                {{- end }}
              env:
                - name: RCLONE_CONFIG_{{ $remoteName }}_TYPE
                  value: "webdav"
                - name: RCLONE_CONFIG_{{ $remoteName }}_URL
                  value: {{ $webdav.url | quote }}
                - name: RCLONE_CONFIG_{{ $remoteName }}_USER
                  value: {{ $webdav.user | quote }}
                - name: RCLONE_CONFIG_{{ $remoteName }}_VENDOR
                  value: {{ $webdav.vendor | quote }}
                - name: RCLONE_CONFIG_{{ $remoteName }}_PASS
                  valueFrom:
                    secretKeyRef:
                      name: {{ .destination.secretName }}
                      key: RCLONE_CONFIG_{{ $remoteName }}_PASS
              volumeMounts:
                - name: source-volume
                  mountPath: /source
                  readOnly: true
                  {{- if .source.subPath }}
                  subPath: {{ .source.subPath }}
                  {{- end }}
              resources:
{{- if .resources }}
{{- toYaml .resources | nindent 16 }}
{{- else }}
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
{{- end }}
          volumes:
            - name: source-volume
              persistentVolumeClaim:
                claimName: {{ .source.pvc }}
          {{- end }}
{{- end }}
