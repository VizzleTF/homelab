{{- $hc := index .Values "homelab-common" | default dict }}
{{- $workloads := $hc.workloads | default list }}
{{- range $workloads }}
{{- if (.enabled | default true) }}
{{- $ctx := dict "workload" . "root" $ }}
{{- if eq .profile "may" }}
{{ include "homelab-common.workload.may.render" $ctx }}
{{- else if eq .profile "rss-to-telegram-bot" }}
{{ include "homelab-common.workload.rssToTelegram.render" $ctx }}
{{- end }}
{{- end }}
{{- end }}
