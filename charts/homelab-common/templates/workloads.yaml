{{- $hc := index .Values "homelab-common" | default dict }}
{{- $workloads := $hc.workloads | default list }}
{{- range $workloads }}
{{- if (.enabled | default true) }}
{{- if eq .profile "may" }}
{{- $ctx := dict "workload" . "root" $ }}
{{- $fullname := include "homelab-common.workload.fullname" $ctx }}
{{- $strat := .strategy | default dict }}
{{- $svc := .service | default dict }}
{{- $sr := .secretRef | default dict }}
{{- $p := .persistence | default dict }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    app: {{ .name }}
spec:
  replicas: {{ .replicaCount | default 1 }}
  strategy:
    type: {{ $strat.type | default "Recreate" }}
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      {{- with .podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .name }}
          image: "{{ .image.repository }}:{{ .image.tag }}"
          imagePullPolicy: {{ .image.pullPolicy | default "IfNotPresent" }}
          {{- with .securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ $sr.name }}
          {{- if $p.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ $p.mountPath }}
          {{- end }}
          resources:
            {{- toYaml .resources | nindent 12 }}
      {{- if $p.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $fullname }}
      {{- end }}
{{- if $p.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullname }}
  labels:
    app: {{ .name }}
spec:
  accessModes:
    - {{ $p.accessMode | default "ReadWriteOnce" }}
  storageClassName: {{ $p.storageClass }}
  resources:
    requests:
      storage: {{ $p.size }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}
  labels:
    app: {{ .name }}
spec:
  type: {{ $svc.type | default "ClusterIP" }}
  ports:
    - port: {{ $svc.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ .name }}
{{- else if eq .profile "rss-to-telegram-bot" }}
{{- $ctx := dict "workload" . "root" $ }}
{{- $fullname := include "homelab-common.workload.fullname" $ctx }}
{{- $secretName := .existingSecret | default $fullname }}
{{- $adv := .advancedConfig | default dict }}
{{- $cfg := .config | default dict }}
{{- $hasAdvanced := or $adv.databaseUrl $adv.apiId $adv.tProxy $adv.rProxy $adv.multiuser $adv.cronSecond $adv.errorLoggingChat $adv.debug }}
{{- $hchk := .healthCheck | default dict }}
{{- $st := .strategy | default dict }}
{{- $strategyType := $st.type | default "RollingUpdate" }}
{{- $pers := .persistence | default dict }}
{{- if and (not .existingSecret) $cfg.token }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "homelab-common.workload.rssLabels" $ctx | nindent 4 }}
type: Opaque
stringData:
  TOKEN: {{ $cfg.token | quote }}
  MANAGER: {{ $cfg.manager | quote }}
  {{- if $cfg.telegraphToken }}
  TELEGRAPH_TOKEN: {{ $cfg.telegraphToken | quote }}
  {{- end }}
  {{- if $adv.apiHash }}
  API_HASH: {{ $adv.apiHash | quote }}
  {{- end }}
{{- end }}
{{- if $hasAdvanced }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "homelab-common.workload.rssLabels" $ctx | nindent 4 }}
data:
  {{- if $adv.databaseUrl }}
  DATABASE_URL: {{ $adv.databaseUrl | quote }}
  {{- end }}
  {{- if $adv.apiId }}
  API_ID: {{ $adv.apiId | quote }}
  {{- end }}
  {{- if $adv.tProxy }}
  T_PROXY: {{ $adv.tProxy | quote }}
  {{- end }}
  {{- if $adv.rProxy }}
  R_PROXY: {{ $adv.rProxy | quote }}
  {{- end }}
  {{- if $adv.multiuser }}
  MULTIUSER: {{ $adv.multiuser | quote }}
  {{- end }}
  {{- if $adv.cronSecond }}
  CRON_SECOND: {{ $adv.cronSecond | quote }}
  {{- end }}
  {{- if $adv.errorLoggingChat }}
  ERROR_LOGGING_CHAT: {{ $adv.errorLoggingChat | quote }}
  {{- end }}
  {{- if $adv.debug }}
  DEBUG: {{ $adv.debug | quote }}
  {{- end }}
{{- end }}
{{- if and $pers.enabled (not $pers.existingClaim) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "homelab-common.workload.rssLabels" $ctx | nindent 4 }}
spec:
  accessModes:
    - {{ $pers.accessMode | default "ReadWriteOnce" }}
  {{- if $pers.storageClass }}
  storageClassName: {{ $pers.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ $pers.size }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
  labels:
    {{- include "homelab-common.workload.rssLabels" $ctx | nindent 4 }}
spec:
  replicas: {{ .replicaCount | default 1 }}
  strategy:
    type: {{ $strategyType }}
    {{- if and (eq $strategyType "RollingUpdate") $st.rollingUpdate }}
    rollingUpdate:
      {{- toYaml $st.rollingUpdate | nindent 6 }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "homelab-common.workload.rssSelectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "homelab-common.workload.rssSelectorLabels" $ctx | nindent 8 }}
    spec:
      {{- with .imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .name }}
          image: "{{ .image.repository }}:{{ .image.tag }}"
          imagePullPolicy: {{ .image.pullPolicy | default "Always" }}
          {{- with .securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: PORT
              value: "{{ .port | default 8848 }}"
          envFrom:
            - secretRef:
                name: {{ $secretName }}
            {{- if $hasAdvanced }}
            - configMapRef:
                name: {{ $fullname }}
            {{- end }}
          {{- if $hchk.enabled }}
          livenessProbe:
            tcpSocket:
              port: {{ .port | default 8848 }}
            initialDelaySeconds: {{ $hchk.initialDelaySeconds | default 60 }}
            periodSeconds: {{ $hchk.periodSeconds | default 30 }}
            timeoutSeconds: {{ $hchk.timeoutSeconds | default 10 }}
            failureThreshold: {{ $hchk.failureThreshold | default 3 }}
          readinessProbe:
            tcpSocket:
              port: {{ .port | default 8848 }}
            initialDelaySeconds: {{ $hchk.initialDelaySeconds | default 60 }}
            periodSeconds: {{ $hchk.periodSeconds | default 30 }}
            timeoutSeconds: {{ $hchk.timeoutSeconds | default 10 }}
            failureThreshold: {{ $hchk.failureThreshold | default 3 }}
          {{- end }}
          {{- if $pers.enabled }}
          volumeMounts:
            - name: data
              mountPath: /app/config
          {{- end }}
          resources:
            {{- toYaml .resources | nindent 12 }}
      {{- if $pers.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $pers.existingClaim | default $fullname }}
      {{- end }}
      {{- with .nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
