{{- $hc := index .Values "homelab-common" | default dict }}
{{- $rbacRaw := $hc.rbac }}
{{- if $rbacRaw }}
{{- $rbacList := list }}
{{- if kindIs "slice" $rbacRaw }}
{{- $rbacList = $rbacRaw }}
{{- else }}
{{- $rbacList = list $rbacRaw }}
{{- end }}
{{- range $rbac := $rbacList }}

{{- if $rbac.serviceAccount }}
{{- if $rbac.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $rbac.serviceAccount.name | default $.Release.Name }}
  namespace: {{ $.Release.Namespace }}
  {{- with $rbac.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if hasKey $rbac.serviceAccount "automountServiceAccountToken" }}
automountServiceAccountToken: {{ $rbac.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- end }}
{{- end }}

{{- if $rbac.clusterRole }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $rbac.clusterRole.name }}
rules:
  {{- toYaml $rbac.clusterRole.rules | nindent 2 }}
{{- end }}

{{- if and $rbac.clusterRole $rbac.serviceAccount }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ dig "clusterRoleBinding" "name" $rbac.clusterRole.name $rbac }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $rbac.clusterRole.name }}
subjects:
  - kind: ServiceAccount
    name: {{ $rbac.serviceAccount.name | default $.Release.Name }}
    namespace: {{ $.Release.Namespace }}
{{- end }}

{{- end }}
{{- end }}
