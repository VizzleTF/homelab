# Default values for homelab-common (shared Helm chart).
# Секреты и среда (NFS/WebDAV/NIC) задаются в private values, см. values/shared/global.yaml.

# Global defaults that can be overridden
global:
  # Vault configuration
  vault:
    secretStore: openbao-backend-cluster
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    pathPrefix: homelab/k8s

  # Gateway configuration
  gateway:
    external:
      name: cilium-gateway
      namespace: kube-system
    internal:
      name: cilium-gateway-internal
      namespace: kube-system
      ip: "10.11.11.138"

  # DNS configuration
  dns:
    domain: example.com
    cloudflareProxied: "true"

  # Backup: без реальных хостов в публичном репозитории — задайте в private global или в values релиза
  backup:
    rcloneImage: rclone/rclone:1.74
    rcloneDefaultArgs:
      - --verbose
    webdav:
      url: ""
      user: ""
      vendor: "other"
      vaultPath: ""
    nfs:
      server: ""
      basePath: ""

homelab-common:
  # ExternalSecrets to create
  externalSecrets: []
  # Example:
  # - name: app-secrets
  #   vaultPath: myapp/app-secrets  # Will be prefixed with global.vault.pathPrefix
  #   data:
  #     - secretKey: password
  #       property: password
  #   templateData:
  #     PASSWORD: "{{ .password }}"

  # HTTPRoutes to create
  httpRoutes: []
  # Example:
  # - name: myapp
  #   hostname: myapp  # Will be suffixed with global.dns.domain
  #   gateway: external  # or "internal" or "both"
  #   service:
  #     name: myapp
  #     port: 8080
  #   cloudflareProxied: "true"  # Optional, defaults to global.dns.cloudflareProxied
  #
  # Shortcut for KEDA HTTP scale-to-zero apps — routes via keda-loading-proxy
  # in ns keda (renders a Russian "service is starting" page during cold-start).
  # Backend service.{name,namespace,port} are auto-filled, so you can omit the
  # service block entirely:
  # - name: myapp
  #   hostname: myapp
  #   gateway: internal
  #   kedaColdStartLoadingPage: true

  # CronJobs for backups
  backupCronJobs: []
  # Example:
  # - name: backup-myapp
  #   schedule: "0 2 * * *"
  #   type: rsync  # or "rclone"
  #   source:
  #     pvc: myapp-data
  #     subPath: ""  # Optional
  #   destination:
  #     type: nfs  # or "webdav"
  #     path: /myapp  # For NFS: appended to global.backup.nfs.basePath
  #   securityContext:  # Optional
  #     runAsNonRoot: true
  #     runAsUser: 65534

  # RBAC resources (single object or list of objects)
  rbac: null
  # Example (single):
  # rbac:
  #   serviceAccount:
  #     name: myapp
  #     create: true
  #   clusterRole:
  #     name: myapp-readonly
  #     rules:
  #       - apiGroups: [""]
  #         resources: ["pods"]
  #         verbs: ["get", "list"]
  # Example (list):
  # rbac:
  #   - serviceAccount:
  #       name: myapp
  #       create: true
  #     clusterRole:
  #       name: myapp-readonly
  #       rules: [...]

  # LimitRange
  limitRange: null
  # Example:
  # limitRange:
  #   enabled: true
  #   defaults:
  #     cpu: 500m
  #     memory: 512Mi
  #   defaultRequests:
  #     cpu: 50m
  #     memory: 64Mi

  # CNPG Database
  cnpgDatabase: null
  # Example:
  # cnpgDatabase:
  #   name: myapp
  #   owner: myapp_user
  #   clusterName: cnpg-cluster
  #   extensions: []

  # apps: опционально secret / configMap / deployment / service
  apps: []

  # Generic CronJobs (pass-through spec). Для произвольного образа/команды;
  # backupCronJobs выше — только для rsync/rclone-сценариев.
  cronJobs: []
  # Example:
  # - name: spotify-backup
  #   metadata:
  #     labels:
  #       app: spotify-backup
  #   spec:
  #     schedule: "0 4 * * *"
  #     concurrencyPolicy: Forbid
  #     successfulJobsHistoryLimit: 1
  #     failedJobsHistoryLimit: 3
  #     jobTemplate:
  #       spec:
  #         backoffLimit: 2
  #         template:
  #           spec:
  #             restartPolicy: OnFailure
  #             containers: [...]
  #             volumes: [...]

  # Defaults для veleroSchedules. Любое поле в schedule.template переопределяет
  # одноимённое поле здесь (deep-merge через mergeOverwrite).
  # Velero Schedule.spec.template — это шаблон Backup'а, поля поддерживает
  # всё что и Backup CR.
  veleroScheduleDefaults:
    ttl: "720h0m0s"                  # 30 days
    storageLocation: garage-default
    snapshotMoveData: true
    csiSnapshotTimeout: "15m"
    itemOperationTimeout: "4h0m0s"
    defaultVolumesToFsBackup: false

  # Velero Schedule CR'ы. Per-app config, рендерится в namespace velero.
  veleroSchedules: []
  # Example:
  # - name: myapp-daily
  #   schedule: "30 2 * * *"
  #   template:
  #     # includedNamespaces по умолчанию [.Release.Namespace]
  #     hooks:
  #       resources:
  #         - name: sync
  #           includedResources: [pods]
  #           labelSelector: { matchLabels: { app.kubernetes.io/name: myapp } }
  #           pre:
  #             - exec:
  #                 command: ["/bin/sh", "-c", "sync"]
  #                 onError: Continue
  #                 timeout: 30s

  # PVC definitions
  persistentVolumeClaims: []

  # Authentik Blueprints (ConfigMaps for declarative OIDC providers)
  authentikBlueprints: []
  # Example:
  # - name: authentik-blueprint-myapp
  #   namespace: authentik
  #   enabled: true
  #   blueprints:
  #     myapp-oidc.yaml: |
  #       version: 1
  #       metadata:
  #         name: MyApp OIDC Integration
  #       entries:
  #         - model: authentik_providers_oauth2.oauth2provider
  #           id: myapp-provider
  #           identifiers:
  #             name: MyApp OIDC
  #           attrs:
  #             name: MyApp OIDC
  #             client_type: confidential
  #             client_id: myapp
  #             authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
  #             redirect_uris: https://myapp.example.com/oauth/callback
  #             signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
  #         - model: authentik_core.application
  #           id: myapp-app
  #           identifiers:
  #             slug: myapp
  #           attrs:
  #             name: MyApp
  #             slug: myapp
  #             provider: !KeyOf myapp-provider
  #             launch_url: https://myapp.example.com
