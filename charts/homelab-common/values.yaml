# Default values for homelab-common (shared Helm chart).
# Секреты и среда (NFS/WebDAV/NIC) задаются в private values, см. values/shared/global.yaml.

# Global defaults that can be overridden
global:
  # Vault configuration
  vault:
    secretStore: vault-backend-cluster
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    pathPrefix: homelab/k8s

  # Gateway configuration
  gateway:
    external:
      name: cilium-gateway
      namespace: kube-system
    internal:
      name: cilium-gateway-internal
      namespace: kube-system
      ip: "10.11.11.138"

  # DNS configuration
  dns:
    domain: vaka.work
    cloudflareProxied: "true"

  # Backup: без реальных хостов в публичном репозитории — задайте в private global или в values релиза
  backup:
    rcloneImage: rclone/rclone:1.69
    webdav:
      url: ""
      user: ""
      vendor: "other"
      vaultPath: ""
    nfs:
      server: ""
      basePath: ""

homelab-common:
  # ExternalSecrets to create
  externalSecrets: []
  # Example:
  # - name: app-secrets
  #   vaultPath: myapp/app-secrets  # Will be prefixed with global.vault.pathPrefix
  #   data:
  #     - secretKey: password
  #       property: password
  #   templateData:
  #     PASSWORD: "{{ .password }}"

  # HTTPRoutes to create
  httpRoutes: []
  # Example:
  # - name: myapp
  #   hostname: myapp  # Will be suffixed with global.dns.domain
  #   gateway: external  # or "internal" or "both"
  #   service:
  #     name: myapp
  #     port: 8080
  #   cloudflareProxied: "true"  # Optional, defaults to global.dns.cloudflareProxied

  # CronJobs for backups
  backupCronJobs: []
  # Example:
  # - name: backup-myapp
  #   schedule: "0 2 * * *"
  #   type: rsync  # or "rclone"
  #   source:
  #     pvc: myapp-data
  #     subPath: ""  # Optional
  #   destination:
  #     type: nfs  # or "webdav"
  #     path: /myapp  # For NFS: appended to global.backup.nfs.basePath
  #   securityContext:  # Optional
  #     runAsNonRoot: true
  #     runAsUser: 65534

  # RBAC resources
  rbac:
    serviceAccount: null
    # Example:
    # serviceAccount:
    #   name: myapp
    #   create: true

    clusterRole: null
    # Example:
    # clusterRole:
    #   name: myapp-readonly
    #   rules:
    #     - apiGroups: [""]
    #       resources: ["pods"]
    #       verbs: ["get", "list"]

  # CiliumNetworkPolicy
  networkPolicy: null
  # Example:
  # networkPolicy:
  #   enabled: true
  #   appLabel: myapp  # Matches app.kubernetes.io/name
  #   appPort: "8080"
  #   allowIngress: true   # From Cilium gateway (ingress entity)
  #   allowDNS: true       # Egress to kube-dns on port 53 UDP+TCP
  #   allowIntraNamespace: true
  #   allowWorld: true
  #   customIngress: []    # Extra ingress rules (raw Cilium format)
  #   customEgress: []     # Extra egress rules (raw Cilium format)

  # LimitRange
  limitRange: null
  # Example:
  # limitRange:
  #   enabled: true
  #   defaults:
  #     cpu: 500m
  #     memory: 512Mi
  #   defaultRequests:
  #     cpu: 50m
  #     memory: 64Mi

  # CNPG Database
  cnpgDatabase: null
  # Example:
  # cnpgDatabase:
  #   name: myapp
  #   owner: myapp_user
  #   clusterName: cnpg-cluster
  #   extensions: []

  # apps: опционально secret / configMap / deployment / service
  apps: []

  # PVC definitions
  persistentVolumeClaims: []

  # Authentik Blueprints (ConfigMaps for declarative OIDC providers)
  authentikBlueprints: []
  # Example:
  # - name: authentik-blueprint-myapp
  #   namespace: authentik
  #   enabled: true
  #   blueprints:
  #     myapp-oidc.yaml: |
  #       version: 1
  #       metadata:
  #         name: MyApp OIDC Integration
  #       entries:
  #         - model: authentik_providers_oauth2.oauth2provider
  #           id: myapp-provider
  #           identifiers:
  #             name: MyApp OIDC
  #           attrs:
  #             name: MyApp OIDC
  #             client_type: confidential
  #             client_id: myapp
  #             authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
  #             redirect_uris: https://myapp.example.com/oauth/callback
  #             signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
  #         - model: authentik_core.application
  #           id: myapp-app
  #           identifiers:
  #             slug: myapp
  #           attrs:
  #             name: MyApp
  #             slug: myapp
  #             provider: !KeyOf myapp-provider
  #             launch_url: https://myapp.example.com
