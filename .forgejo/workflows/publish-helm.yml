name: Publish Helm chart

on:
  push:
    tags:
      - 'homelab-common-v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Install helm
        run: |
          set -eu
          VERSION=v3.16.4
          curl -fsSL "https://get.helm.sh/helm-${VERSION}-linux-amd64.tar.gz" | tar -xz -C /tmp
          install -m 755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short
      - name: Package
        run: helm package charts/homelab-common -d /tmp/
      # Use Forgejo's Helm Chart Museum API endpoint (POST /api/packages/{owner}/helm/api/charts)
      # so the package appears under "Helm" type in the UI rather than "Container".
      - name: Push to Forgejo Helm registry
        run: |
          set -eu
          PKG=$(ls /tmp/homelab-common-*.tgz | head -1)
          echo "Pushing $PKG"
          curl -sS --fail-with-body \
            -u "${PUBLISHER_USER}:${PUBLISHER_TOKEN}" \
            -X POST \
            --data-binary "@${PKG}" \
            -H 'Content-Type: application/x-tar' \
            https://git.example.com/api/packages/vizzle/helm/api/charts
        env:
          PUBLISHER_USER: ${{ secrets.PUBLISHER_USER }}
          PUBLISHER_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
