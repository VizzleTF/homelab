name: Secret Scan (Gitleaks)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.30.1
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan
        run: gitleaks detect --source . --redact --verbose --no-banner --platform=gitea
