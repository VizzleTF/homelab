name: Secret Scan + Mirror to GitHub

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-mirror-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Filename blocklist
        run: |
          set -euo pipefail
          PATTERNS='(^|/)((id_rsa.*)|.*\.(pem|key|pfx|p12|crt|kubeconfig)|kubeconfig.*|\.env(\..+)?|vault_secrets_backup.*|vault-unseal.*|.*shamir.*|terraform\.tfstate.*|terraform\.tfvars)$'
          ALLOW='(\.example|\.sample)$'
          if MATCHES=$(git ls-files | grep -E "$PATTERNS" | grep -Ev "$ALLOW" || true); [ -n "$MATCHES" ]; then
            echo "::error::Blocked filename(s) detected:"
            echo "$MATCHES"
            exit 1
          fi
          echo "Filename blocklist: clean"

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.30.1
          SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          TARBALL="gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -fsSL -o "/tmp/${TARBALL}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${TARBALL}"
          echo "${SHA256}  /tmp/${TARBALL}" | sha256sum -c -
          tar -xzf "/tmp/${TARBALL}" -C /tmp gitleaks
          install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --no-banner \
            --platform=gitea \
            --exit-code 1 \
            --report-format json \
            --report-path gitleaks-report.json

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf  # v3.2.2 — Forgejo Actions runner only supports v3 artifact protocol
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 7
          if-no-files-found: ignore

  mirror-to-github:
    needs: gitleaks
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Push to GitHub mirror
        env:
          GH_PAT: ${{ secrets.GH_MIRROR_PAT }}
        run: |
          set -euo pipefail
          GH_REPO="VizzleTF/${{ github.event.repository.name }}"
          git push "https://VizzleTF:${GH_PAT}@github.com/${GH_REPO}.git" HEAD:main

  notify-failure:
    needs: [gitleaks, mirror-to-github]
    if: always() && (needs.gitleaks.result == 'failure' || needs.mirror-to-github.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download gitleaks report
        if: needs.gitleaks.result == 'failure'
        uses: actions/download-artifact@ad191675b41f6a5b46da9a048cb6893812da158b  # v3.1.0-node20 — Forgejo Actions runner only supports v3 artifact protocol
        with:
          name: gitleaks-report
          path: .
        continue-on-error: true

      - name: Build leak summary
        id: summary
        if: needs.gitleaks.result == 'failure'
        run: |
          set -euo pipefail
          if [ -f gitleaks-report.json ]; then
            SUMMARY=$(jq -r '
              if type=="array" and length>0 then
                [.[] | "• " + (.RuleID // "unknown") + " @ " + (.File // "?") + ":" + ((.StartLine // 0)|tostring)] | .[0:10] | join("%0A")
              else "(report empty)" end
            ' gitleaks-report.json)
            COUNT=$(jq -r 'if type=="array" then length else 0 end' gitleaks-report.json)
          else
            SUMMARY="(no report artifact)"
            COUNT="?"
          fi
          {
            echo "summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
            echo "count=$COUNT"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          GL_RES: ${{ needs.gitleaks.result }}
          MR_RES: ${{ needs.mirror-to-github.result }}
          LEAK_COUNT: ${{ steps.summary.outputs.count }}
          LEAK_SUMMARY: ${{ steps.summary.outputs.summary }}
        run: |
          set -euo pipefail
          BODY="<b>❌ ${GITHUB_REPOSITORY}</b>%0Agitleaks: <b>${GL_RES}</b> | mirror: <b>${MR_RES}</b>%0Acommit: <code>${GITHUB_SHA::8}</code> ref: <code>${GITHUB_REF_NAME}</code>"
          if [ "${GL_RES}" = "failure" ]; then
            BODY="${BODY}%0A%0A<b>Leaks (${LEAK_COUNT:-?}):</b>%0A<pre>${LEAK_SUMMARY:-n/a}</pre>"
          fi
          BODY="${BODY}%0A<a href=\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\">Run #${GITHUB_RUN_NUMBER}</a>"
          curl -sf -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            -d "text=${BODY}"
