name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  yamllint:
    # Pre-merge gate. После squash-merge на main те же файлы уже валидированы — не перегоняем.
    if: github.event_name != 'push'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install yamllint
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends yamllint
      - name: Lint
        run: yamllint .

  helm-lint:
    if: github.event_name != 'push'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install helm
        run: |
          set -eu
          VERSION=v3.16.4
          curl -fsSL "https://get.helm.sh/helm-${VERSION}-linux-amd64.tar.gz" | tar -xz -C /tmp
          install -m 755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short
      - name: Lint homelab-common
        run: helm lint charts/homelab-common
      - name: Template homelab-common (smoke)
        run: helm template smoke charts/homelab-common --debug >/dev/null
      - name: Validate values files against schema
        run: |
          set -euo pipefail
          FAILS=0
          for f in argocd/apps/*/values.yaml argocd/apps/*/homelab-values.yaml argocd/apps/*/cnpg-values.yaml \
                   argocd/infra/*/values.yaml argocd/infra/*/homelab-values.yaml \
                   argocd/values/argocd.yaml; do
            [ -f "$f" ] || continue
            grep -qE '^homelab-common:|^global:' "$f" || continue
            if ! helm template test charts/homelab-common \
                -f argocd/values/global.yaml -f "$f" \
                >/dev/null 2>/tmp/helm.err; then
              echo "::error file=$f::Schema validation failed"
              sed 's/^/    /' /tmp/helm.err
              FAILS=$((FAILS+1))
            fi
          done
          if [ "$FAILS" -gt 0 ]; then
            echo "::error::$FAILS values file(s) failed schema validation"
            exit 1
          fi
          echo "Schema validation: clean"

  kubeconform:
    # Pre-merge gate. Schema-validates rendered manifests against core + CRD
    # schemas — catches bad apiVersion / wrong CRD fields (ESO v1 vs v1beta1)
    # that helm-lint's values-schema check cannot see. kubeconform version is
    # read from .mise.toml (single source of truth, Renovate-tracked).
    if: github.event_name != 'push'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install helm
        run: |
          set -eu
          VERSION=v3.16.4
          curl -fsSL "https://get.helm.sh/helm-${VERSION}-linux-amd64.tar.gz" | tar -xz -C /tmp
          install -m 755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short
      - name: Install kubeconform
        run: |
          set -euo pipefail
          VERSION=$(sed -n 's/^kubeconform[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' .mise.toml)
          [ -n "$VERSION" ] || { echo "::error::kubeconform version not found in .mise.toml"; exit 1; }
          BASE="https://github.com/yannh/kubeconform/releases/download/v${VERSION}"
          # Keep the canonical asset filename — CHECKSUMS references it by name,
          # so `sha256sum -c` looks for exactly kubeconform-linux-amd64.tar.gz.
          curl -fsSL -o /tmp/kubeconform-linux-amd64.tar.gz "${BASE}/kubeconform-linux-amd64.tar.gz"
          curl -fsSL -o /tmp/CHECKSUMS "${BASE}/CHECKSUMS"
          ( cd /tmp && grep 'kubeconform-linux-amd64.tar.gz' CHECKSUMS | sha256sum -c - )
          tar -xzf /tmp/kubeconform-linux-amd64.tar.gz -C /tmp kubeconform
          install -m 755 /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v
      - name: Validate manifests
        run: scripts/kubeconform-validate.sh

  gitleaks:
    # Pre-merge required-check (branch protection). На push к main не запускаем —
    # тот же diff уже проверен на PR; post-sanitize gitleaks внутри mirror-to-github
    # остаётся вторым контуром защиты для rewriten history.
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Filename blocklist
        run: |
          set -euo pipefail
          PATTERNS='(^|/)((id_rsa.*)|.*\.(pem|key|pfx|p12|crt|kubeconfig)|kubeconfig.*|\.env(\..+)?|vault_secrets_backup.*|vault-unseal.*|.*shamir.*|terraform\.tfstate.*|terraform\.tfvars)$'
          ALLOW='(\.example|\.sample)$'
          if MATCHES=$(git ls-files | grep -E "$PATTERNS" | grep -Ev "$ALLOW" || true); [ -n "$MATCHES" ]; then
            echo "::error::Blocked filename(s) detected:"
            echo "$MATCHES"
            exit 1
          fi
          echo "Filename blocklist: clean"

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.30.1
          SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          TARBALL="gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -fsSL -o "/tmp/${TARBALL}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${TARBALL}"
          echo "${SHA256}  /tmp/${TARBALL}" | sha256sum -c -
          tar -xzf "/tmp/${TARBALL}" -C /tmp gitleaks
          install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --no-banner \
            --platform=gitea \
            --exit-code 1 \
            --report-format json \
            --report-path gitleaks-report.json

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@a8a3f3ad30e3422c9c7b888a15615d19a852ae32  # v3.1.3 — DO NOT BUMP. Forgejo runner supports only @actions/artifact v1.x. v3.2.x bumps @actions/artifact to v2 (v4 protocol) → GHESNotSupportedError. Renovate guard in renovate.json: allowedVersions <3.2.0.
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 7
          if-no-files-found: ignore

  mirror-to-github:
    # Post-merge only. Pre-merge gitleaks (см. job выше) — pull_request gate;
    # сюда commit попадает только после merge на main, где он уже валидирован.
    # workflow_dispatch разрешён для ручного перезапуска mirror без re-merge.
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Install git-filter-repo
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -y -qq python3-pip
          pip install --quiet --break-system-packages git-filter-repo==2.47.0

      - name: Strip workspace-only paths for GitHub mirror
        run: |
          set -euo pipefail
          git filter-repo --force \
            --invert-paths \
            --path CLAUDE.md \
            --path .claude/

      - name: Sanitize history for GitHub mirror
        env:
          SANITIZE_RULES: ${{ secrets.MIRROR_SANITIZE_RULES }}
        run: |
          set -euo pipefail
          if [ -z "${SANITIZE_RULES:-}" ]; then
            echo "::error::MIRROR_SANITIZE_RULES secret is empty or unset"
            exit 1
          fi
          printf '%s\n' "$SANITIZE_RULES" > /tmp/replacements.txt
          git filter-repo --replace-text /tmp/replacements.txt --force
          rm -f /tmp/replacements.txt

      - name: Install gitleaks (for post-sanitize gate)
        run: |
          set -euo pipefail
          VERSION=8.30.1
          SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          TARBALL="gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -fsSL -o "/tmp/${TARBALL}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${TARBALL}"
          echo "${SHA256}  /tmp/${TARBALL}" | sha256sum -c -
          tar -xzf "/tmp/${TARBALL}" -C /tmp gitleaks
          install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Post-sanitize gitleaks gate
        # Re-scan the rewritten history after `Sanitize history` to catch any
        # secret pattern that slipped through MIRROR_SANITIZE_RULES. Fails the
        # mirror job before push so nothing leaked-then-redacted reaches GitHub.
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --no-banner \
            --platform=gitea \
            --exit-code 1 \
            --report-format json \
            --report-path post-sanitize-leaks.json

      - name: Upload post-sanitize gitleaks report
        if: failure()
        uses: actions/upload-artifact@a8a3f3ad30e3422c9c7b888a15615d19a852ae32  # v3.1.3 — DO NOT BUMP (see PR job artifact note)
        with:
          name: post-sanitize-leaks
          path: post-sanitize-leaks.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Push sanitized to GitHub mirror
        env:
          GH_PAT: ${{ secrets.GH_MIRROR_PAT }}
        run: |
          set -euo pipefail
          GH_REPO="VizzleTF/${{ github.event.repository.name }}"
          git push --force "https://VizzleTF:${GH_PAT}@github.com/${GH_REPO}.git" HEAD:main

  notify-failure:
    # Post-merge only. Pre-merge gitleaks failures видны в Forgejo PR UI и не нуждаются в Telegram.
    # Триггер — failure mirror-to-github (включая встроенный post-sanitize gitleaks gate).
    needs: mirror-to-github
    if: always() && needs.mirror-to-github.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download post-sanitize leaks report
        uses: actions/download-artifact@a9bc5e6ef2cb54c177f32aa5726adaa15e7e2d59  # v3.1.0 — DO NOT BUMP to v3.2.x or v4.x. Forgejo runner supports only @actions/artifact v1.x. Renovate guard in renovate.json: allowedVersions <3.2.0.
        with:
          name: post-sanitize-leaks
          path: .
        continue-on-error: true

      - name: Build leak summary
        id: summary
        run: |
          set -euo pipefail
          if [ -f post-sanitize-leaks.json ]; then
            SUMMARY=$(jq -r '
              if type=="array" and length>0 then
                [.[] | "• " + (.RuleID // "unknown") + " @ " + (.File // "?") + ":" + ((.StartLine // 0)|tostring)] | .[0:10] | join("%0A")
              else "(report empty)" end
            ' post-sanitize-leaks.json)
            COUNT=$(jq -r 'if type=="array" then length else 0 end' post-sanitize-leaks.json)
          else
            SUMMARY="(mirror failed without leak report — see workflow logs)"
            COUNT="?"
          fi
          {
            echo "summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
            echo "count=$COUNT"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          MR_RES: ${{ needs.mirror-to-github.result }}
          LEAK_COUNT: ${{ steps.summary.outputs.count }}
          LEAK_SUMMARY: ${{ steps.summary.outputs.summary }}
        run: |
          set -euo pipefail
          BODY="<b>❌ ${GITHUB_REPOSITORY}</b>%0Amirror-to-github: <b>${MR_RES}</b>%0Acommit: <code>${GITHUB_SHA::8}</code> ref: <code>${GITHUB_REF_NAME}</code>"
          if [ "${LEAK_COUNT}" != "?" ] && [ "${LEAK_COUNT}" -gt 0 ] 2>/dev/null; then
            BODY="${BODY}%0A%0A<b>Post-sanitize leaks (${LEAK_COUNT}):</b>%0A<pre>${LEAK_SUMMARY}</pre>"
          fi
          BODY="${BODY}%0A<a href=\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\">Run #${GITHUB_RUN_NUMBER}</a>"
          curl -sf -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            -d "text=${BODY}"
