apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: applications
  sources:
    # Основной Immich chart
    - repoURL: https://immich-app.github.io/immich-charts
      chart: immich
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/values/applications/immich.yaml

    # CNPG cluster для БД
    - repoURL: https://cloudnative-pg.github.io/charts
      chart: cluster
      targetRevision: "0.4.0"
      helm:
        valueFiles:
          - $values/values/applications/cnpg-immich-db.yaml

    # Общие ресурсы через homelab-common
    - repoURL: https://github.com/VizzleTF/home_proxmox.git
      path: charts/homelab-common
      targetRevision: HEAD
      helm:
        valueFiles:
          - $values/values/shared/global.yaml
          - $values/values/applications/immich.yaml

    # Values репозиторий
    - repoURL: git@github.com:VizzleTF/home-proxmox-values.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: immich
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
