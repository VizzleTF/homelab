apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opencloud
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: applications
  sources:
    # OpenCloud microservices chart (OCI)
    - repoURL: ghcr.io/suse-coder/helm-charts
      chart: opencloud-microservices
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/values/applications/opencloud.yaml

    # Values repository (private)
    - repoURL: git@github.com:VizzleTF/home-proxmox-values.git
      targetRevision: HEAD
      ref: values

    # Raw manifests: ExternalSecret for LDAP bind
    - repoURL: git@github.com:VizzleTF/home-proxmox-values.git
      targetRevision: HEAD
      path: manifests/applications/opencloud

  destination:
    server: https://kubernetes.default.svc
    namespace: opencloud

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        - .spec.rules[]?.backendRefs[]?.group
        - .spec.rules[]?.backendRefs[]?.kind
        - .spec.rules[]?.backendRefs[]?.weight
        - .spec.parentRefs[]?.group
        - .spec.parentRefs[]?.kind
