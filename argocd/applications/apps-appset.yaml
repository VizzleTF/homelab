apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: cnpg
            chart: cluster
            repoURL: https://cloudnative-pg.github.io/charts
            wave: "1"
            targetRevision: "*"
          - name: lampac
            repoURL: https://vizzletf.github.io/lampac_helm
            wave: "2"
          - name: nextcloud
            repoURL: https://nextcloud.github.io/helm
            wave: "2"
          - name: openclaw
            repoURL: https://serhanekicii.github.io/openclaw-helm
            wave: "2"
          - name: valkey
            repoURL: https://charts.bitnami.com/bitnami
            wave: "1"
          - name: vaultwarden
            repoURL: https://guerzon.github.io/vaultwarden
            wave: "2"
            homelabValuesFile: values/applications/vaultwarden.homelab.yaml
  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
    spec:
      project: applications
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ dig \"namespace\" .name . }}"
  templatePatch: |
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "{{.wave}}"
      labels:
        app.kubernetes.io/managed-by: argocd-applicationset
        app.kubernetes.io/part-of: applications
      finalizers:
        - resources-finalizer.argocd.argoproj.io/background
    spec:
      sources:
        - repoURL: "{{.repoURL}}"
          chart: "{{ dig "chart" .name . }}"
          targetRevision: "{{ dig "targetRevision" "*" . }}"
          helm:
            valueFiles:
              - "$values/{{ index . "valuesFile" | default (printf "values/applications/%s.yaml" .name) }}"
        - repoURL: https://github.com/VizzleTF/home_proxmox.git
          path: charts/homelab-common
          targetRevision: HEAD
          helm:
            valueFiles:
              - "$values/values/shared/global.yaml"
              - "$values/{{ index . "homelabValuesFile" | default (printf "values/applications/%s.yaml" .name) }}"
        - repoURL: git@github.com:VizzleTF/home-proxmox-values.git
          targetRevision: HEAD
          ref: values
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
