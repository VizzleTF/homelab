apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: cnpg
            chart: cluster
            repoURL: https://cloudnative-pg.github.io/charts
            namespace: cnpg
            wave: "1"
            valuesFile: cnpg
            manifestsPath: applications/cnpg
            targetRevision: "0.4.0"
          - name: lampac
            chart: lampac
            repoURL: https://vizzletf.github.io/lampac_helm
            namespace: lampac
            wave: "2"
            valuesFile: lampac
            manifestsPath: applications/lampac
            targetRevision: "*"
          - name: nextcloud
            chart: nextcloud
            repoURL: https://nextcloud.github.io/helm
            namespace: nextcloud
            wave: "2"
            valuesFile: nextcloud
            manifestsPath: applications/nextcloud
            targetRevision: "*"
          - name: openclaw
            chart: openclaw
            repoURL: https://serhanekicii.github.io/openclaw-helm
            namespace: openclaw
            wave: "2"
            valuesFile: openclaw
            manifestsPath: applications/openclaw
            targetRevision: "*"
          - name: valkey
            chart: valkey
            repoURL: https://charts.bitnami.com/bitnami
            namespace: valkey
            wave: "1"
            valuesFile: valkey
            manifestsPath: applications/valkey
            targetRevision: "*"
          - name: vaultwarden
            chart: vaultwarden
            repoURL: https://guerzon.github.io/vaultwarden
            namespace: vaultwarden
            wave: "2"
            valuesFile: vaultwarden
            manifestsPath: applications/vaultwarden
            targetRevision: "*"
  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{.wave}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io/background
    spec:
      project: default
      sources:
        - repoURL: "{{.repoURL}}"
          chart: "{{.chart}}"
          targetRevision: "{{.targetRevision}}"
          helm:
            valueFiles:
              - "$values/values/applications/{{.valuesFile}}.yaml"
        - repoURL: git@github.com:VizzleTF/home-proxmox-values.git
          targetRevision: HEAD
          ref: values
        - repoURL: git@github.com:VizzleTF/home-proxmox-values.git
          targetRevision: HEAD
          path: "manifests/{{.manifestsPath}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
