apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: cnpg
            chart: cluster
            repoURL: https://cloudnative-pg.github.io/charts
            wave: "1"
            targetRevision: "0.4.0"
          - name: lampac
            repoURL: https://vizzletf.github.io/lampac_helm
            wave: "2"
          - name: nextcloud
            repoURL: https://nextcloud.github.io/helm
            wave: "2"
          - name: openclaw
            repoURL: https://serhanekicii.github.io/openclaw-helm
            wave: "2"
          - name: valkey
            repoURL: https://charts.bitnami.com/bitnami
            wave: "1"
          - name: vault
            repoURL: https://helm.releases.hashicorp.com
            wave: "0"
          - name: vaultwarden
            repoURL: https://guerzon.github.io/vaultwarden
            wave: "2"
          - name: rss-to-telegram-bot
            repoURL: https://github.com/VizzleTF/home_proxmox.git
            chartPath: charts/rss-to-telegram-bot
            namespace: rsstt
            wave: "2"
            targetRevision: HEAD
  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
    spec:
      project: applications
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ dig \"namespace\" .name . }}"
  templatePatch: |
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "{{.wave}}"
      labels:
        app.kubernetes.io/managed-by: argocd-applicationset
        app.kubernetes.io/part-of: applications
      finalizers:
        - resources-finalizer.argocd.argoproj.io/background
    spec:
      sources:
        {{- if hasKey . "chartPath" }}
        - repoURL: "{{.repoURL}}"
          targetRevision: "{{ dig "targetRevision" "HEAD" . }}"
          path: "{{.chartPath}}"
          helm:
            valueFiles:
              - "$values/values/applications/{{.name}}.yaml"
        {{- else }}
        - repoURL: "{{.repoURL}}"
          chart: "{{ dig "chart" .name . }}"
          targetRevision: "{{ dig "targetRevision" "*" . }}"
          helm:
            valueFiles:
              - "$values/values/applications/{{.name}}.yaml"
        {{- end }}
        - repoURL: git@github.com:VizzleTF/home-proxmox-values.git
          targetRevision: HEAD
          ref: values
        {{- if hasKey . "manifestsPath" }}
        - repoURL: git@github.com:VizzleTF/home-proxmox-values.git
          targetRevision: HEAD
          path: "manifests/{{.manifestsPath}}"
        {{- else }}
        - repoURL: git@github.com:VizzleTF/home-proxmox-values.git
          targetRevision: HEAD
          path: "manifests/applications/{{.name}}"
        {{- end }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
