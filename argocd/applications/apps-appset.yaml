apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    applicationsSync: create-update
    preserveResourcesOnDeletion: true
  generators:
    - list:
        elements:
          - name: cnpg
            chart: cluster
            repoURL: https://cloudnative-pg.github.io/charts
            targetRevision: "0.6.0"
            wave: "1"
          - name: lampac
            repoURL: https://vizzletf.github.io/lampac_helm
            targetRevision: "0.1.10"
            wave: "2"
          - name: nextcloud
            repoURL: https://nextcloud.github.io/helm
            targetRevision: "9.0.6"
            wave: "2"
          - name: valkey
            repoURL: https://charts.bitnami.com/bitnami
            targetRevision: "5.5.1"
            wave: "1"
          - name: vaultwarden
            repoURL: https://guerzon.github.io/vaultwarden
            targetRevision: "0.36.3"
            wave: "2"
            homelabValuesFile: values/applications/vaultwarden.homelab.yaml
          - name: immich
            repoURL: https://immich-app.github.io/immich-charts
            targetRevision: "0.11.1"
            wave: "2"
            cnpgValuesFile: values/applications/cnpg-immich-db.yaml
          - name: authentik
            repoURL: https://charts.goauthentik.io/
            targetRevision: "2026.2.2"
            wave: "2"
          - name: may
            homelabOnly: "true"
            wave: "2"
          - name: omniroute
            homelabOnly: "true"
            wave: "2"
          - name: rss-to-telegram-bot
            homelabOnly: "true"
            wave: "2"
            namespace: rsstt
          - name: netbootxyz
            homelabOnly: "true"
            wave: "2"
            namespace: netboot
  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
    spec:
      project: applications
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ dig \"namespace\" .name . }}"
  templatePatch: |
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "{{.wave}}"
      labels:
        app.kubernetes.io/managed-by: argocd-applicationset
        app.kubernetes.io/part-of: applications
      finalizers:
        - resources-finalizer.argocd.argoproj.io/background
    spec:
      sources:
        {{- if not (index . "homelabOnly") }}
        - repoURL: "{{.repoURL}}"
          chart: "{{ dig "chart" .name . }}"
          targetRevision: "{{ dig "targetRevision" "*" . }}"
          helm:
            valueFiles:
              - "$values/{{ index . "valuesFile" | default (printf "values/applications/%s.yaml" .name) }}"
        {{- end }}
        {{- if index . "cnpgValuesFile" }}
        - repoURL: https://cloudnative-pg.github.io/charts
          chart: cluster
          targetRevision: "0.6.0"
          helm:
            valueFiles:
              - "$values/{{ .cnpgValuesFile }}"
        {{- end }}
        - repoURL: https://github.com/VizzleTF/home_proxmox.git
          path: charts/homelab-common
          targetRevision: HEAD
          helm:
            valueFiles:
              - "$values/values/shared/global.yaml"
              - "$values/{{ index . "homelabValuesFile" | default (printf "values/applications/%s.yaml" .name) }}"
        - repoURL: git@github.com:VizzleTF/home-proxmox-values.git
          targetRevision: HEAD
          ref: values
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
