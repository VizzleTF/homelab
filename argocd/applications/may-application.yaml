apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: may
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: applications
  sources:
    # Кастомный May chart
    - repoURL: https://github.com/VizzleTF/home_proxmox.git
      path: charts/may
      targetRevision: HEAD
      helm:
        valueFiles:
          - $values/values/applications/may.yaml
    
    # Общие ресурсы через homelab-common
    - repoURL: https://github.com/VizzleTF/home_proxmox.git
      path: charts/homelab-common
      targetRevision: HEAD
      helm:
        valueFiles:
          - $values/values/applications/may.yaml
    
    # Values репозиторий
    - repoURL: git@github.com:VizzleTF/home-proxmox-values.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: may
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
