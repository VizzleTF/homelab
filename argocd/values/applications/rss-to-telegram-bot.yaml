homelab-common:
  externalSecrets:
    - name: rss-to-telegram-bot
      vaultPath: rsstt/rss-to-telegram-bot
      data:
        - secretKey: token
          property: token
        - secretKey: manager
          property: manager
      templateData:
        TOKEN: "{{ .token }}"
        MANAGER: "{{ .manager }}"

  persistentVolumeClaims:
    - name: rss-to-telegram-bot
      accessModes:
        - ReadWriteOnce
      size: 1Gi
      volumeName: pvc-6586d6c9-ea7f-406d-ad89-5efdf33a20b9
      labels:
        app.kubernetes.io/name: rss-to-telegram-bot
        app.kubernetes.io/instance: rss-to-telegram-bot

  apps:
    - name: rss-to-telegram-bot
      deployment:
        metadata:
          labels:
            app.kubernetes.io/name: rss-to-telegram-bot
            app.kubernetes.io/instance: rss-to-telegram-bot
          annotations:
            argocd.argoproj.io/sync-options: Replace=true
        spec:
          replicas: 1
          strategy:
            type: Recreate
          selector:
            matchLabels:
              app.kubernetes.io/name: rss-to-telegram-bot
              app.kubernetes.io/instance: rss-to-telegram-bot
          template:
            metadata:
              labels:
                app.kubernetes.io/name: rss-to-telegram-bot
                app.kubernetes.io/instance: rss-to-telegram-bot
            spec:
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
              containers:
                - name: rss-to-telegram-bot
                  image: ghcr.io/vizzletf/rss-to-telegram-bot-2:dev
                  imagePullPolicy: Always
                  securityContext:
                    allowPrivilegeEscalation: false
                    capabilities:
                      drop:
                        - ALL
                  env:
                    - name: PORT
                      value: "8848"
                  envFrom:
                    - secretRef:
                        name: rss-to-telegram-bot
                  livenessProbe:
                    tcpSocket:
                      port: 8848
                    initialDelaySeconds: 60
                    periodSeconds: 30
                    timeoutSeconds: 10
                    failureThreshold: 3
                  readinessProbe:
                    tcpSocket:
                      port: 8848
                    initialDelaySeconds: 60
                    periodSeconds: 30
                    timeoutSeconds: 10
                    failureThreshold: 3
                  volumeMounts:
                    - name: data
                      mountPath: /app/config
                  resources:
                    requests:
                      cpu: 25m
                      memory: 160Mi
                    limits:
                      cpu: 100m
                      memory: 256Mi
              volumes:
                - name: data
                  persistentVolumeClaim:
                    claimName: rss-to-telegram-bot
