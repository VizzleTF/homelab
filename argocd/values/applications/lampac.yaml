# Lampac - Media server with online sources, torrents and DLNA support
# Source: https://github.com/lampac-nextgen/lampac
# Chart: lampac_helm

replicaCount: 1

image:
  repository: ghcr.io/lampac-nextgen/lampac
  pullPolicy: Always
  tag: "latest"

serviceAccount:
  create: true

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

service:
  type: LoadBalancer
  port: 9118

resources:
  requests:
    # Right-sized after observing 645Mi peak — was 1100Mi
    memory: "700Mi"
    cpu: "50m"
  limits:
    memory: "2400Mi"
    cpu: "500m"

# Probes - lampac-nextgen needs time to compile modules on startup
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Environment variables
env:
  - name: LAMPAC_PORT
    value: "9118"

# ConfigMaps configuration
configMaps:
  initConf:
    enabled: true
    data: |
      {
        "listen": {
          "ip": "0.0.0.0",
          "port": 9118,
          "scheme": "http"
        },
        "chromium": {
          "enable": false
        },
        "SkipModules": []
      }

  manifest:
    enabled: false

volumes:
  - name: dshm
    emptyDir:
      medium: Memory
      sizeLimit: 2Gi

volumeMounts:
  - name: init-conf
    mountPath: /lampac/init.conf
    subPath: init.conf
    readOnly: true
  - name: dshm
    mountPath: /dev/shm
