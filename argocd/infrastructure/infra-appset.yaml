apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    applicationsSync: create-update
    preserveResourcesOnDeletion: true
  generators:
    - list:
        elements:
          - name: cert-manager
            repoURL: https://charts.jetstack.io
            wave: "-5"
            extraManifests: true
            homelabValuesFile: values/infrastructure/cert-manager.homelab.yaml
          - name: cilium
            repoURL: https://helm.cilium.io/
            namespace: kube-system
            wave: "-5"
            extraManifests: true
            ignoreDiff: |
              - group: ""
                kind: Secret
                name: cilium-ca
                jqPathExpressions:
                  - .data
              - group: ""
                kind: Secret
                name: hubble-relay-client-certs
                jqPathExpressions:
                  - .data
              - group: ""
                kind: Secret
                name: hubble-server-certs
                jqPathExpressions:
                  - .data
          - name: cloudflared
            repoURL: https://community-charts.github.io/helm-charts
            wave: "0"
            homelabValuesFile: values/infrastructure/cloudflared.homelab.yaml
          - name: cnpg-operator
            chart: cloudnative-pg
            repoURL: https://cloudnative-pg.github.io/charts
            namespace: cnpg-system
            wave: "-2"
          - name: vault
            repoURL: https://helm.releases.hashicorp.com
            namespace: vault
            wave: "-4"
            extraManifests: true
          - name: external-secrets
            repoURL: https://charts.external-secrets.io
            namespace: external-secrets-system
            wave: "-2"
          - name: external-dns
            repoURL: https://kubernetes-sigs.github.io/external-dns/
            wave: "-2"
          - name: external-dns-openwrt
            chart: external-dns
            repoURL: https://kubernetes-sigs.github.io/external-dns/
            wave: "-2"
          - name: goldilocks
            repoURL: https://charts.fairwinds.com/stable
            wave: "0"
          - name: kubelet-csr-approver
            repoURL: https://postfinance.github.io/kubelet-csr-approver
            wave: "-3"
          - name: intel-device-plugins-operator
            repoURL: https://intel.github.io/helm-charts/
            namespace: kube-system
            wave: "-1"
          - name: intel-device-plugins-gpu
            repoURL: https://intel.github.io/helm-charts/
            namespace: kube-system
            wave: "0"
          - name: longhorn
            repoURL: https://charts.longhorn.io
            namespace: longhorn-system
            wave: "-4"
            extraManifests: true
          - name: metrics-server
            repoURL: https://kubernetes-sigs.github.io/metrics-server/
            namespace: kube-system
            wave: "-3"
          - name: node-feature-discovery
            repoURL: https://kubernetes-sigs.github.io/node-feature-discovery/charts
            wave: "-1"
          - name: tetragon
            repoURL: https://helm.cilium.io/
            namespace: tetragon
            wave: "-3"
            extraManifests: true
            ignoreDiff: |
              - group: cilium.io
                kind: TracingPolicy
                jqPathExpressions:
                  - .spec.kprobes[]?.args[]?.maxData
                  - .spec.kprobes[]?.args[]?.resolve
                  - .spec.kprobes[]?.args[]?.returnCopy
                  - .spec.kprobes[]?.return
                  - .spec.kprobes[]?.selectors[]?.matchBinaries[]?.followChildren
                  - .spec.lsmhooks[]?.args[]?.maxData
                  - .spec.lsmhooks[]?.args[]?.resolve
                  - .spec.lsmhooks[]?.args[]?.returnCopy
                  - .spec.lsmhooks[]?.selectors[]?.matchBinaries[]?.followChildren
          - name: pve-exporter
            chart: prometheus-pve-exporter
            repoURL: https://charts.christianhuth.de
            namespace: victoria-metrics
            wave: "0"
            extraManifests: true
          - name: renovate
            repoURL: https://docs.renovatebot.com/helm-charts
            wave: "2"
          - name: vault-autounseal
            repoURL: https://pytoshka.github.io/vault-autounseal
            namespace: vault
            wave: "1"
          - name: victoria-metrics-k8s-stack
            chart: victoria-metrics-k8s-stack
            repoURL: https://victoriametrics.github.io/helm-charts/
            namespace: victoria-metrics
            wave: "-2"
            extraManifests: true
            ignoreDiff: |
              - group: ""
                kind: Secret
                name: victoria-metrics-k8s-stack-victoria-metrics-operator-validation
                jsonPointers:
                  - /data
          - name: vpa
            repoURL: https://charts.fairwinds.com/stable
            wave: "0"
  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
    spec:
      project: infrastructure
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ dig \"namespace\" .name . }}"
  templatePatch: |
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "{{.wave}}"
      labels:
        app.kubernetes.io/managed-by: argocd-applicationset
        app.kubernetes.io/part-of: infrastructure
      finalizers:
        - resources-finalizer.argocd.argoproj.io/background
    spec:
      sources:
        - repoURL: "{{.repoURL}}"
          chart: "{{ dig "chart" .name . }}"
          targetRevision: "{{ dig "targetRevision" "*" . }}"
          helm:
            valueFiles:
              - "$values/{{ index . "valuesFile" | default (printf "values/infrastructure/%s.yaml" .name) }}"
        - repoURL: https://github.com/VizzleTF/home_proxmox.git
          path: charts/homelab-common
          targetRevision: HEAD
          helm:
            valueFiles:
              - "$values/values/shared/global.yaml"
              - "$values/{{ index . "homelabValuesFile" | default (printf "values/infrastructure/%s.yaml" .name) }}"
        - repoURL: git@github.com:VizzleTF/home-proxmox-values.git
          targetRevision: HEAD
          ref: values
        {{- if index . "extraManifests" }}
        - repoURL: git@github.com:VizzleTF/home-proxmox-values.git
          targetRevision: HEAD
          path: "manifests/infrastructure/{{.name}}"
        {{- end }}
      {{- if index . "ignoreDiff" }}
      ignoreDifferences:
      {{- .ignoreDiff | nindent 4 }}
      {{- end }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          {{- if index . "ignoreDiff" }}
          - RespectIgnoreDifferences=true
          {{- end }}
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
