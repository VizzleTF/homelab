# otwld/velero-ui — Velero web dashboard.
# Deployed in `velero` namespace (shared with Velero itself) — chart Role lives
# alongside the Velero CRs, RBAC sharing is simpler than a separate ns.
# OIDC via generic OAUTH_* env (Velero UI uses raw OAuth2, not OIDC autodiscover).

replicaCount: 1

image:
  repository: otwld/velero-ui
  pullPolicy: IfNotPresent

configuration:
  logLevel: "info"
  general:
    veleroNamespace: "velero"
    # JWT signing passphrase — ESO ext-secret `velero-ui-jwt`, key `pass_phrase`.
    secretPassPhrase:
      useSecret: true
      existingSecret: velero-ui-jwt
      key: pass_phrase

# Default cluster-admin binding — single-user homelab, UI is the primary admin
# surface. Tighten via Casbin (`policies.enabled: true`) if multi-user later.
rbac:
  create: true
  clusterAdministrator: true
  clusterAdministratorName: cluster-admin

service:
  type: ClusterIP
  port: 3000

# Cilium Gateway via homelab-common.httpRoutes — no chart Ingress.
ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# OIDC via Authentik. OAUTH_CLIENT_ID/SECRET come from ESO `velero-ui-oidc`;
# URLs are public Authentik endpoints — no secrets, kept as literals.
env:
  - name: OAUTH_AUTH_ENABLED
    value: "true"
  - name: OAUTH_NAME
    value: "Authentik"
  - name: OAUTH_AUTHORIZATION_URL
    value: "https://authentik.example.com/application/o/authorize/"
  - name: OAUTH_TOKEN_URL
    value: "https://authentik.example.com/application/o/token/"
  - name: OAUTH_USER_INFO_URL
    value: "https://authentik.example.com/application/o/userinfo/"
  - name: OAUTH_REDIRECT_URI
    value: "https://velero.example.com/login"
  - name: OAUTH_OAUTH_SCOPE
    value: "openid profile email"

envFrom:
  - secretRef:
      name: velero-ui-oidc

homelab-common:
  externalSecrets:
    # JWT passphrase used by velero-ui to sign session tokens.
    - name: velero-ui-jwt
      vaultPath: velero/jwt
      data:
        - secretKey: pass_phrase
          property: pass_phrase

    # OIDC client credentials — chart consumes via envFrom (OAUTH_CLIENT_ID,
    # OAUTH_CLIENT_SECRET become env vars directly).
    - name: velero-ui-oidc
      vaultPath: velero/oidc
      data:
        - secretKey: OAUTH_CLIENT_ID
          property: client_id
        - secretKey: OAUTH_CLIENT_SECRET
          property: client_secret

  httpRoutes:
    - name: velero-ui
      hostname: velero
      gateway: internal
      # gatus auto-discovery (home-operations/gatus-sidecar, opt-in)
      annotations:
        gatus.home-operations.com/enabled: "true"
      service:
        name: velero-ui
        port: 3000

  # Authentik OIDC provider+application provisioning.
  # client_secret resolves via !Env VELERO_UI_OIDC_CLIENT_SECRET — that env
  # comes from `authentik-config` ESO (see argocd/apps/authentik/values.yaml).
  # ConfigMap `authentik-blueprint-velero-ui` is mounted by authentik chart
  # via `blueprints.configMaps` list (also in authentik values).
  authentikBlueprints:
    - name: authentik-blueprint-velero-ui
      namespace: authentik
      enabled: true
      blueprints:
        01-velero-ui-scope.yaml: |
          version: 1
          metadata:
            name: Velero UI OIDC - Groups Scope
          entries:
            - model: authentik_providers_oauth2.scopemapping
              identifiers:
                name: "OAuth Mapping: OpenID 'groups' (Velero UI)"
              attrs:
                name: "OAuth Mapping: OpenID 'groups' (Velero UI)"
                scope_name: groups
                description: "Group memberships"
                expression: "return list(request.user.ak_groups.values_list('name', flat=True))"

        02-velero-ui-oidc.yaml: |
          version: 1
          metadata:
            name: Velero UI OIDC Integration
          entries:
            - model: authentik_providers_oauth2.oauth2provider
              identifiers:
                name: Velero UI OIDC
              attrs:
                name: Velero UI OIDC
                client_type: confidential
                client_id: velero-ui
                client_secret: !Env VELERO_UI_OIDC_CLIENT_SECRET
                authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
                redirect_uris:
                  - matching_mode: strict
                    url: https://velero.example.com/login
                signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
                property_mappings:
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
                  - !Find [authentik_providers_oauth2.scopemapping, [name, "OAuth Mapping: OpenID 'groups' (Velero UI)"]]

            - model: authentik_core.application
              identifiers:
                slug: velero-ui
              attrs:
                name: Velero UI
                slug: velero-ui
                provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Velero UI OIDC]]
                launch_url: https://velero.example.com
                open_in_new_tab: true
                meta_icon: https://velero.io/img/Velero.svg
                meta_description: Kubernetes backup and restore dashboard
                policy_engine_mode: any
