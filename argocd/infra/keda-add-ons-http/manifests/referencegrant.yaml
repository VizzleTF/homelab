---
# Allows HTTPRoutes in omniroute/lampac namespaces to reference Services in the
# keda namespace as backendRefs:
#   - keda-add-ons-http-interceptor-proxy — direct interceptor (legacy / no loading page)
#   - keda-loading-proxy                  — nginx front-door that renders a Russian
#                                            "service is starting" page during cold-start
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: keda-interceptor-from-apps
  namespace: keda
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: omniroute
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: lampac
  to:
    - group: ""
      kind: Service
      name: keda-add-ons-http-interceptor-proxy
    - group: ""
      kind: Service
      name: keda-loading-proxy
