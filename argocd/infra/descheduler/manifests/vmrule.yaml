apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: descheduler
  namespace: victoria-metrics
spec:
  groups:
    - name: descheduler
      rules:
        - alert: DeschedulerDown
          expr: absent(up{job=~".*descheduler.*"}) == 1 or up{job=~".*descheduler.*"} == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Descheduler scrape target down"
            description: |
              Descheduler metrics недоступны >15 минут. Балансировка подов после
              ребута нод / talos-replace-node может не работать.
              kubectl -n descheduler get pods
              kubectl -n descheduler logs -l app.kubernetes.io/name=descheduler

        # Eviction-rate / loop-stuck alerts удалены: descheduler — nice-to-have,
        # его сбои не каскадятся, и Down уже покрывает «совсем сломался» случай.
        # См. obsidian/112 ArgoCD/Infrastructure/Alert Cleanup.md #35.
