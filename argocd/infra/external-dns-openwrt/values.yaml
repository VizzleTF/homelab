homelab-common:
  externalSecrets:
    - name: openwrt-credentials
      vaultPath: openwrt
      data:
        - secretKey: host
          property: host
        - secretKey: username
          property: username
        - secretKey: password
          property: password

  limitRange:
    enabled: true
    name: external-dns-openwrt-limits
    defaults:
      cpu: 100m
      memory: 128Mi
    defaultRequests:
      cpu: 25m
      memory: 64Mi

namespace: external-dns-openwrt

provider:
  name: webhook
  webhook:
    image:
      repository: renanqts/external-dns-openwrt-webhook
      tag: "v0.1.0"
      pullPolicy: IfNotPresent

    livenessProbe:
      httpGet:
        path: /ping
        port: 8888
      initialDelaySeconds: 10
      timeoutSeconds: 5

    readinessProbe:
      httpGet:
        path: /ping
        port: 8888
      initialDelaySeconds: 10
      timeoutSeconds: 5

    env:
      - name: PROVIDER_OPENWRT_LUCIRPC_HOSTNAME
        valueFrom:
          secretKeyRef:
            name: openwrt-credentials
            key: host
      - name: PROVIDER_OPENWRT_LUCIRPC_AUTH_USERNAME
        valueFrom:
          secretKeyRef:
            name: openwrt-credentials
            key: username
      - name: PROVIDER_OPENWRT_LUCIRPC_AUTH_PASSWORD
        valueFrom:
          secretKeyRef:
            name: openwrt-credentials
            key: password
      - name: PROVIDER_OPENWRT_LUCIRPC_SSL
        value: "false"
      - name: PROVIDER_OPENWRT_LUCIRPC_PORT
        value: "80"
      - name: LOG_LEVEL
        value: info
      - name: PROVIDER_OPENWRT_LUCIRPC_INSECURE_SKIP_VERIFY
        value: "true"

    resources:
      limits:
        cpu: 50m
        memory: 80Mi
      requests:
        cpu: 12m
        memory: 32Mi

annotationFilter: "external-dns.alpha.kubernetes.io/internal-dns in (true)"

sources:
  - gateway-httproute
  - gateway-tlsroute
  - service

# `upsert-only` (NOT `sync`): with registry=noop, ED treats every
# record in dnsmasq as fair game. policy=sync would then delete any
# manual `config domain` entry (PVE hosts, NAS Garage S3) on first
# reconcile. upsert-only restricts ED to create+update operations
# only — manual entries are left alone, IP changes to ED-managed
# hostnames still propagate.
policy: upsert-only

interval: 5m

# OpenWrt dnsmasq cannot store TXT records, so the default `txt` registry
# would create A records but never update/delete them: ED can't find its
# own owner-TXT marker, treats every existing record as "not mine" and
# silently skips reconciliation (logs say "All records are already up to
# date" while dnsmasq holds stale IPs). `noop` registry disables owner
# tracking — safe here because this ED instance is the sole writer to
# /etc/config/dhcp domain entries on the home router.
registry: noop

domainFilters:
  - example.com
  - local

env:
  - name: GOMEMLIMIT
    value: "68MiB"

resources:
  limits:
    cpu: 50m
    memory: 80Mi
  requests:
    cpu: 12m
    memory: 32Mi

serviceAccount:
  create: true
  name: external-dns-openwrt

rbac:
  create: true

podSecurityContext:
  fsGroup: 65534
  runAsNonRoot: true
  runAsUser: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
