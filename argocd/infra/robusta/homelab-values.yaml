# homelab-common: ExternalSecrets для Robusta.
# - robusta-telegram: bot_token + signing_key для Telegram sink'ов.
# chat_id живёт числом в argocd/infra/robusta/values.yaml — Robusta требует int
# и не делает env-substitution для этого поля.
homelab-common:
  externalSecrets:
    - name: robusta-telegram
      vaultPath: robusta/telegram
      data:
        - secretKey: bot_token
          property: bot_token
        - secretKey: signing_key
          property: signing_key
