apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: robusta
  namespace: victoria-metrics
spec:
  groups:
    - name: robusta
      rules:
        - alert: RobustaRunnerDown
          expr: absent(up{job=~".*robusta-runner.*"}) == 1 or up{job=~".*robusta-runner.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Robusta Runner недоступен — алерты не доставляются"
            description: |
              Robusta Runner не отвечает 5 минут. VMAlertmanager продолжает слать webhook-и,
              но они не обрабатываются. Алерты про сам Runner будут доставлены через
              telegram-fallback, остальные — потеряются до восстановления.

        # PlaybookErrors / DiscoveryErrors удалены — transient'ы плюс известная история
        # ложных срабатываний (Vault/ESO transient'ы, sink 404 при перезапуске).
        # RunnerDown через telegram-fallback покрывает «совсем сломалось» сценарий.
        # См. obsidian/112 ArgoCD/Infrastructure/Alert Cleanup.md #29.
