# Cilium CNI values
# Non-default values used in the cluster

# Cilium-agent resources (DaemonSet, 4 pods)
resources:
  requests:
    memory: 320Mi
    cpu: 96m
  limits:
    memory: 512Mi
    cpu: 400m

# GOMEMLIMIT — chart auto-injects via downward API from limits.memory; do NOT
# add via extraEnv (causes "duplicate entries for key" SSA failure).

envoy:
  resources:
    requests:
      memory: 32Mi
      cpu: 10m
    limits:
      memory: 128Mi
      cpu: 200m

operator:
  resources:
    requests:
      memory: 64Mi
      cpu: 25m
    limits:
      memory: 256Mi
      cpu: 250m
  extraEnv:
    - name: GOMEMLIMIT
      value: "220MiB"

# IP Address Management (IPAM) configuration
ipam:
  mode: kubernetes

# Security context capabilities
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

# Cgroup configuration
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Gateway API support
gatewayAPI:
  enabled: true
  enableAlpn: true
  enableAppProtocol: true

# Native routing (all nodes on same L2: 10.11.11.x)
routingMode: native
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: "10.244.0.0/16"

# WireGuard transparent encryption (pod-to-pod, cross-node)
encryption:
  enabled: true
  type: wireguard

# eBPF masquerade instead of IPTables
bpf:
  masquerade: true

# Hubble observability platform
hubble:
  relay:
    enabled: true
    resources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 128Mi
        cpu: 200m
  ui:
    enabled: false

# Kubernetes API server configuration
k8sServiceHost: localhost
k8sServicePort: 7445

# Replace kube-proxy with Cilium's eBPF implementation
kubeProxyReplacement: true

# Enable L7 proxy for Ingress Controller support
l7Proxy: true

# BGP Control Plane — eBGP peering with OpenWrt (10.11.11.1, ASN 65000).
# CRs live in manifests/cilium-bgp.yaml; MD5 secret comes from ExternalSecret
# in manifests/cilium-bgp-externalsecret.yaml. secretsNamespace = kube-system (chart default).
bgpControlPlane:
  enabled: true

# Ingress Controller — disabled, Gateway API used exclusively
ingressController:
  enabled: false
