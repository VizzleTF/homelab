---
# MD5 secret for the eBGP session with OpenWrt (matches CiliumBGPPeerConfig
# authSecretRef in cilium-bgp.yaml). Cilium reads the secret from kube-system
# (chart default bgpControlPlane.secretsNamespace.name) and expects key
# `password`.
#
# Vault setup (one-off, manual):
#   vault kv put home/homelab/k8s/kube-system/cilium-bgp \
#       password=$(openssl rand -hex 16)
#
# Same value must be configured on the OpenWrt side in /etc/bird.conf
# (scripts/openwrt-bgp-setup.sh reads it from Vault).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bgp-openwrt-md5
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend-cluster
    kind: ClusterSecretStore
  target:
    name: bgp-openwrt-md5
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: home/data/homelab/k8s/kube-system/cilium-bgp
        property: password
