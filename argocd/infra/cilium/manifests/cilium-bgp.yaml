---
# Cilium BGP — eBGP peering with OpenWrt to announce LoadBalancer IPs.
# Replaces (in a follow-up PR) the L2 ARP announcement model.
#
# Topology
#   Cluster ASN : 65010
#   Peer        : OpenWrt 10.11.11.1, ASN 65000
#   Advertise   : LoadBalancer IPs from homelab-pool (10.11.11.128/25)
#   MD5         : Secret kube-system/bgp-openwrt-md5 (ExternalSecret in same dir)
#
# CRDs are at cilium.io/v2alpha1 in Cilium 1.19.x.
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPClusterConfig
metadata:
  name: homelab-bgp
  annotations:
    # BGP CRDs are installed by cilium-operator at runtime after it sees
    # bgpControlPlane.enabled=true in the ConfigMap (wave 0). Push CR apply
    # to a later wave so the chart resources land first and the operator
    # has time to register the CRDs; SkipDryRunOnMissingResource lets the
    # first attempt succeed even if the CRD is briefly missing.
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  # Apply to every node — all 6 (3 CP + 3 worker) peer with OpenWrt for ECMP.
  nodeSelector: {}
  bgpInstances:
    - name: openwrt
      localASN: 65010
      peers:
        - name: openwrt-router
          peerASN: 65000
          peerAddress: 10.11.11.1
          peerConfigRef:
            name: openwrt-peer
---
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPPeerConfig
metadata:
  name: openwrt-peer
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  authSecretRef: bgp-openwrt-md5
  gracefulRestart:
    enabled: true
    restartTimeSeconds: 120
  timers:
    connectRetryTimeSeconds: 12
    holdTimeSeconds: 9
    keepAliveTimeSeconds: 3
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          advertise: lb-pool
---
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPAdvertisement
metadata:
  name: lb-pool-advert
  labels:
    advertise: lb-pool
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  advertisements:
    - advertisementType: Service
      service:
        addresses:
          - LoadBalancerIP
      selector:
        matchExpressions:
          - { key: somekey, operator: NotIn, values: [neverusethis] }
      attributes:
        communities:
          standard: ["65010:100"]
