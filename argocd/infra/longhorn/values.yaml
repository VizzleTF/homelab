homelab-common:
  httpRoutes:
    - name: longhorn
      hostname: longhorn
      gateway: internal
      service:
        name: longhorn-frontend
        port: 80

service:
  ui:
    type: LoadBalancer
  manager:
    type: LoadBalancer
metrics:
  serviceMonitor:
    enabled: false
persistence:
  # Default SC `longhorn` управляется longhorn-manager'ом через ConfigMap
  # `longhorn-storageclass` (он перезапишет любой внешний manifest по
  # аннотации longhorn.io/last-applied-configmap). Чарт не даёт прокинуть
  # replicaAutoBalance в parameters — для новых volume'ов на этом SC
  # балансер останется "ignored" по умолчанию. Для apps, требующих
  # авто-балансировки реплик, использовать longhorn-retain
  # (replicaAutoBalance=best-effort выставлен в его parameters).
  defaultClass: true
  defaultClassReplicaCount: 2
  reclaimPolicy: Retain
defaultSettings:
  storageMinimalAvailablePercentage: "5"
  defaultReplicaCount: "2"
  replicaAutoBalance: "best-effort"
  # CPU для instance-manager: было 2 CPU (2000m), реальное 65m → ставим 100m
  guaranteedInstanceManagerCPU: '{"v1":"0.1","v2":"0.1"}'
  # Отключаем ревизионные счетчики для снижения нагрузки
  disableRevisionCounter: '{"v1":"true","v2":"true"}'
  # Автоочистка системных снапшотов
  autoCleanupSystemGeneratedSnapshot: "true"
  # Лимит одновременных rebuild операций
  concurrentReplicaRebuildPerNodeLimit: "3"
  # Policy для автоматических node drain'ов (tuppr Talos rolling upgrade).
  # `always-allow` — Longhorn разрешает drain без forced eviction replicas.
  # Replicas остаются на диске ноды во время reboot. После возврата ноды
  # Longhorn детектит existing replicas + reuse'ит (только delta sync), НЕ
  # rebuild from scratch. Парный setting — replicaReplenishmentWaitInterval=1800
  # (30 min grace period — покрывает Talos powercycle ~5 min с запасом).
  #
  # Trade-off: если node умрёт навсегда во время drain, data на ней теряется.
  # У нас defaultReplicaCount=2 → copy на других CP-нодах спасает.
  #
  # Альтернативы:
  # - `block-if-contains-last-replica` (default) — PDB блокирует tuppr eviction
  # - `block-for-eviction*` — Longhorn автo-evict'ит replicas → лишний data
  #   movement (~гигабайты по сети) на каждом rolling upgrade
  # Docs: https://longhorn.io/docs/1.10.0/references/settings/#node-drain-policy
  nodeDrainPolicy: "always-allow"
  # Grace period перед rebuild from scratch для возвращающейся ноды (default 600s).
  # Bump до 1800s покрывает Talos powercycle + cold-start kubelet + cilium ready.
  replicaReplenishmentWaitInterval: "1800"
  # CPU оптимизация CSI компонентов (реальное потребление + 25%)
  # Поддерживаемые компоненты: csi-attacher, csi-provisioner, csi-resizer, csi-snapshotter,
  # longhorn-csi-plugin, node-driver-registrar, longhorn-liveness-probe
  # Снижение CPU requests: с 250m → 10m для каждого компонента (реальное потребление 1-2m)
  systemManagedCSIComponentsResourceLimits: '{"csi-attacher":{"requests":{"cpu":"10m","memory":"64Mi"},"limits":{"cpu":"100m","memory":"128Mi"}},"csi-provisioner":{"requests":{"cpu":"10m","memory":"64Mi"},"limits":{"cpu":"100m","memory":"128Mi"}},"csi-resizer":{"requests":{"cpu":"10m","memory":"64Mi"},"limits":{"cpu":"100m","memory":"128Mi"}},"csi-snapshotter":{"requests":{"cpu":"10m","memory":"64Mi"},"limits":{"cpu":"100m","memory":"128Mi"}},"longhorn-csi-plugin":{"requests":{"cpu":"10m","memory":"64Mi"},"limits":{"cpu":"100m","memory":"128Mi"}},"node-driver-registrar":{"requests":{"cpu":"10m","memory":"64Mi"},"limits":{"cpu":"100m","memory":"128Mi"}},"longhorn-liveness-probe":{"requests":{"cpu":"10m","memory":"64Mi"},"limits":{"cpu":"100m","memory":"128Mi"}}}'

longhornManager:
  resources:
    requests:
      memory: 256Mi
      cpu: 35m
    limits:
      memory: 512Mi
      cpu: 250m

