# Default BackupTarget CR — kept empty (S3 backup target decommissioned, see
# project_longhorn_s3_decommissioned). Longhorn auto-creates a `default`
# BackupTarget and its admission webhook forbids deleting it. Without this
# manifest ArgoCD treats the live CR as an orphan and tries to prune it on
# every sync — the webhook denies the delete and the longhorn app is stuck
# OutOfSync / sync-failed permanently. Declaring it here makes ArgoCD manage
# it instead of pruning it. `spec.syncRequestedAt` is mutated by Longhorn and
# is excluded from diff via `ignoreDiff` in config.yaml.
apiVersion: longhorn.io/v1beta2
kind: BackupTarget
metadata:
  name: default
  namespace: longhorn-system
spec:
  backupTargetURL: ""
  credentialSecret: ""
  pollInterval: "0s"
