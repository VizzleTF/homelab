apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: victoria-metrics
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend-cluster
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m

          route:
            group_by: ['alertname', 'cluster', 'service']
            group_wait: 10s
            group_interval: 10s
            repeat_interval: 12h
            receiver: 'robusta'

          # ─── Inhibit rules: «1 событие = 1 алерт» ───
          # См. obsidian/112 ArgoCD/Infrastructure/Alert Cleanup.md
          inhibit_rules:
            # K8s нода недоступна → глушим всё что висит на ней
            - source_matchers:
                - alertname="KubeNodeUnreachable"
              target_matchers:
                - alertname=~"KubeNodeNotReady|KubeNodeReadinessFlapping|KubeletDown|KubePodNotReady|KubeContainerWaiting|KubePodCrashLooping|KubeDeploymentReplicasMismatch|KubeStatefulSetReplicasMismatch|TargetDown|NodeMemoryHighUtilization"
              equal: ['node']

            # apiserver лёг → cascade на client'ов
            - source_matchers:
                - alertname="KubeAPIDown"
              target_matchers:
                - alertname=~"KubeAggregatedAPIDown|KubeClientErrors|KubeStateMetricsListErrors|KubeStateMetricsWatchErrors|TargetDown|KubeClientCertificateExpiration"

            # vmagent больше не доставляет данные → все вторичные «remote write/queue» молчат
            - source_matchers:
                - alertname="PersistentQueueIsDroppingData"
              target_matchers:
                - alertname=~"ScrapePoolHasNoTargets|TargetDown"

            # Velero провалился → stale-алерт по тому же schedule подавляем
            - source_matchers:
                - alertname="VeleroBackupFailed"
              target_matchers:
                - alertname="VeleroBackupStale"
              equal: ['schedule']

            # Pod крашлупит → не надо дополнительно NotReady/ContainerWaiting на тот же pod
            - source_matchers:
                - alertname="KubePodCrashLooping"
              target_matchers:
                - alertname=~"KubePodNotReady|KubeContainerWaiting"
              equal: ['namespace', 'pod']

            # Rollout stuck → не дублировать ReplicasMismatch на ту же workload
            - source_matchers:
                - alertname=~"KubeDeploymentRolloutStuck|KubeStatefulSetUpdateNotRolledOut|KubeDaemonSetRolloutStuck"
              target_matchers:
                - alertname=~"KubeDeploymentReplicasMismatch|KubeStatefulSetReplicasMismatch"
              equal: ['namespace']

            # critical > warning по тому же алерту (для двух-уровневых rule)
            - source_matchers:
                - severity="critical"
              target_matchers:
                - severity="warning"
              equal: ['alertname', 'namespace', 'instance']

            # vmsingle/vmalert pod restart (Renovate auto-update / ArgoCD sync)
            # вызывает короткий outage → AlertingRulesError + RemoteWriteDroppingData
            # каскадом. VMSingleDown/VMAlertDown с `for: 5m` сами не fire'ят на
            # быстрых restart'ах, но дочерние rule errors уже спам'ят. Inhibit:
            - source_matchers:
                - alertname=~"VMSingleDown|VMAlertDown"
              target_matchers:
                - alertname=~"AlertingRulesError|RemoteWriteDroppingData|ConfigurationReloadFailure|TargetDown"

          receivers:
            - name: 'robusta'
              webhook_configs:
                - url: http://robusta-runner.robusta.svc.cluster.local/api/alerts
                  send_resolved: true
