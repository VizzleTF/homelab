apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-notify-script
  namespace: renovate
data:
  digest.sh: |
    #!/bin/sh
    set -eu

    : "${RENOVATE_TOKEN:?RENOVATE_TOKEN must be set}"
    : "${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN must be set}"
    : "${TELEGRAM_CHAT_ID:?TELEGRAM_CHAT_ID must be set}"

    TG_API="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}"
    FG_API="https://git.example.com/api/v1"
    FG_WEB="https://git.example.com"
    REPO="vizzle/homelab"
    DASHBOARD_ISSUE="1"   # Renovate Dependency Dashboard issue number
    STALE_DAYS=2          # open PR older than this with no merge = flagged stale
    NOW=$(date -u +%s)
    DAY_AGO=$((NOW - 86400))

    fg_get() {
      curl -sSf \
        -H "Authorization: token ${RENOVATE_TOKEN}" \
        -H "Accept: application/json" \
        "${FG_API}/$1"
    }

    # Strip Renovate's commit prefix / "Update " noise, then HTML-escape.
    clean_title() {
      printf '%s' "$1" \
        | sed -e 's/^chore(deps): //' -e 's/^Update //' \
        | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'
    }

    # --- Auto-merged in last 24h (the "what landed in the cluster" changelog) ---
    closed=$(fg_get "repos/${REPO}/pulls?state=closed&sort=newest&limit=50")
    merged_tsv=$(printf '%s' "$closed" | jq -r --argjson s "$DAY_AGO" '
      [ .[]
        | select(.labels | map(.name) | index("dependencies"))
        | select(.merged_at != null)
        | select((.merged_at | fromdateiso8601) > $s)
      ] | sort_by(.merged_at) | .[]
      | [ (.number|tostring), .title, .html_url, ((.labels|map(.name)|index("major")) != null | tostring) ]
      | @tsv')
    merged_count=$(printf '%s' "$merged_tsv" | grep -c . || true)

    merged_block=""
    if [ "$merged_count" -gt 0 ]; then
      merged_block=$(printf '%s\n' "$merged_tsv" | while IFS="$(printf '\t')" read -r num title url is_major; do
        [ -n "$num" ] || continue
        mark=""
        [ "$is_major" = "true" ] && mark=" ⬆️major"
        printf '  • <a href="%s">#%s</a> %s%s\n' "$url" "$num" "$(clean_title "$title")" "$mark"
      done)
    fi

    # --- Stuck open PRs (automerge could NOT close them — these need a human) ---
    open_prs=$(fg_get "repos/${REPO}/pulls?state=open&limit=50")
    open_tsv=$(printf '%s' "$open_prs" | jq -r '
      [ .[] | select(.labels | map(.name) | index("dependencies")) ] | .[]
      | [ (.number|tostring), .head.sha, (.mergeable|tostring), .created_at, .title, .html_url ]
      | @tsv')

    stuck_block=""
    stuck_count=0
    if [ -n "$open_tsv" ]; then
      stuck_block=$(printf '%s\n' "$open_tsv" | while IFS="$(printf '\t')" read -r num sha mergeable created title url; do
        [ -n "$num" ] || continue
        age_days=$(( (NOW - $(printf '%s' "$created" | jq -rR 'fromdateiso8601')) / 86400 ))
        reason=""
        if [ "$mergeable" = "false" ]; then
          reason="merge conflict"
        else
          status=$(fg_get "repos/${REPO}/commits/${sha}/status" 2>/dev/null || printf '{}')
          state=$(printf '%s' "$status" | jq -r '.state // "pending"')
          if [ "$state" = "failure" ] || [ "$state" = "error" ]; then
            ctx=$(printf '%s' "$status" | jq -r '[.statuses[]? | select(.status=="failure" or .status=="error") | .context] | unique | join(", ")')
            reason="CI failing ($ctx)"
          elif [ "$age_days" -ge "$STALE_DAYS" ]; then
            reason="stale"
          fi
        fi
        # Healthy in-flight PR (CI green/pending, fresh) — will automerge, skip.
        [ -n "$reason" ] || continue
        printf '  • <a href="%s">#%s</a> %s — %s · open %sd\n' "$url" "$num" "$(clean_title "$title")" "$reason" "$age_days"
      done)
      stuck_count=$(printf '%s' "$stuck_block" | grep -c . || true)
    fi

    # --- Dependency Dashboard: what Renovate itself flagged (errored / queued) ---
    dash_body=$(fg_get "repos/${REPO}/issues/${DASHBOARD_ISSUE}" | jq -r '.body // ""')
    errored=$(printf '%s\n' "$dash_body" | grep -c '<!-- recreate-branch' || true)
    rate_limited=$(printf '%s\n' "$dash_body" | grep -c '<!-- unlimit-branch' || true)
    pending_approval=$(printf '%s\n' "$dash_body" | grep -c '<!-- approve-branch' || true)

    attention=$((stuck_count + errored))

    # --- Idle: nothing landed, nothing stuck, nothing errored → one-line heartbeat ---
    if [ "$merged_count" -eq 0 ] && [ "$attention" -eq 0 ]; then
      queued=$((rate_limited + pending_approval))
      printf '<b>🤖 Renovate</b> — всё тихо · %s в очереди · %s UTC\n' \
        "$queued" "$(date -u +'%Y-%m-%d')" > /tmp/message.txt
    else
      {
        printf '<b>🤖 Renovate</b> — <a href="%s/%s">%s</a> · %s UTC\n' \
          "$FG_WEB" "$REPO" "$REPO" "$(date -u +'%Y-%m-%d')"

        if [ "$merged_count" -gt 0 ]; then
          printf '\n✅ <b>Auto-merged (24h): %s</b>\n%s\n' "$merged_count" "$merged_block"
        fi

        if [ "$stuck_count" -gt 0 ]; then
          printf '\n🔴 <b>Needs attention: %s</b>\n%s\n' "$stuck_count" "$stuck_block"
        fi

        if [ "$errored" -gt 0 ] || [ "$rate_limited" -gt 0 ] || [ "$pending_approval" -gt 0 ]; then
          printf '\n🕓 <b>Dashboard:</b> %s errored · %s rate-limited · %s pending approval\n' \
            "$errored" "$rate_limited" "$pending_approval"
        fi
      } > /tmp/message.txt
    fi

    # Telegram caps at 4096 chars
    if [ "$(wc -c < /tmp/message.txt)" -gt 4000 ]; then
      head -c 3900 /tmp/message.txt > /tmp/message.trunc
      printf '\n…truncated…' >> /tmp/message.trunc
      mv /tmp/message.trunc /tmp/message.txt
    fi

    curl -sSf -X POST "${TG_API}/sendMessage" \
      --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
      --data-urlencode "text@/tmp/message.txt" \
      -d "parse_mode=HTML" \
      -d "disable_web_page_preview=true" \
      -o /tmp/tg-resp.json

    printf 'digest sent, telegram response: %s\n' "$(jq -r '.ok' /tmp/tg-resp.json)"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate-notify
  namespace: renovate
spec:
  schedule: "0 8 * * *"
  timeZone: UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: notify
              image: badouralix/curl-jq:latest@sha256:3670578737d1d2019b10a4f9e607284101feb9fdd6b0478e78ea87bf61d96145
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "/scripts/digest.sh"]
              envFrom:
                - secretRef:
                    name: renovate-forgejo-token
                - secretRef:
                    name: renovate-notify-telegram
              resources:
                requests:
                  cpu: 20m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: script
                  mountPath: /scripts
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: script
              configMap:
                name: renovate-notify-script
                defaultMode: 0755
            - name: tmp
              emptyDir: {}
