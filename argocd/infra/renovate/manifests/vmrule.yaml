apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: renovate
  namespace: victoria-metrics
spec:
  groups:
    - name: renovate
      rules:
        # RenovateCronJobFailing удалён — покрывается upstream KubeJobFailed.
        # См. obsidian/112 ArgoCD/Infrastructure/Alert Cleanup.md #39.
        - alert: RenovateScanMissing
          expr: |
            (time() - max(kube_job_status_completion_time{namespace="renovate", job_name=~"renovate-.*"})) > 172800
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: No successful Renovate scan in the last 48h
            description: |
              Daily scan CronJob has not completed successfully for >48h.
              Likely causes: PAT expired, Vault/ESO sync broken, pod OOM.
