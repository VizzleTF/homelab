# OpenBao - Apache 2.0 fork of HashiCorp Vault
# HA deployment with Raft storage, parallel to Vault during migration

homelab-common:
  veleroSchedules:
    - name: openbao-daily
      schedule: "5 2 * * *"
      template:
        # Only StatefulSet leader pod — на нём Raft snapshot.
        labelSelector: &openbao_lsel
          matchLabels:
            statefulset.kubernetes.io/pod-name: openbao-0
        csiSnapshotTimeout: 10m
        itemOperationTimeout: 30m0s
        hooks: &openbao_hooks
          resources:
            - name: raft-snapshot
              includedResources: [pods]
              labelSelector:
                matchLabels:
                  statefulset.kubernetes.io/pod-name: openbao-0
              pre:
                - exec:
                    container: openbao
                    command:
                      - /bin/sh
                      - -c
                      - |
                        set -e
                        export BAO_ADDR=http://127.0.0.1:8200
                        mkdir -p /openbao/data/.velero
                        JWT=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                        export BAO_TOKEN=$(bao write -field=token auth/kubernetes/login role=openbao-snapshot jwt="$JWT")
                        bao operator raft snapshot save /openbao/data/.velero/raft.snap
                    onError: Fail
                    timeout: 5m
    # Independent off-site copy → OVH (BSL ovh-direct). Тир секреты: daily, 90d.
    # Raft snapshot hook + leader-only labelSelector через YAML alias.
    - name: openbao-offsite
      schedule: "30 3 * * *"
      template:
        labelSelector: *openbao_lsel
        csiSnapshotTimeout: 10m
        itemOperationTimeout: 30m0s
        storageLocation: ovh-direct
        ttl: "2160h0m0s"
        hooks: *openbao_hooks

  externalSecrets:
    - name: openbao-approle-credentials
      vaultPath: vault/approle
      targetName: openbao-snapshot-agent-token
      deletionPolicy: Retain
      templateEngineVersion: v2
      data:
        - secretKey: role_id
          property: role_id
        - secretKey: secret_id
          property: secret_id
      templateData:
        role-id: "{{ .role_id }}"
        secret-id: "{{ .secret_id }}"

  httpRoutes:
    - name: openbao
      hostname: openbao
      gateway: internal
      service:
        name: openbao-active
        port: 8200

  rbac:
    - serviceAccount:
        name: openbao
        create: false
      clusterRole:
        name: openbao-server
        rules:
          - apiGroups: [""]
            resources: ["pods"]
            verbs: ["get", "list", "watch"]

    - serviceAccount:
        name: openbao-auth
        create: true
        automountServiceAccountToken: true
      clusterRole:
        name: openbao-auth-delegator
        rules:
          - apiGroups: [""]
            resources: ["serviceaccounts/token"]
            verbs: ["create"]
          - apiGroups: [""]
            resources: ["serviceaccounts"]
            verbs: ["get"]
          - apiGroups: ["authentication.k8s.io"]
            resources: ["tokenreviews"]
            verbs: ["create"]
          - apiGroups: ["authorization.k8s.io"]
            resources: ["subjectaccessreviews"]
            verbs: ["create"]
      clusterRoleBinding:
        name: openbao-auth-delegator-openbao

  limitRange:
    enabled: true
    name: default-limits
    defaults:
      cpu: 250m
      memory: 256Mi
    defaultRequests:
      cpu: 50m
      memory: 64Mi

server:
  # RollingUpdate (chart default = OnDelete): auto-roll pods on image/chart bumps
  # без ручного delete. Reverse-ordinal по одному, ждёт Ready между подами —
  # autounseal расшиливает холодный pod (~30s) до readiness. active (openbao-0)
  # катится последним. См. memory reference-openbao-autounseal-broken-full-reboot.
  updateStrategyType: "RollingUpdate"

  resources:
    requests:
      memory: 250Mi
      cpu: 80m
    limits:
      memory: 540Mi
      cpu: 200m

  extraEnvironmentVars:
    GOMEMLIMIT: "460MiB"

  dataStorage:
    size: 2Gi
    storageClass: longhorn
    accessMode: ReadWriteMany
    annotations:
      helm.sh/resource-policy: keep

  auditStorage:
    enabled: true
    size: 1Gi
    storageClass: longhorn
    accessMode: ReadWriteMany
    annotations:
      helm.sh/resource-policy: keep

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        disable_mlock = true

        cache {
          size = "32768"
        }

        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "raft" {
          path = "/openbao/data"

          retry_join {
            leader_api_addr = "http://openbao-0.openbao-internal:8200"
          }

          retry_join {
            leader_api_addr = "http://openbao-1.openbao-internal:8200"
          }

          retry_join {
            leader_api_addr = "http://openbao-2.openbao-internal:8200"
          }
        }

        service_registration "kubernetes" {}

  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
        add:
          - IPC_LOCK

injector:
  resources:
    requests:
      memory: 100Mi
      cpu: 15m
    limits:
      memory: 192Mi
      cpu: 100m

ui:
  enabled: true
