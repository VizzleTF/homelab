# OpenBao Auto-Unseal Configuration
# Fork chart: openbao-autounseal @ https://vizzletf.github.io/openbao_autounseal
# (fork of pyToshka/vault-autounseal — rebranded, ghcr image, OPENBAO_* env,
#  loop-refresh + configurable label-selector fix). See repo README.
#
# All OpenBao functional settings are chart defaults (no override needed):
#   openbao_url=http://openbao.openbao:8200, secret_shares 3 / threshold 3,
#   root_token_secret=openbao-root-token, keys_secret=openbao-keys,
#   label_selector=app.kubernetes.io/instance=openbao,component=server,
#   image=ghcr.io/vizzletf/openbao-autounseal:<appVersion>.
# Only deployment ops overrides are set below.

replicaCount: 1

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 15m
    memory: 100Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 1000

podSecurityContext:
  fsGroup: 1000

serviceAccount:
  create: true
