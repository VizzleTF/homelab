# OpenBao Auto-Unseal Configuration
# Uses pytoshka/vault-autounseal chart — works with OpenBao via /sys/init + /sys/unseal API compat

image:
  repository: opennix/vault-autounseal
  # Upstream only publishes versioned tags as `vault-autounseal-X.Y.Z`; an
  # extractVersion rule in renovate.json strips the prefix so Renovate can track it.
  tag: vault-autounseal-0.5.2
  pullPolicy: IfNotPresent

replicaCount: 1

settings:
  vault_url: "http://openbao.openbao:8200"
  vault_secret_shares: 3
  vault_secret_threshold: 3
  vault_root_token_secret: "openbao-root-token"
  vault_keys_secret: "openbao-keys"
  scan_delay: 5
  vault_label_selector: "app.kubernetes.io/instance=openbao,component=server"

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 15m
    memory: 100Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 1000

podSecurityContext:
  fsGroup: 1000

serviceAccount:
  create: true

nodeSelector: {}

tolerations: []

affinity: {}

logLevel: INFO
