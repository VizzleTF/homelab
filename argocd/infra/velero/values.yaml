# Velero — cluster backup/restore.
# Provider: aws (Garage S3 на Synology, тот же endpoint, что и Longhorn/CNPG barman).
# Снапшоты PVC: CSI snapshot data movement (Kopia) поверх Longhorn driver.
# В этом PR — только инсталляция + BSL + VSL. Schedule CR-ы добавим отдельным PR
# после ручной проверки `velero backup-location get`.

image:
  repository: velero/velero
  pullPolicy: IfNotPresent

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.13.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Node-agent DaemonSet — Kopia uploader для CSI snapshot data movement.
# Без него Velero может бэкапить только манифесты, без данных PVC.
deployNodeAgent: true
nodeAgent:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 1Gi
  priorityClassName: ""
  # DaemonSet только на воркерах — на CP горячо (apiserver/etcd/controllers).
  # У homelab нет NoSchedule taint'а на CP, поэтому используем явный nodeSelector
  # по label node-role.kubernetes.io/worker (стандартный Talos worker label).
  nodeSelector:
    node-role.kubernetes.io/worker: ""
  # ConfigMap node-agent-config НЕ auto-discovered — Velero подхватывает его
  # только когда явно указан через флаг. Без этого loadAffinity / loadConcurrency
  # игнорируются и expose pods data-mover'а попадают на CP-ноды.
  extraArgs:
    - --node-agent-configmap=node-agent-config

backupsEnabled: true
snapshotsEnabled: true

configuration:
  uploaderType: kopia
  features: EnableCSI
  defaultVolumesToFsBackup: false
  defaultBackupTTL: "720h"        # 30d — переопределяется per-Schedule
  garbageCollectionFrequency: "1h"

  backupStorageLocation:
    - name: garage-default
      provider: aws
      bucket: velero-backups
      default: true
      credential:
        name: velero-garage-creds
        key: cloud
      config:
        region: garage            # обязательно — Garage отвергает HeadBucket с пустым region
        s3ForcePathStyle: "true"
        s3Url: https://s3.example.com
    # Secondary off-site BSL on OVH (Frankfurt). Mirror Garage через CronJob
    # ниже — Velero сам в этот bucket не пишет, но BSL зарегистрирован чтобы
    # restore из него работал когда Synology умрёт. accessMode ReadOnly = velero
    # никогда не попытается update objects сам.
    - name: ovh-backup
      provider: aws
      bucket: vaka-homelab
      default: false
      accessMode: ReadOnly
      credential:
        name: velero-ovh-creds
        key: cloud
      config:
        region: de
        s3ForcePathStyle: "true"
        s3Url: https://s3.de.io.cloud.ovh.net

  volumeSnapshotLocation:
    - name: garage-default
      provider: aws
      config:
        region: garage

credentials:
  useSecret: true
  existingSecret: velero-garage-creds

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: victoria-metrics-k8s-stack

# CRD-ы поставляются Helm-чартом; за пределами Helm их трогает только Velero сам.
# Сейчас не требуется ignoreDifferences — добавим, если ArgoCD начнёт диффать поля,
# которые меняет velero-server.

# ─── ESO secret для Garage ───
# Vault path: home/homelab/k8s/velero/s3-velero (конвенция scripts/garage-bucket.sh)
# Keys: ACCESS_KEY_ID, ACCESS_SECRET_KEY
# Готовится skill'ом creating-garage-bucket: bucket=velero-backups, key=velero, ns=velero.
homelab-common:
  externalSecrets:
    - name: velero-garage-creds
      vaultPath: velero/s3-velero
      templateData:
        cloud: |
          [default]
          aws_access_key_id = {{ .access_key }}
          aws_secret_access_key = {{ .secret_key }}
      data:
        - secretKey: access_key
          property: ACCESS_KEY_ID
        - secretKey: secret_key
          property: ACCESS_SECRET_KEY

    # OVH credentials для secondary BSL `ovh-backup`.
    # Vault path: home/homelab/k8s/velero/s3-ovh — keys ACCESS_KEY_ID, ACCESS_SECRET_KEY.
    - name: velero-ovh-creds
      vaultPath: velero/s3-ovh
      templateData:
        cloud: |
          [default]
          aws_access_key_id = {{ .access_key }}
          aws_secret_access_key = {{ .secret_key }}
      data:
        - secretKey: access_key
          property: ACCESS_KEY_ID
        - secretKey: secret_key
          property: ACCESS_SECRET_KEY

    # ENV vars Secret для rclone CronJob (mirror Garage → OVH).
    # Один Secret содержит RCLONE_CONFIG_<REMOTE>_* для двух remote'ов сразу.
    - name: velero-mirror-rclone-env
      data:
        - secretKey: garage_ak
          vaultPath: velero/s3-velero
          property: ACCESS_KEY_ID
        - secretKey: garage_sk
          vaultPath: velero/s3-velero
          property: ACCESS_SECRET_KEY
        - secretKey: ovh_ak
          vaultPath: velero/s3-ovh
          property: ACCESS_KEY_ID
        - secretKey: ovh_sk
          vaultPath: velero/s3-ovh
          property: ACCESS_SECRET_KEY
      templateData:
        RCLONE_CONFIG_GARAGE_TYPE: "s3"
        RCLONE_CONFIG_GARAGE_PROVIDER: "Other"
        RCLONE_CONFIG_GARAGE_ENDPOINT: "https://s3.example.com"
        RCLONE_CONFIG_GARAGE_REGION: "garage"
        RCLONE_CONFIG_GARAGE_FORCE_PATH_STYLE: "true"
        RCLONE_CONFIG_GARAGE_ACCESS_KEY_ID: "{{ .garage_ak }}"
        RCLONE_CONFIG_GARAGE_SECRET_ACCESS_KEY: "{{ .garage_sk }}"
        RCLONE_CONFIG_OVH_TYPE: "s3"
        RCLONE_CONFIG_OVH_PROVIDER: "Other"
        RCLONE_CONFIG_OVH_ENDPOINT: "https://s3.de.io.cloud.ovh.net"
        RCLONE_CONFIG_OVH_REGION: "de"
        RCLONE_CONFIG_OVH_FORCE_PATH_STYLE: "true"
        RCLONE_CONFIG_OVH_ACCESS_KEY_ID: "{{ .ovh_ak }}"
        RCLONE_CONFIG_OVH_SECRET_ACCESS_KEY: "{{ .ovh_sk }}"
