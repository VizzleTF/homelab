# One-shot smoke backup для валидации Velero data path end-to-end.
# Prune=false: после удаления этого манифеста из git ArgoCD НЕ снесёт CR,
# Velero TTL (168h) сам зачистит после успешного backup'а и через 7 дней
# объект в Garage. Манифест можно удалить из git как только Phase: Completed.
apiVersion: velero.io/v1
kind: Backup
metadata:
  name: cluster-state-manual-1
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    velero.io/smoke-purpose: "first manual run to validate cluster-state-weekly Schedule"
spec:
  storageLocation: garage-default
  ttl: 168h0m0s
  includeClusterResources: true
  snapshotVolumes: false
  defaultVolumesToFsBackup: false
  excludedNamespaces:
    - cnpg
    - immich
    - nextcloud
    - forgejo
    - vaultwarden
    - openbao
