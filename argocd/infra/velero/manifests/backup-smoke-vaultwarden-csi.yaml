# One-shot smoke backup для валидации CSI snapshot data movement
# до того как homelab-daily сработает по cron.
# Vaultwarden — самый маленький PVC (~1 GiB), быстрый round-trip.
# Prune=false: после Phase=Completed манифест можно удалить из git
# отдельным PR, Velero TTL (24h) сам сотрёт CR + объект в Garage.
apiVersion: velero.io/v1
kind: Backup
metadata:
  name: vaultwarden-csi-smoke-1
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    velero.io/smoke-purpose: "first CSI snapshot data movement validation"
spec:
  storageLocation: garage-default
  ttl: 24h0m0s
  includedNamespaces: [vaultwarden]
  snapshotMoveData: true
  snapshotVolumes: true
  csiSnapshotTimeout: 15m
  defaultVolumesToFsBackup: false
