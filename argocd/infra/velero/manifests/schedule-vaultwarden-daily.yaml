# Vaultwarden daily — PVC namespace vaultwarden.
# 02:50 UTC, stagger от forgejo (02:40). Маленький PVC (~1 GiB), быстро.
#
# Pre-hook `sync`. Vaultwarden image (alpine) не содержит sqlite3 CLI,
# поэтому atomic SQLite `.backup` невозможен — полагаемся на sync +
# CSI snapshot atomicity. Race-окно writes-during-snapshot микроскопическое
# для single-user homelab.
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: vaultwarden-daily
  namespace: velero
spec:
  schedule: "50 2 * * *"
  template:
    ttl: 720h0m0s
    storageLocation: garage-default
    includedNamespaces: [vaultwarden]
    snapshotMoveData: true
    csiSnapshotTimeout: 15m
    itemOperationTimeout: 4h0m0s
    defaultVolumesToFsBackup: false
    hooks:
      resources:
        - name: sync-buffers
          includedNamespaces: [vaultwarden]
          includedResources: [pods]
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: vaultwarden
          pre:
            - exec:
                container: vaultwarden
                command: ["/bin/sh", "-c", "sync"]
                onError: Continue
                timeout: 30s
