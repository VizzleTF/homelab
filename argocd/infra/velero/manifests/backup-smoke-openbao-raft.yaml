# One-shot smoke backup для валидации bao raft snapshot hook
# до того как openbao-hourly начнёт работать.
# Prune=false: после Phase=Completed манифест можно удалить из git
# отдельным PR, Velero TTL (24h) сам сотрёт CR + объект в Garage.
apiVersion: velero.io/v1
kind: Backup
metadata:
  name: openbao-raft-smoke-1
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    velero.io/smoke-purpose: "validate bao raft snapshot hook end-to-end"
spec:
  storageLocation: garage-default
  ttl: 24h0m0s
  includedNamespaces: [openbao]
  labelSelector:
    matchLabels:
      statefulset.kubernetes.io/pod-name: openbao-0
  snapshotMoveData: true
  snapshotVolumes: true
  csiSnapshotTimeout: 10m
  defaultVolumesToFsBackup: false
  hooks:
    resources:
      - name: raft-snapshot
        includedNamespaces: [openbao]
        includedResources: [pods]
        labelSelector:
          matchLabels:
            statefulset.kubernetes.io/pod-name: openbao-0
        pre:
          - exec:
              container: openbao
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  export BAO_ADDR=http://127.0.0.1:8200
                  mkdir -p /openbao/data/.velero
                  JWT=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  export BAO_TOKEN=$(bao write -field=token auth/kubernetes/login role=openbao-snapshot jwt="$JWT")
                  bao operator raft snapshot save /openbao/data/.velero/raft-smoke.snap
              onError: Fail
              timeout: 5m
