# Forgejo daily — PVC namespace forgejo.
# 02:40 UTC, stagger от nextcloud (02:30) чтобы не было параллельных
# upload'ов на одну воркер-ноду.
#
# Pre-hook `sync` — flushes dirty pages перед CSI snapshot. БД в shared
# CNPG (Barman handles consistency). PVC содержит git-repositories,
# LFS attachments, gitea/conf.
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: forgejo-daily
  namespace: velero
spec:
  schedule: "40 2 * * *"
  template:
    ttl: 720h0m0s
    storageLocation: garage-default
    includedNamespaces: [forgejo]
    snapshotMoveData: true
    csiSnapshotTimeout: 15m
    itemOperationTimeout: 4h0m0s
    defaultVolumesToFsBackup: false
    hooks:
      resources:
        - name: sync-buffers
          includedNamespaces: [forgejo]
          includedResources: [pods]
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: forgejo
          pre:
            - exec:
                container: forgejo
                command: ["/bin/sh", "-c", "sync"]
                onError: Continue
                timeout: 30s
