# Velero node-agent читает этот ConfigMap при старте (auto-discover by name).
# loadAffinity ограничивает где Velero шедулит data-mover expose pods —
# исключаем CP (talos-cp-01..03) чтобы тяжелое CSI snapshot data movement
# не давил на apiserver/etcd.
#
# loadConcurrency.globalConfig: 2 — максимум 2 параллельных upload'а
# на одну ноду. Без этого 5 PVC одновременно могут забить worker.
apiVersion: v1
kind: ConfigMap
metadata:
  name: node-agent-config
  namespace: velero
data:
  node-agent-config.yaml: |
    loadConcurrency:
      globalConfig: 2
    loadAffinity:
      - nodeSelector:
          matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist
