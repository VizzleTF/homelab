# Velero node-agent reads this ConfigMap при старте — флаг
# --node-agent-configmap=node-agent-config указан в values.yaml
# (nodeAgent.extraArgs).
#
# ⚠ content ДОЛЖЕН быть JSON, не YAML. Velero делает json.Unmarshal,
# YAML падает с "invalid character 'l' looking for beginning of value".
#
# loadAffinity: исключает control-plane nodes (apiserver/etcd живут там).
# loadConcurrency.globalConfig: 2 — максимум 2 параллельных DataUpload
# на одну ноду чтобы не забивать диск/сеть.
apiVersion: v1
kind: ConfigMap
metadata:
  name: node-agent-config
  namespace: velero
data:
  node-agent-config: |
    {
      "loadConcurrency": {
        "globalConfig": 2
      },
      "loadAffinity": [
        {
          "nodeSelector": {
            "matchExpressions": [
              {
                "key": "node-role.kubernetes.io/control-plane",
                "operator": "DoesNotExist"
              }
            ]
          }
        }
      ]
    }
