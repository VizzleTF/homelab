# Immich daily — File System Backup mode (НЕ CSI snapshot data movement).
#
# Почему FSB вместо CSI: immich-library-pvc 185 GiB, RWX. Velero CSI требует
# создать клон PVC из VolumeSnapshot, и Longhorn для 185 GiB на холодном
# старте не успевает provision в Velero --resource-timeout 15min →
# DataUpload фейлится в Accepted фазе.
#
# FSB: node-agent монтит уже существующий PVC через kubelet hostPath bind
# (без clone), Kopia читает напрямую. Скорость = чистый Garage upload.
#
# Trade-off: нет point-in-time block-level consistency. Mitigation:
# pre-hook `sync` flushes dirty pages, immich фото append-only — write race
# окно минимально и не повредит file integrity.
#
# В namespace immich три PVC:
#   immich-library-pvc       RWX 185 GiB   фото — backed up
#   immich-machine-learning  RWX 15 GiB    ML model cache — SKIPPED via resourcePolicy
#                                          (регенерируется автоматически)
#   immich-cluster-1         RWO 10 GiB    CNPG pgdata — excluded labelSelector'ом
#                                          (CNPG → Barman)
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: immich-daily
  namespace: velero
spec:
  schedule: "0 3 * * *"
  template:
    ttl: 720h0m0s
    storageLocation: garage-default
    includedNamespaces: [immich]
    labelSelector:
      matchExpressions:
        - key: cnpg.io/cluster
          operator: DoesNotExist
    defaultVolumesToFsBackup: true     # ← FSB на все volumes immich-server pod
    snapshotVolumes: false             # ← без CSI snapshot
    snapshotMoveData: false
    itemOperationTimeout: 6h0m0s
    resourcePolicy:                    # ← skip immich-machine-learning cache
      kind: configmap
      name: immich-fsb-policy
    hooks:
      resources:
        - name: immich-sync
          includedNamespaces: [immich]
          includedResources: [pods]
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: server
          pre:
            - exec:
                container: main
                command: ["/bin/sh", "-c", "sync"]
                onError: Continue
                timeout: 30s
