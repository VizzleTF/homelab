# prometheus-smartctl-exporter — per-node DaemonSet exposing disk SMART metrics
# (smartctl_device_*) for drive-failure prediction on bare-metal nodes. node-
# exporter does NOT collect SMART; this fills that gap for the Longhorn-on-
# physical-disk setup.
#
# Chart defaults already run the pod privileged (runAsUser:0) with a hostPath
# /dev mount so smartctl can read the physical disks — no extra securityContext
# needed. Default tolerations (NoSchedule/Exists) place it on every node incl.
# control-planes (which also run workloads here).
#
# serviceMonitor/prometheusRules stay disabled (chart default) — the cluster has
# no Prometheus-operator CRDs; scrape + alerts are wired via native VMServiceScrape
# and VMRule under manifests/.

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi
