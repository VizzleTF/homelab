# Rancher local-path-provisioner — node-local hostPath PVs for ephemeral /
# rebuildable data (build caches, scratch, restore-from-backup). Avoids
# Longhorn's 2x write amplification + network replica overhead for throwaway
# data. NOT for anything that must survive a node loss — data is pinned to one
# node and dies with it.
#
# StorageClass `local-path`: WaitForFirstConsumer (provisions on the node the
# pod lands on), reclaimPolicy Delete, defaultClass false (Longhorn stays the
# cluster default). Consuming PVCs opt in via `storageClassName: local-path`.
#
# ⚠️ Talos: the rootfs is read-only — only /var is writable. Override the
# default /opt path to /var/local-path-provisioner (the ephemeral partition;
# survives reboot, wiped on `talosctl reset`). hostPath helper pod runs
# privileged (PSA enforce=privileged allows it).

storageClass:
  create: true
  defaultClass: false
  name: local-path
  reclaimPolicy: Delete
  volumeBindingMode: WaitForFirstConsumer

nodePathMap:
  - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
    paths:
      - /var/local-path-provisioner

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi
