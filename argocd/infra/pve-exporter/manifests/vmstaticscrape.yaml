# prometheus-pve-exporter — multi-target exporter pattern.
# vmagent скребёт сервис экспортёра с ?target=<pve-ip> для каждой ноды;
# лейбл instance подменяется на IP узла PVE, чтобы метрики были разделимы.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMStaticScrape
metadata:
  name: pve-exporter
  namespace: victoria-metrics
spec:
  jobName: pve-exporter
  targetEndpoints:
    - targets:
        - "10.11.11.11"
        - "10.11.11.12"
        - "10.11.11.13"
        - "10.11.11.14"
        - "10.11.11.15"
        - "10.11.11.16"
      path: /pve
      scheme: http
      interval: 60s
      scrapeTimeout: 30s
      relabelConfigs:
        - sourceLabels: [__address__]
          targetLabel: __param_target
        - sourceLabels: [__param_target]
          targetLabel: instance
        - targetLabel: __address__
          replacement: pve-exporter-prometheus-pve-exporter.victoria-metrics.svc.cluster.local:80
---
# Самоскрэйп /metrics — метрики самого экспортёра (ошибки, длительность).
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: pve-exporter-self
  namespace: victoria-metrics
spec:
  namespaceSelector:
    matchNames:
      - victoria-metrics
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus-pve-exporter
      app.kubernetes.io/instance: pve-exporter
  endpoints:
    - port: http
      path: /metrics
      interval: 60s
---
# prometheus-node-exporter на PVE-хостах (раскатан ansible-ролью pve_node_exporter).
# Запущен с --collector.disable-defaults --collector.hwmon, отдаёт ТОЛЬКО hwmon-метрики
# (CPU coretemp, NVMe Composite) — нужны для алертов на перегрев. Остальные node-метрики
# не нужны: CPU/disk/net уже собирает pve-exporter через Proxmox API.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMStaticScrape
metadata:
  name: pve-node-exporter
  namespace: victoria-metrics
spec:
  jobName: pve-node-exporter
  targetEndpoints:
    - targets:
        - "10.11.11.11:9100"
        - "10.11.11.12:9100"
        - "10.11.11.13:9100"
        - "10.11.11.14:9100"
        - "10.11.11.15:9100"
        - "10.11.11.16:9100"
      path: /metrics
      scheme: http
      interval: 60s
      scrapeTimeout: 10s
