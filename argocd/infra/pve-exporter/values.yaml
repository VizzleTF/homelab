# Generated by terraform modules/ansible_inventory — do not edit by hand.
# Source: terraform_proxmox/configs/pve_hosts.yaml
# Helm chart: christianhuth/prometheus-pve-exporter
# Конвертация ServiceMonitor → VMServiceScrape делается VM Operator'ом
# (disable_prometheus_converter: false в argocd/infra/victoria-metrics-k8s-stack/values.yaml).

chart: prometheus-pve-exporter

homelab-common:
  externalSecrets:
    - name: pve-exporter-auth
      vaultPath: victoria-metrics/pve-exporter
      # Чарт читает только tokenName/tokenValue из секрета — pveUser при этом кладётся
      # env.pveUser как ЗНАЧЕНИЕ (не ключ секрета). Потому в секрете только 2 поля.
      data:
        - secretKey: tokenName
          property: token_name
        - secretKey: tokenValue
          property: token_value

env:
  pveAuthType: token
  pveUser: exporter@pve
  pveExistingSecretName: pve-exporter-auth
  pveVerifySsl: false

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# ServiceMonitor отключён — у нас нет prometheus-operator CRD, только victoria-metrics.
# Вместо этого VMServiceScrape задаётся в argocd/infra/pve-exporter/manifests/
# (см. extraManifests: true в argocd/infra/pve-exporter/config.yaml).
serviceMonitor:
  enabled: false
