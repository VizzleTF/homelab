# CloudNativePG Immich Cluster Configuration
# Dedicated cluster for Immich application with vector support

mode: standalone

cluster:
  annotations:
    helm.sh/resource-policy: keep
  instances: 1
  # PG17 → 18 via CNPG declarative offline pg_upgrade (vchord pinned at 1.1.0 both
  # sides — upgraded separately on PG17 first, so this is a clean major upgrade).
  # tensorchord image bundles barman → in-tree backups continue (no plugin).
  # Compound <pgmajor>.<pgminor>-<vchord> tag — Renovate-managing it is a known-hard case.
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:18.3-1.1.0

  env:
    - name: AWS_DEFAULT_REGION
      value: garage

  storage:
    size: "10Gi"
    storageClass: "longhorn"

  resources:
    requests:
      memory: "1Gi"
      cpu: "100m"
    limits:
      memory: "4Gi"
      cpu: "2"

  # Role name MUST equal the `username` key in immich-db-credentials (Vault
  # immich/main-database → "immich"), else CNPG refuses to reconcile the managed
  # role: "wrong username 'immich' in secret, expected '<role>'" every ~16 min.
  # The cluster was barman-restored (2026-05); restored data + all 66 tables +
  # the immich DB are owned by role `immich`, and the app connects as `immich`
  # (non-superuser, and the pg-logical dump runs fine as owner) — so `immich`,
  # superuser:false, is the source of truth. The old `immich_user` superuser was
  # a phantom (owned nothing); drop it manually after this reconciles.
  roles:
    - name: immich
      ensure: present
      comment: "Immich application user for database access"
      login: true
      superuser: false
      inherit: true
      connectionLimit: -1
      passwordSecret:
        name: immich-db-credentials

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "512MB"
      effective_cache_size: "2GB"
      work_mem: "16MB"
      maintenance_work_mem: "256MB"
    shared_preload_libraries:
      - "vchord.so"

  initdb:
    database: immich
    # Historical (init ran once, immutable in effect). Aligned to the real owner
    # `immich` for truthfulness; changing it has no effect on the live cluster.
    owner: immich
    postInitSQL:
      - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;

backups:
  enabled: true
  endpointURL: "https://s3.example.com"
  # Permanent path. Originally `immich-cluster-restored` was a fresh path to pass
  # the CNPG "Expected empty archive" check during a barman recovery (2026-05);
  # recovery long verified and the old `immich-cluster/` archive purged 2026-06-01,
  # so this stays as the canonical path (reverting would re-trigger the empty-archive
  # check for no benefit).
  destinationPath: "s3://cnpg-backups/immich-cluster-restored"
  provider: s3
  secret:
    create: false
    name: cnpg-s3-backup
  retentionPolicy: "7d"
  scheduledBackups:
    - name: daily-backup
      schedule: "0 30 4 * * *"
      backupOwnerReference: self
      method: barmanObjectStore
