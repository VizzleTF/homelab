# CloudNativePG Immich Cluster Configuration
# Dedicated cluster for Immich application with vector support
#
# TEMPORARY RECOVERY MODE 2026-05-17: data lost via accidental
# `argocd app sync immich --replace`. Restore from barman backup
# 20260517T043000 + WAL replay to PITR target before incident.
# Revert to `mode: standalone` once data verified.

mode: recovery

recovery:
  method: object_store
  clusterName: immich-cluster
  database: immich
  owner: immich_user
  destinationPath: "s3://cnpg-backups/immich-cluster"
  endpointURL: "https://s3.example.com"
  provider: s3
  secret:
    create: false
    name: cnpg-s3-backup
  # Removed PITR target: last archived WAL ends at 2026-05-17 06:46:00 UTC.
  # Target 07:13 UTC fails with "recovery ended before configured recovery
  # target was reached". Recover to latest available WAL instead.

cluster:
  annotations:
    helm.sh/resource-policy: keep
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:17-0.4.3

  env:
    - name: AWS_DEFAULT_REGION
      value: garage

  storage:
    size: "10Gi"
    storageClass: "longhorn"

  resources:
    requests:
      memory: "1Gi"
      cpu: "100m"
    limits:
      memory: "4Gi"
      cpu: "2"

  roles:
    - name: immich_user
      ensure: present
      comment: "Immich application user for database access"
      login: true
      superuser: true
      inherit: true
      connectionLimit: -1
      passwordSecret:
        name: immich-db-credentials

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "512MB"
      effective_cache_size: "2GB"
      work_mem: "16MB"
      maintenance_work_mem: "256MB"
    shared_preload_libraries:
      - "vchord.so"

  initdb:
    database: immich
    owner: immich_user
    postInitSQL:
      - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;

backups:
  enabled: true
  endpointURL: "https://s3.example.com"
  # TEMPORARY: new path to satisfy CNPG "Expected empty archive" check during
  # recovery. Old path s3://cnpg-backups/immich-cluster/ stays as recovery
  # source. Revert to original path after recovery is verified + old archive
  # cleared.
  destinationPath: "s3://cnpg-backups/immich-cluster-restored"
  provider: s3
  secret:
    create: false
    name: cnpg-s3-backup
  retentionPolicy: "7d"
  scheduledBackups:
    - name: daily-backup
      schedule: "0 30 4 * * *"
      backupOwnerReference: self
      method: barmanObjectStore
