# CloudNativePG Immich Cluster Configuration
# Dedicated cluster for Immich application with vector support

mode: standalone

cluster:
  annotations:
    helm.sh/resource-policy: keep
  instances: 1
  # Stage 1 of PG18 migration: vchord 0.4.3 → 1.1.0 on PG17 (ext upgrade only,
  # no pg_upgrade). After rollout: ALTER EXTENSION vchord UPDATE + REINDEX
  # clip_index/face_index. Stage 2 bumps to 18.3-1.1.0 (pg_upgrade). Compound
  # <pgmajor>.<pgminor>-<vchord> tag — Renovate-managing it is a known-hard case.
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:17.9-1.1.0

  env:
    - name: AWS_DEFAULT_REGION
      value: garage

  storage:
    size: "10Gi"
    storageClass: "longhorn"

  resources:
    requests:
      memory: "1Gi"
      cpu: "100m"
    limits:
      memory: "4Gi"
      cpu: "2"

  roles:
    - name: immich_user
      ensure: present
      comment: "Immich application user for database access"
      login: true
      superuser: true
      inherit: true
      connectionLimit: -1
      passwordSecret:
        name: immich-db-credentials

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "512MB"
      effective_cache_size: "2GB"
      work_mem: "16MB"
      maintenance_work_mem: "256MB"
    shared_preload_libraries:
      - "vchord.so"

  initdb:
    database: immich
    owner: immich_user
    postInitSQL:
      - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;

backups:
  enabled: true
  endpointURL: "https://s3.example.com"
  # Permanent path. Originally `immich-cluster-restored` was a fresh path to pass
  # the CNPG "Expected empty archive" check during a barman recovery (2026-05);
  # recovery long verified and the old `immich-cluster/` archive purged 2026-06-01,
  # so this stays as the canonical path (reverting would re-trigger the empty-archive
  # check for no benefit).
  destinationPath: "s3://cnpg-backups/immich-cluster-restored"
  provider: s3
  secret:
    create: false
    name: cnpg-s3-backup
  retentionPolicy: "7d"
  scheduledBackups:
    - name: daily-backup
      schedule: "0 30 4 * * *"
      backupOwnerReference: self
      method: barmanObjectStore
