# Immich Self-hosted Photo and Video Backup Solution
# Configuration for HomeLab deployment with CNPG PostgreSQL

# Общие ресурсы через homelab-common chart
homelab-common:
  veleroSchedules:
    - name: immich-daily
      schedule: "0 3 * * *"
      template:
        # FSB вместо CSI: 185 GiB clone не успевает за Velero 15m timeout.
        # node-agent монтит существующий PVC через kubelet hostPath, Kopia
        # читает напрямую — speed = чистый Garage upload bandwidth.
        defaultVolumesToFsBackup: true
        snapshotVolumes: false
        snapshotMoveData: false
        itemOperationTimeout: 6h0m0s
        # Excludes CNPG immich-cluster pgdata PVC (Barman handles Postgres).
        labelSelector: &immich_lsel
          matchExpressions:
            - key: cnpg.io/cluster
              operator: DoesNotExist
        # Skip immich-machine-learning PVC (ML model cache, регенерируется).
        resourcePolicy: &immich_rpol
          kind: configmap
          name: immich-fsb-policy
        hooks: &immich_hooks
          resources:
            - name: immich-sync
              includedResources: [pods]
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: server
              pre:
                - exec:
                    container: main
                    command: ["/bin/sh", "-c", "sync"]
                    onError: Continue
                    timeout: 30s
    # Independent off-site copy → OVH (BSL ovh-direct). Immich — самый важный
    # бэкап: 2×/нед (Wed+Sun), 90d. FSB (как daily), отдельный slot 05:00 (тяжёлый
    # kopia-scan 250Gi). Отдельный kopia-репо на OVH → независим от wipe Garage.
    # Те же scalar-флаги + aliases (*immich_lsel/_rpol/_hooks).
    - name: immich-offsite
      schedule: "0 5 * * 3,0"
      template:
        defaultVolumesToFsBackup: true
        snapshotVolumes: false
        snapshotMoveData: false
        itemOperationTimeout: 6h0m0s
        storageLocation: ovh-direct
        ttl: "2160h0m0s"
        labelSelector: *immich_lsel
        resourcePolicy: *immich_rpol
        hooks: *immich_hooks

  persistentVolumeClaims:
    - name: immich-library-pvc
      accessModes:
        - ReadWriteMany
      storageClassName: longhorn
      size: 250Gi
      # volumeName intentionally unpinned — the PV changes on every Velero restore,
      # and a stale pin makes the SSA dry-run reject the immutable field, breaking
      # diff (SYNC=Unknown). The global ignoreDifferences._PersistentVolumeClaim
      # masks the live volumeName instead. See reference_argocd_pvc_volumename_drift.

  externalSecrets:
    - name: immich-app-secrets
      vaultPath: immich/app-secrets
      data:
        - secretKey: db_password
          property: password
          vaultPath: immich/main-database
        - secretKey: jwt_secret
          property: jwt_secret
        - secretKey: typesense_api_key
          property: typesense_api_key
      templateData:
        DB_PASSWORD: "{{ .db_password }}"
        JWT_SECRET: "{{ .jwt_secret }}"
        TYPESENSE_API_KEY: "{{ .typesense_api_key }}"
    
    - name: immich-db-credentials
      vaultPath: immich/main-database
      data:
        - secretKey: username
          property: username
        - secretKey: password
          property: password
      templateData:
        username: "{{ .username }}"
        password: "{{ .password }}"
    
    - name: immich-main-user-credentials
      vaultPath: immich/main-database
      templateType: kubernetes.io/basic-auth
      data:
        - secretKey: username
          property: username
        - secretKey: password
          property: password
      templateData:
        username: "{{ .username }}"
        password: "{{ .password }}"
    
    - name: cnpg-s3-backup
      vaultPath: shared/s3-cnpg-backup
      data:
        - secretKey: ACCESS_KEY_ID
          property: ACCESS_KEY_ID
        - secretKey: ACCESS_SECRET_KEY
          property: ACCESS_SECRET_KEY

    # rclone OVH creds для pg_dump → pg-logical CronJob (независимый off-site
    # логический дамп immich DB, не зеркало barman). Vault: velero/s3-ovh.
    - name: ovh-pglogical-rclone
      vaultPath: velero/s3-ovh
      data:
        - secretKey: ovh_ak
          property: ACCESS_KEY_ID
        - secretKey: ovh_sk
          property: ACCESS_SECRET_KEY
      templateData:
        RCLONE_CONFIG_OVH_TYPE: "s3"
        RCLONE_CONFIG_OVH_PROVIDER: "Other"
        RCLONE_CONFIG_OVH_ENDPOINT: "https://s3.de.io.cloud.ovh.net"
        RCLONE_CONFIG_OVH_REGION: "de"
        RCLONE_CONFIG_OVH_FORCE_PATH_STYLE: "true"
        RCLONE_CONFIG_OVH_ACCESS_KEY_ID: "{{ .ovh_ak }}"
        RCLONE_CONFIG_OVH_SECRET_ACCESS_KEY: "{{ .ovh_sk }}"

    - name: immich-oidc-secret
      vaultPath: immich/oidc
      data:
        - secretKey: client_id
          property: client_id
        - secretKey: client_secret
          property: client_secret
      templateData:
        immich-config.json: |
          {
            "oauth": {
              "enabled": true,
              "issuerUrl": "https://authentik.example.com/application/o/immich/",
              "clientId": "{{ .client_id }}",
              "clientSecret": "{{ .client_secret }}",
              "scope": "openid email profile",
              "autoRegister": true,
              "autoLaunch": false,
              "buttonText": "Login with Authentik"
            },
            "machineLearning": {
              "clip": {
                "modelName": "nllb-clip-large-siglip__mrl"
              }
            }
          }
  
  httpRoutes:
    - name: immich
      hostname: immich
      gateway: both
      # gatus auto-discovery (home-operations/gatus-sidecar, opt-in)
      annotations:
        gatus.home-operations.com/enabled: "true"
      service:
        name: immich-server
        port: 2283
  
  cnpgDatabase:
    name: immich
    owner: immich_user
    clusterName: immich-cluster
    extensions:
      - name: vector
      - name: cube
      - name: earthdistance

  # Independent logical backup (pg_dump -Fc) immich DB → OVH pg-logical/immich-cluster/.
  # Параллельно barman→Garage. immich_user = superuser → дамп всей DB. Restore требует
  # vchord-image (CREATE EXTENSION vchord). Тир секреты: daily 03:55, 90d.
  cronJobs:
    - name: pglogical-offsite
      spec:
        schedule: "55 3 * * *"
        concurrencyPolicy: Forbid
        startingDeadlineSeconds: 600
        successfulJobsHistoryLimit: 1
        failedJobsHistoryLimit: 3
        jobTemplate:
          spec:
            backoffLimit: 2
            activeDeadlineSeconds: 3600
            template:
              spec:
                restartPolicy: OnFailure
                securityContext:
                  runAsNonRoot: true
                  runAsUser: 26
                  runAsGroup: 26
                  fsGroup: 26
                  seccompProfile:
                    type: RuntimeDefault
                initContainers:
                  - name: dump
                    image: ghcr.io/cloudnative-pg/postgresql:18-bookworm
                    imagePullPolicy: IfNotPresent
                    command: ["/bin/bash", "-c"]
                    args:
                      - |
                        set -euo pipefail
                        ts=$(date -u +%Y%m%dT%H%M%SZ)
                        echo "[$(date -u)] pg_dump immich"
                        PGPASSWORD="$IM_PASS" pg_dump -h immich-cluster-rw -U "$IM_USER" -Fc \
                          -d immich -f "/dump/immich-$ts.dump"
                        ls -lh /dump
                    env:
                      - name: IM_USER
                        valueFrom: { secretKeyRef: { name: immich-db-credentials, key: username } }
                      - name: IM_PASS
                        valueFrom: { secretKeyRef: { name: immich-db-credentials, key: password } }
                    volumeMounts:
                      - name: dump
                        mountPath: /dump
                    resources:
                      requests: { cpu: 50m, memory: 128Mi }
                      limits: { cpu: 500m, memory: 512Mi }
                containers:
                  - name: upload
                    image: rclone/rclone:1.74
                    imagePullPolicy: IfNotPresent
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        set -eu
                        echo "[$(date -u)] rclone copy /dump -> ovh:vaka-homelab/pg-logical/immich-cluster/"
                        rclone copy /dump ovh:vaka-homelab/pg-logical/immich-cluster/ \
                          --s3-acl=private --stats-one-line --stats=2m
                        echo "[$(date -u)] prune >90d"
                        rclone delete ovh:vaka-homelab/pg-logical/immich-cluster/ \
                          --min-age 2160h --rmdirs || true
                    envFrom:
                      - secretRef:
                          name: ovh-pglogical-rclone
                    volumeMounts:
                      - name: dump
                        mountPath: /dump
                    resources:
                      requests: { cpu: 50m, memory: 128Mi }
                      limits: { cpu: 500m, memory: 256Mi }
                volumes:
                  - name: dump
                    emptyDir: {}

_shared_config:
  hostname: &hostname immich.example.com
  url: &url https://immich.example.com
  # renovate: datasource=docker depName=ghcr.io/immich-app/immich-server
  version: &version "v2.7.5"
  # renovate: datasource=docker depName=ghcr.io/immich-app/immich-machine-learning
  ml_tag: &ml_tag "v2.7.5-openvino"

# Pod-level securityContext + soft affinity for the server component.
# Prefer the bare-metal ML worker so the server lands next to the ML pod (low-latency
# inter-pod calls during re-encode + thumbnail/transcode jobs), but fall back to any
# schedulable node if worker-01 is full or down — server is not GPU-bound, so a CP
# can run it without contention.
defaultPodOptions:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: node-role.kubernetes.io/ml
                operator: In
                values: ["true"]

# Controllers configuration for new chart structure
controllers:
  main:
    containers:
      main:
        image:
          tag: *version
        resources:
          requests:
            cpu: 500m
            memory: 2400Mi
          limits:
            # Server consolidates the v2.x microservices (job dispatcher, thumbnail
            # generator, metadata extractor, transcode launcher). During bulk re-encode
            # it was pinned at 1000m and the kernel throttled 93 % of periods, stealing
            # 5.4 x more CPU time than the pod was allowed to run. Bump to 6 cores;
            # worker-01 has 16 allocatable and runs at ~20 % otherwise.
            cpu: 6000m
            memory: 5Gi
        env:
          # PostgreSQL connection via CNPG
          DB_HOSTNAME: "immich-cluster-rw"
          DB_PORT: "5432"
          DB_DATABASE_NAME: "immich"
          DB_USERNAME:
            valueFrom:
              secretKeyRef:
                name: immich-db-credentials
                key: username
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-db-credentials
                key: password
          # Valkey connection — shared instance (ns valkey), Immich on DB index 1 to isolate from argocd/authentik/nextcloud (DB 0)
          REDIS_HOSTNAME: "valkey-primary.valkey.svc.cluster.local"
          REDIS_DBINDEX: "1"
          # Machine Learning service URL
          IMMICH_MACHINE_LEARNING_URL: "http://immich-machine-learning:3003"
          # Server URL
          IMMICH_SERVER_URL: *url
          PUBLIC_IMMICH_SERVER_URL: *url
          # OAuth / Authentik — v2.x uses config file, not env vars
          IMMICH_CONFIG_FILE: "/config/immich-config.json"

# Immich configuration
immich:
  persistence:
    # Main library storage for photos and videos
    library:
      existingClaim: "immich-library-pvc"

# Machine Learning component — OpenVINO image with Intel Iris Xe GPU (N100)
# i915 Talos extension installed; Intel GPU Device Plugin advertises gpu.intel.com/i915.
machine-learning:
  enabled: true
  defaultPodOptions:
    securityContext:
      seccompProfile:
        type: RuntimeDefault
    # Pin to dedicated bare-metal ML worker — CP VMs also carry intel.feature.node.kubernetes.io/gpu
    # via VFIO iGPU passthrough, so a GPU-label affinity would not actually exclude them.
    # Add the label with: kubectl label node <name> node-role.kubernetes.io/ml=true
    nodeSelector:
      node-role.kubernetes.io/ml: "true"
  controllers:
    main:
      strategy: Recreate
      containers:
        main:
          image:
            tag: *ml_tag
          env:
            MACHINE_LEARNING_DEVICE: GPU
            # PRELOAD env warms the model cache on pod start — it does NOT pick the active
            # model. The active CLIP model is read from Immich's system-config (DB or the
            # IMMICH_CONFIG_FILE JSON via $IMMICH_CONFIG_FILE on the server). See
            # immich-config.json templateData above for the authoritative setting.
            MACHINE_LEARNING_PRELOAD__CLIP: nllb-clip-large-siglip__mrl
            MACHINE_LEARNING_WORKERS: "1"
            MACHINE_LEARNING_WORKER_TIMEOUT: "0"
          # First boot with NLLB-Large on OpenVINO compiles the visual encoder ONNX graph
          # for ~10-25 min on an Intel iGPU (cached afterwards). Default startup probe of
          # 60×10s = 10 min is too tight; raise to 240×10s = 40 min. timeoutSeconds bumped
          # to 5 because gunicorn's single worker can't always reply to /ping in 1 s while
          # loading model weights. Liveness/readiness defaults are kept — once Ready, the
          # /ping endpoint is fast.
          probes:
            startup:
              spec:
                failureThreshold: 240
                periodSeconds: 10
                timeoutSeconds: 5
          resources:
            requests:
              cpu: 2000m
              memory: 4Gi
            limits:
              # NLLB-Large encoding pins to 2 cores at the previous 2000m limit and was
              # throttled ~80 % of the time (cgroup nr_throttled 1258/3293, throttled_usec
              # 295s/370s). Bump to 8 cores; worker-01 is 16-core, runs at ~20 % otherwise.
              # OpenVINO offloads tensor ops to iGPU but pre/post-processing stays on CPU.
              cpu: 8000m
              # NLLB-Large peak ~13-14 GB during OpenVINO JIT compile (model file 14.9 GB
              # on disk maps into memory plus working set). 8Gi was OOMKilled twice.
              memory: 16Gi
              gpu.intel.com/i915: "1"
  persistence:
    cache:
      enabled: true
      # NLLB-Large (~14.9 GB) + buffalo_l face detection + recognition + OpenVINO compile
      # caches + HF download temp files filled 20Gi to 100 %. Bump to 30Gi.
      size: 30Gi
      type: persistentVolumeClaim
      storageClass: "longhorn"
      accessMode: ReadWriteMany
      retain: true

# Valkey: используем shared valkey-primary в ns `valkey` (DB index 1)
valkey:
  enabled: false

persistence:
  immich-config:
    type: secret
    name: immich-oidc-secret
    advancedMounts:
      main:
        main:
          - path: /config
            readOnly: true

# Service configuration - ClusterIP since we use HTTPRoute via Gateway API
service:
  main:
    type: ClusterIP
