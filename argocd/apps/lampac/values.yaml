# Lampac - Media server with online sources, torrents and DLNA support
# Source: https://github.com/lampac-nextgen/lampac
# Chart: lampac_helm

replicaCount: 1

image:
  repository: ghcr.io/lampac-nextgen/lampac
  pullPolicy: IfNotPresent
  # Upstream tags every release as both `X.Y.Z` and `vX.Y.Z`. Stay on the non-v
  # scheme — a renovate.json rule (allowedVersions "!/^v/") locks tracking to it
  # so the prefix never flips and Renovate keeps bumping cleanly.
  tag: "1.35.5"

serviceAccount:
  create: true

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

# Service type: ClusterIP — доступ через cilium-gateway-internal HTTPRoute,
# фронтнэндом служит KEDA HTTP add-on interceptor (для on-demand scale-to-zero).
# Раньше LB IP 10.11.11.133 — теперь lampac.example.com через homelab-common.httpRoutes ниже.
service:
  type: ClusterIP
  port: 9118

homelab-common:
  httpRoutes:
    # KEDA-fronted scale-to-zero (см. argocd/apps/lampac/manifests/httpscaledobject.yaml).
    # `kedaColdStartLoadingPage: true` (homelab-common >= 1.7.3) переключает backend
    # на keda-loading-proxy → во время cold-start пользователь видит "сервис запускается".
    # `service:` оставлен fallback для v1.7.2 (флаг игнорируется на старом чарте).
    # Cross-namespace backendRef требует ReferenceGrant в keda ns
    # (argocd/infra/keda-add-ons-http/manifests/referencegrant.yaml).
    - name: lampac
      hostname: lampac
      gateway: internal
      kedaColdStartLoadingPage: true
      service:
        name: keda-add-ons-http-interceptor-proxy
        namespace: keda
        port: 8080

resources:
  requests:
    # Right-sized after observing 645Mi peak — was 1100Mi
    memory: "700Mi"
    cpu: "50m"
  limits:
    memory: "2400Mi"
    cpu: "500m"

# Probes - lampac-nextgen needs time to compile modules + bind Kestrel on cold start
# Observed cold-start bind ~130-150s on cp-01. Keep initialDelay short but widen
# the failure window: liveness 60+12*15=240s, readiness 60+10*15=210s.
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 12

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 10

# Environment variables
env:
  - name: LAMPAC_PORT
    value: "9118"

# ConfigMaps configuration
configMaps:
  initConf:
    enabled: true
    data: |
      {
        "listen": {
          "ip": "0.0.0.0",
          "port": 9118,
          "scheme": "http"
        },
        "chromium": {
          "enable": false
        },
        "BaseModule": {
          "SkipModules": [
            "OnlineUKR",
            "OnlineENG",
            "OnlineGEO",
            "OnlinePaid",
            "SISI",
            "Adult",
            "WatchTogether",
            "MsxNative",
            "ForkPlayerXML",
            "Community",
            "Catalog",
            "DLNA",
            "Tracks",
            "Transcoding",
            "WebLog",
            "NextHUB"
          ]
        }
      }

  manifest:
    enabled: false

volumes:
  - name: dshm
    emptyDir:
      medium: Memory
      sizeLimit: 2Gi

volumeMounts:
  - name: init-conf
    mountPath: /lampac/init.conf
    subPath: init.conf
    readOnly: true
  - name: dshm
    mountPath: /dev/shm
