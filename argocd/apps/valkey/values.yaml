architecture: standalone

auth:
  enabled: false

primary:
  # Explicit resources instead of resourcesPreset (Bitnami marks presets as not
  # production-ready). Live usage ~31m/26Mi; serves ArgoCD cache + authentik redis.
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  persistence:
    # Valkey is a pure cache (ArgoCD cache + authentik redis, DB-index split) —
    # rebuildable, so node-local local-path instead of Longhorn. Loss on node
    # death = ArgoCD re-caches + authentik sessions drop (re-login). RWO, single
    # standalone replica.
    storageClass: local-path
    size: 1Gi
    annotations:
      helm.sh/resource-policy: keep
