# Только homelab-common (второй источник ApplicationSet). Не смешивать с vaultwarden.yaml — upstream может иметь строгую values schema.
homelab-common:
  veleroSchedules:
    - name: vaultwarden-daily
      schedule: "50 2 * * *"
      template:
        hooks: &vw_hooks
          resources:
            # App-consistent SQLite backup: sqlite3 .backup в sidecar-контейнер
            # (vaultwarden image не содержит sqlite3 CLI). Файл .bak попадает
            # в CSI snapshot вместе с .sqlite3/-shm/-wal — на восстановлении
            # есть и live DB и гарантированно консистентный дамп.
            # Post-hook чистит .bak чтобы PVC не пух от старых дампов.
            - name: sqlite-online-backup
              includedResources: [pods]
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vaultwarden
              pre:
                - exec:
                    container: sqlite-helper
                    command:
                      - /bin/sh
                      - -c
                      - 'sqlite3 /data/db.sqlite3 ".backup /data/db.sqlite3.bak" && sync'
                    onError: Continue
                    timeout: 60s
              post:
                - exec:
                    container: sqlite-helper
                    command: ["/bin/sh", "-c", "rm -f /data/db.sqlite3.bak"]
                    onError: Continue
                    timeout: 15s
    # Independent off-site copy → OVH (BSL ovh-direct). Тир секреты: daily, 90d.
    # Те же hooks (YAML alias *vw_hooks). Не зеркало — переживает wipe Garage.
    - name: vaultwarden-offsite
      schedule: "35 3 * * *"
      template:
        storageLocation: ovh-direct
        ttl: "2160h0m0s"
        hooks: *vw_hooks

  httpRoutes:
    - name: vaultwarden
      hostname: pass
      gateway: external
      service:
        name: vaultwarden
        port: 80

  limitRange:
    enabled: true
    name: default-limits
    defaults:
      cpu: 200m
      memory: 256Mi
    defaultRequests:
      cpu: 25m
      memory: 32Mi
