# Только homelab-common (второй источник ApplicationSet). Не смешивать с vaultwarden.yaml — upstream может иметь строгую values schema.
homelab-common:
  veleroSchedules:
    - name: vaultwarden-daily
      schedule: "50 2 * * *"
      template:
        hooks:
          resources:
            # App-consistent SQLite backup: sqlite3 .backup в sidecar-контейнер
            # (vaultwarden image не содержит sqlite3 CLI). Файл .bak попадает
            # в CSI snapshot вместе с .sqlite3/-shm/-wal — на восстановлении
            # есть и live DB и гарантированно консистентный дамп.
            # Post-hook чистит .bak чтобы PVC не пух от старых дампов.
            - name: sqlite-online-backup
              includedResources: [pods]
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vaultwarden
              pre:
                - exec:
                    container: sqlite-helper
                    command:
                      - /bin/sh
                      - -c
                      - 'sqlite3 /data/db.sqlite3 ".backup /data/db.sqlite3.bak" && sync'
                    onError: Continue
                    timeout: 60s
              post:
                - exec:
                    container: sqlite-helper
                    command: ["/bin/sh", "-c", "rm -f /data/db.sqlite3.bak"]
                    onError: Continue
                    timeout: 15s

  httpRoutes:
    - name: vaultwarden
      hostname: pass
      gateway: external
      service:
        name: vaultwarden
        port: 80

  backupCronJobs:
    - name: backup-vaultwarden
      schedule: "0 1 * * *"
      type: rsync
      source:
        pvc: vaultwarden-data-vaultwarden-0
      destination:
        type: nfs
        path: /vaultwarden

    - name: webdav-backup-vaultwarden
      schedule: "0 7 * * *"
      type: rclone
      source:
        pvc: vaultwarden-data-vaultwarden-0
      destination:
        type: webdav
        remote: mailru:/backup/vaultwarden
        secretName: vaultwarden-webdav-credentials

  externalSecrets:
    - name: vaultwarden-webdav-credentials
      vaultPath: shared/webdav-backup
      data:
        - secretKey: password
          property: password
      templateData:
        RCLONE_CONFIG_MAILRU_PASS: "{{ .password }}"

  limitRange:
    enabled: true
    name: default-limits
    defaults:
      cpu: 200m
      memory: 256Mi
    defaultRequests:
      cpu: 25m
      memory: 32Mi
