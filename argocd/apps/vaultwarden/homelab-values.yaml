# Только homelab-common (второй источник ApplicationSet). Не смешивать с vaultwarden.yaml — upstream может иметь строгую values schema.
homelab-common:
  httpRoutes:
    - name: vaultwarden
      hostname: pass
      gateway: external
      service:
        name: vaultwarden
        port: 80

  backupCronJobs:
    - name: backup-vaultwarden
      schedule: "0 1 * * *"
      type: rsync
      source:
        pvc: vaultwarden-data-vaultwarden-0
      destination:
        type: nfs
        path: /vaultwarden

    - name: webdav-backup-vaultwarden
      schedule: "0 7 * * *"
      type: rclone
      source:
        pvc: vaultwarden-data-vaultwarden-0
      destination:
        type: webdav
        remote: mailru:/backup/vaultwarden
        secretName: vaultwarden-webdav-credentials

  externalSecrets:
    - name: vaultwarden-webdav-credentials
      vaultPath: shared/webdav-backup
      data:
        - secretKey: password
          property: password
      templateData:
        RCLONE_CONFIG_MAILRU_PASS: "{{ .password }}"

  limitRange:
    enabled: true
    name: default-limits
    defaults:
      cpu: 200m
      memory: 256Mi
    defaultRequests:
      cpu: 25m
      memory: 32Mi
