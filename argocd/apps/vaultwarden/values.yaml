# Vaultwarden (guerzon chart) — только ключи чарта; homelab-common в vaultwarden.homelab.yaml

storage:
  data:
    name: "vaultwarden-data"
    size: "2Gi"
    class: "longhorn"
    accessMode: "ReadWriteMany"
    keepPvc: true

domain: "https://pass.example.com"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  requests:
    memory: 32Mi
    cpu: 10m
  limits:
    memory: 128Mi
    cpu: 100m

ingress:
  enabled: false

initContainers:
  - name: fix-permissions
    image: busybox:1.38.0
    command: ["chown", "-R", "1001:1001", "/data"]
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
      allowPrivilegeEscalation: false
    volumeMounts:
      - name: vaultwarden-data
        mountPath: /data

# Sidecar mounts /data вместе с vaultwarden и даёт sqlite3 CLI
# для app-consistent backup (Velero pre-hook → sqlite3 .backup).
# Upstream vaultwarden/server:1.36.0-alpine не содержит sqlite3 CLI.
# Берём pre-built образ — apk add at runtime требует root, а
# podSecurityContext.runAsNonRoot:true это блокирует.
sidecars:
  - name: sqlite-helper
    image: keinos/sqlite3:3.51.3
    command: ["/bin/sh", "-c", "exec sleep infinity"]
    securityContext:
      runAsUser: 1001
      runAsGroup: 1001
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 1m
        memory: 8Mi
      limits:
        cpu: 100m
        memory: 32Mi
    volumeMounts:
      - name: vaultwarden-data
        mountPath: /data
