# May — homelab-common.apps + persistentVolumeClaims (pvc.yaml)
homelab-common:
  veleroSchedules:
    # CSI snapshot + Kopia (defaultVolumesToFsBackup=false на сервере).
    # SQLite WAL crash-consistent при snapshot всего PVC; sync hook
    # flush'ит OS dirty pages, чтобы -wal/-shm на диске были актуальны.
    - name: may-daily
      schedule: "35 2 * * *"
      template:
        hooks: &may_hooks
          resources:
            - name: sync-buffers
              includedResources: [pods]
              labelSelector:
                matchLabels:
                  app: may
              pre:
                - exec:
                    command: ["/bin/sh", "-c", "sync"]
                    onError: Continue
                    timeout: 30s
    # Independent off-site copy → OVH (BSL ovh-direct). Тир низкоценные: weekly, 30d.
    - name: may-offsite
      schedule: "0 4 * * 0"
      template:
        storageLocation: ovh-direct
        ttl: "720h0m0s"
        hooks: *may_hooks

  externalSecrets:
    - name: may-app-secrets
      vaultPath: may/app-secrets
      data:
        - secretKey: admin_password
          property: admin_password
        - secretKey: secret_key
          property: secret_key
      templateData:
        ADMIN_PASSWORD: "{{ .admin_password }}"
        SECRET_KEY: "{{ .secret_key }}"

  httpRoutes:
    - name: may
      hostname: may
      gateway: both
      service:
        name: may
        port: 5050

  persistentVolumeClaims:
    - name: may
      accessModes:
        - ReadWriteOnce
      storageClassName: longhorn
      size: 5Gi
      labels:
        app: may

  apps:
    - name: may
      deployment:
        metadata:
          labels:
            app: may
        spec:
          replicas: 1
          strategy:
            type: Recreate
          selector:
            matchLabels:
              app: may
          template:
            metadata:
              labels:
                app: may
            spec:
              # ndots:2 — pod resolv.conf defaults to ndots:5, so external names
              # with <5 dots burn 3-4 NXDOMAIN search-suffix lookups before the
              # real one. Cuts that tax for outbound calls.
              dnsConfig:
                options:
                  - name: ndots
                    value: "2"
              securityContext:
                fsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
              containers:
                - name: may
                  # renovate: image=ghcr.io/dannymcc/may
                  image: ghcr.io/dannymcc/may:0.23.0
                  imagePullPolicy: IfNotPresent
                  ports:
                    - name: http
                      containerPort: 5050
                      protocol: TCP
                  envFrom:
                    - secretRef:
                        name: may-app-secrets
                  resources:
                    limits:
                      cpu: 200m
                      memory: 350Mi
                    requests:
                      cpu: 15m
                      memory: 200Mi
                  volumeMounts:
                    - name: data
                      mountPath: /app/data
              volumes:
                - name: data
                  persistentVolumeClaim:
                    claimName: may
      service:
        metadata:
          labels:
            app: may
        spec:
          type: ClusterIP
          ports:
            - port: 5050
              targetPort: http
              protocol: TCP
              name: http
          selector:
            app: may
