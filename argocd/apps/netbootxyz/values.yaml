# netboot.xyz — self-hosted PXE boot server (iPXE menu + TFTP + HTTP assets).
# DHCP не поднимается в кластере: PXE-опции (next-server/filename) раздаёт роутер.
homelab-common:
  limitRange:
    enabled: true

  persistentVolumeClaims:
    - name: netbootxyz-config
      accessModes:
        - ReadWriteOnce
      storageClassName: longhorn
      size: 5Gi
      labels:
        app: netbootxyz
    - name: netbootxyz-assets
      accessModes:
        - ReadWriteOnce
      storageClassName: longhorn
      size: 20Gi
      labels:
        app: netbootxyz

  httpRoutes:
    - name: netbootxyz-web
      hostname: netboot
      gateway: internal
      service:
        name: netbootxyz-web
        port: 3000

  apps:
    # PXE-плоскость: Deployment + Service LoadBalancer (TFTP/UDP + HTTP assets/TCP)
    - name: netbootxyz
      deployment:
        metadata:
          labels:
            app: netbootxyz
        spec:
          replicas: 1
          strategy:
            type: Recreate
          selector:
            matchLabels:
              app: netbootxyz
          template:
            metadata:
              labels:
                app: netbootxyz
            spec:
              securityContext:
                fsGroup: 1000
              containers:
                - name: netbootxyz
                  image: lscr.io/linuxserver/netbootxyz:0.7.6
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: PUID
                      value: "1000"
                    - name: PGID
                      value: "1000"
                    - name: TZ
                      value: Europe/Berlin
                  ports:
                    - name: web
                      containerPort: 3000
                      protocol: TCP
                    - name: tftp
                      containerPort: 69
                      protocol: UDP
                    - name: assets
                      containerPort: 80
                      protocol: TCP
                  volumeMounts:
                    - name: config
                      mountPath: /config
                    - name: assets
                      mountPath: /assets
                  resources:
                    requests:
                      cpu: 50m
                      memory: 128Mi
                    limits:
                      cpu: 500m
                      memory: 512Mi
              volumes:
                - name: config
                  persistentVolumeClaim:
                    claimName: netbootxyz-config
                - name: assets
                  persistentVolumeClaim:
                    claimName: netbootxyz-assets
      service:
        metadata:
          labels:
            app: netbootxyz
        spec:
          type: LoadBalancer
          loadBalancerIP: 10.11.11.150
          externalTrafficPolicy: Local
          selector:
            app: netbootxyz
          ports:
            - name: tftp
              port: 69
              targetPort: tftp
              protocol: UDP
            - name: assets
              port: 80
              targetPort: assets
              protocol: TCP

    # WebUI-плоскость: только ClusterIP Service (тот же pod, отдельное имя для HTTPRoute)
    - name: web
      service:
        metadata:
          labels:
            app: netbootxyz
        spec:
          type: ClusterIP
          selector:
            app: netbootxyz
          ports:
            - name: web
              port: 3000
              targetPort: web
              protocol: TCP
