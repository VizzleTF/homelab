# Vane — privacy AI answering engine (Perplexica successor). Deployed via
# homelab-common (homelabOnly: true — upstream ships only a docker-compose).
#
# Image: the `slim` variant ships WITHOUT the embedded SearxNG + flask dev-server
# that the full image bundles — it expects an external SearxNG via SEARXNG_API_URL.
# We point it at the dedicated searxng app (argocd/apps/searxng).
#
# LLM provider = the in-cluster omniroute router (OpenAI-compatible). omniroute was
# made always-on (KEDA scale-to-zero removed) so this path has no cold-start. The
# provider (base URL http://omniroute.omniroute.svc.cluster.local:20128/v1, an
# omniroute API key, model) is configured in Vane's web UI and persisted to
# /home/vane/data/config.json — NOT via env, so no secret lives in git.
#
# Runs as root: the upstream image has no USER directive and writes to
# /home/vane/{data,uploads,.next}. App namespaces enforce PSA `privileged`, so this
# is allowed. Root also sidesteps the SQLite-after-Velero-restore ownership dance
# (CSI restore resets the PVC to root:root; root writes regardless).
#
# External exposure is protected by Cloudflare Access (Zero Trust) on
# vane.example.com — Vane itself has no built-in auth. The Access app is configured in
# the Cloudflare dashboard, not in this repo.
homelab-common:
  persistentVolumeClaims:
    # SQLite search history + config.json. RWO single-attach.
    # volumeName intentionally unpinned (PV name changes on every Velero restore;
    # a stale pin breaks the SSA dry-run — global ignoreDifferences masks it).
    - name: vane-data
      accessModes:
        - ReadWriteOnce
      storageClassName: longhorn
      size: 5Gi
      labels:
        app: vane

  apps:
    - name: vane
      service:
        metadata:
          labels:
            app: vane
        spec:
          selector:
            app: vane
          ports:
            - name: http
              port: 3000
              targetPort: 3000

      deployment:
        metadata:
          labels:
            app: vane
        spec:
          replicas: 1
          # RWO Longhorn PVC → single-node attach. RollingUpdate would keep the old
          # pod alive on another node during image bumps → Multi-Attach deadlock.
          # Recreate tears the old pod down first.
          strategy:
            type: Recreate
          selector:
            matchLabels:
              app: vane
          template:
            metadata:
              labels:
                app: vane
            spec:
              dnsConfig:
                options:
                  - name: ndots
                    value: "2"
              containers:
                - name: vane
                  # renovate: image=docker.io/itzcrazykns1337/vane
                  image: docker.io/itzcrazykns1337/vane:slim-v1.12.2
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: DATA_DIR
                      value: /home/vane
                    - name: SEARXNG_API_URL
                      value: http://searxng.searxng.svc.cluster.local:8080
                  ports:
                    - name: http
                      containerPort: 3000
                  livenessProbe:
                    httpGet:
                      path: /
                      port: 3000
                    initialDelaySeconds: 30
                    periodSeconds: 30
                    timeoutSeconds: 5
                  readinessProbe:
                    httpGet:
                      path: /
                      port: 3000
                    initialDelaySeconds: 15
                    periodSeconds: 10
                    timeoutSeconds: 5
                  resources:
                    requests:
                      cpu: 100m
                      memory: 256Mi
                    limits:
                      # headroom for the playwright/chromium spawned on media search
                      memory: 1Gi
                  volumeMounts:
                    - name: data
                      mountPath: /home/vane/data
                    - name: uploads
                      mountPath: /home/vane/uploads
              volumes:
                - name: data
                  persistentVolumeClaim:
                    claimName: vane-data
                - name: uploads
                  emptyDir: {}

  httpRoutes:
    # vane.example.com — external (Cloudflare tunnel). Auth enforced at the CF edge
    # via Cloudflare Access; Vane has no built-in auth.
    - name: vane
      hostname: vane
      gateway: external
      service:
        name: vane
        port: 3000

  veleroSchedules:
    # Snapshot the PVC directly — SQLite WAL keeps it crash-consistent, so no exec
    # hook needed (pod is always-on).
    - name: vane-daily
      schedule: "30 2 * * *"
      template:
        includedNamespaces: [vane]
