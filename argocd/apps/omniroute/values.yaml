homelab-common:
  veleroSchedules:
    # KEDA scale-to-zero (scaledownPeriod 6h): pod часто отсутствует ночью,
    # поэтому exec hook не задаём — CSI snapshot PVC напрямую, без pod.
    # SQLite WAL обеспечивает crash-consistency; на cold-start файл DB
    # уже flushed (Linux page cache очищается при scale-down → write).
    - name: omniroute-daily
      schedule: "45 2 * * *"
      template:
        includedNamespaces: [omniroute]
    # Independent off-site copy → OVH (BSL ovh-direct). Тир низкоценные: weekly, 30d.
    # Без hook (KEDA scale-to-zero, см. daily) — CSI snapshot PVC напрямую.
    - name: omniroute-offsite
      schedule: "5 4 * * 0"
      template:
        includedNamespaces: [omniroute]
        storageLocation: ovh-direct
        ttl: "720h0m0s"

  externalSecrets:
    - name: omniroute-app-secrets
      vaultPath: omniroute/app-secrets
      data:
        - secretKey: jwt_secret
          property: JWT_SECRET
        - secretKey: api_key_secret
          property: API_KEY_SECRET
        - secretKey: storage_encryption_key
          property: STORAGE_ENCRYPTION_KEY
        - secretKey: initial_password
          property: INITIAL_PASSWORD
      templateData:
        JWT_SECRET: "{{ .jwt_secret }}"
        API_KEY_SECRET: "{{ .api_key_secret }}"
        STORAGE_ENCRYPTION_KEY: "{{ .storage_encryption_key }}"
        INITIAL_PASSWORD: "{{ .initial_password }}"

  persistentVolumeClaims:
    - name: omniroute-data
      storageClassName: longhorn
      accessModes:
        - ReadWriteOnce
      size: 5Gi
      volumeName: pvc-150eeade-365f-465b-8076-6c136efeec5e

  httpRoutes:
    # KEDA-fronted scale-to-zero (см. argocd/apps/omniroute/manifests/httpscaledobject.yaml).
    # `kedaColdStartLoadingPage: true` (homelab-common >= 1.7.3) переключает backend
    # на keda-loading-proxy → во время cold-start пользователь видит "сервис запускается".
    # `service:` оставлен fallback для v1.7.2 (флаг игнорируется на старом чарте).
    # Cross-namespace backendRef требует ReferenceGrant в keda ns
    # (argocd/infra/keda-add-ons-http/manifests/referencegrant.yaml).
    - name: omniroute
      hostname: omniroute
      gateway: internal
      kedaColdStartLoadingPage: true
      service:
        name: keda-add-ons-http-interceptor-proxy
        namespace: keda
        port: 8080
    - name: omniroute-api
      hostname: omniroute
      gateway: external
      pathPrefix: /v1
      kedaColdStartLoadingPage: true
      service:
        name: keda-add-ons-http-interceptor-proxy
        namespace: keda
        port: 8080

  apps:
    - name: omniroute
      deployment:
        spec:
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: omniroute
          template:
            metadata:
              labels:
                app.kubernetes.io/name: omniroute
            spec:
              containers:
                - name: omniroute
                  # renovate: image=ghcr.io/diegosouzapw/omniroute
                  image: ghcr.io/diegosouzapw/omniroute:3.8.7
                  ports:
                    - containerPort: 20128
                  env:
                    - name: PORT
                      value: "20128"
                    - name: NODE_ENV
                      value: production
                    - name: DATA_DIR
                      value: /var/lib/omniroute
                    - name: STORAGE_DRIVER
                      value: sqlite
                    - name: BASE_URL
                      value: https://omniroute.example.com
                    - name: NEXT_PUBLIC_BASE_URL
                      value: https://omniroute.example.com
                    - name: AUTH_COOKIE_SECURE
                      value: "true"
                    - name: DISABLE_SQLITE_AUTO_BACKUP
                      value: "true"
                    - name: JWT_SECRET
                      valueFrom:
                        secretKeyRef:
                          name: omniroute-app-secrets
                          key: JWT_SECRET
                    - name: API_KEY_SECRET
                      valueFrom:
                        secretKeyRef:
                          name: omniroute-app-secrets
                          key: API_KEY_SECRET
                    - name: STORAGE_ENCRYPTION_KEY
                      valueFrom:
                        secretKeyRef:
                          name: omniroute-app-secrets
                          key: STORAGE_ENCRYPTION_KEY
                    - name: INITIAL_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: omniroute-app-secrets
                          key: INITIAL_PASSWORD
                  volumeMounts:
                    - name: data
                      mountPath: /var/lib/omniroute
                  livenessProbe:
                    httpGet:
                      path: /
                      port: 20128
                    initialDelaySeconds: 30
                    periodSeconds: 30
                  readinessProbe:
                    httpGet:
                      path: /
                      port: 20128
                    initialDelaySeconds: 15
                    periodSeconds: 10
                  resources:
                    requests:
                      cpu: 50m
                      memory: 256Mi
                    limits:
                      cpu: 500m
                      memory: 512Mi
              volumes:
                - name: data
                  persistentVolumeClaim:
                    claimName: omniroute-data
      service:
        spec:
          selector:
            app.kubernetes.io/name: omniroute
          ports:
            - port: 20128
              targetPort: 20128
              protocol: TCP
          type: ClusterIP
