homelab-common:
  veleroSchedules:
    # exec hook не задаём — CSI snapshot PVC напрямую. SQLite WAL обеспечивает
    # crash-consistency, snapshot живого DB безопасен (rollback к последней
    # checkpoint при recovery).
    - name: omniroute-daily
      schedule: "45 2 * * *"
      template:
        includedNamespaces: [omniroute]
    # Independent off-site copy → OVH (BSL ovh-direct). Тир низкоценные: weekly, 30d.
    - name: omniroute-offsite
      schedule: "5 4 * * 0"
      template:
        includedNamespaces: [omniroute]
        storageLocation: ovh-direct
        ttl: "720h0m0s"

  externalSecrets:
    - name: omniroute-app-secrets
      vaultPath: omniroute/app-secrets
      data:
        - secretKey: jwt_secret
          property: JWT_SECRET
        - secretKey: api_key_secret
          property: API_KEY_SECRET
        - secretKey: storage_encryption_key
          property: STORAGE_ENCRYPTION_KEY
        - secretKey: initial_password
          property: INITIAL_PASSWORD
      templateData:
        JWT_SECRET: "{{ .jwt_secret }}"
        API_KEY_SECRET: "{{ .api_key_secret }}"
        STORAGE_ENCRYPTION_KEY: "{{ .storage_encryption_key }}"
        INITIAL_PASSWORD: "{{ .initial_password }}"

  persistentVolumeClaims:
    - name: omniroute-data
      storageClassName: longhorn
      accessModes:
        - ReadWriteOnce
      size: 5Gi
      # volumeName intentionally unpinned — the PV changes on every Velero restore;
      # a stale pin makes the SSA dry-run reject the immutable field, breaking diff
      # (SYNC=Unknown). The global ignoreDifferences._PersistentVolumeClaim masks the
      # live volumeName instead. See reference_argocd_pvc_volumename_drift.

  httpRoutes:
    # Always-on (KEDA scale-to-zero убран — omniroute теперь LLM-backend для Vane,
    # cold-start неприемлем). Routes бьют напрямую в omniroute svc :20128.
    - name: omniroute
      hostname: omniroute
      gateway: internal
      service:
        name: omniroute
        port: 20128
    - name: omniroute-api
      hostname: omniroute
      gateway: external
      pathPrefix: /v1
      service:
        name: omniroute
        port: 20128

  apps:
    - name: omniroute
      deployment:
        spec:
          replicas: 1
          # RWO Longhorn PVC (omniroute-data) → single-node attach. Default
          # RollingUpdate keeps the old pod alive on another node during image
          # bumps → new pod gets "Multi-Attach error" and hangs forever. Recreate
          # tears down the old pod first so the new one can attach the volume.
          strategy:
            type: Recreate
          selector:
            matchLabels:
              app.kubernetes.io/name: omniroute
          template:
            metadata:
              labels:
                app.kubernetes.io/name: omniroute
            spec:
              # ndots:2 — pod resolv.conf defaults to ndots:5, so external names
              # with <5 dots burn 3-4 NXDOMAIN search-suffix lookups before the
              # real one. Cuts that tax for outbound calls.
              dnsConfig:
                options:
                  - name: ndots
                    value: "2"
              # Image runs as node(1000). Velero CSI restore resets PVC files to
              # root:root → SQLite "attempt to write a readonly database". fsGroup
              # chgrp's the volume to 1000 + g+rw so node can write; survives future restores.
              securityContext:
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
              containers:
                - name: omniroute
                  # renovate: image=ghcr.io/diegosouzapw/omniroute
                  image: ghcr.io/diegosouzapw/omniroute:3.8.32
                  ports:
                    - containerPort: 20128
                  env:
                    - name: PORT
                      value: "20128"
                    - name: NODE_ENV
                      value: production
                    - name: DATA_DIR
                      value: /var/lib/omniroute
                    - name: STORAGE_DRIVER
                      value: sqlite
                    - name: BASE_URL
                      value: https://omniroute.example.com
                    - name: NEXT_PUBLIC_BASE_URL
                      value: https://omniroute.example.com
                    - name: AUTH_COOKIE_SECURE
                      value: "true"
                    - name: DISABLE_SQLITE_AUTO_BACKUP
                      value: "true"
                    - name: JWT_SECRET
                      valueFrom:
                        secretKeyRef:
                          name: omniroute-app-secrets
                          key: JWT_SECRET
                    - name: API_KEY_SECRET
                      valueFrom:
                        secretKeyRef:
                          name: omniroute-app-secrets
                          key: API_KEY_SECRET
                    - name: STORAGE_ENCRYPTION_KEY
                      valueFrom:
                        secretKeyRef:
                          name: omniroute-app-secrets
                          key: STORAGE_ENCRYPTION_KEY
                    - name: INITIAL_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: omniroute-app-secrets
                          key: INITIAL_PASSWORD
                  volumeMounts:
                    - name: data
                      mountPath: /var/lib/omniroute
                  livenessProbe:
                    httpGet:
                      path: /
                      port: 20128
                    initialDelaySeconds: 30
                    periodSeconds: 30
                  readinessProbe:
                    httpGet:
                      path: /
                      port: 20128
                    initialDelaySeconds: 15
                    periodSeconds: 10
                  resources:
                    requests:
                      cpu: 50m
                      memory: 256Mi
                    limits:
                      cpu: 500m
                      memory: 512Mi
              volumes:
                - name: data
                  persistentVolumeClaim:
                    claimName: omniroute-data
      service:
        spec:
          selector:
            app.kubernetes.io/name: omniroute
          ports:
            - port: 20128
              targetPort: 20128
              protocol: TCP
          type: ClusterIP
