# homelab-common для forgejo-runner — параллельный source ApplicationSet.
# Сам chart-овский deployment живёт в forgejo-runner.yaml (отдельный source чарта).
# Размещается в namespace forgejo рядом с серверным подом.

homelab-common:
  externalSecrets:
    # Init-secret для register job: env-vars CONFIG_TOKEN, CONFIG_INSTANCE, CONFIG_NAME.
    # Vault path: home/homelab/k8s/forgejo/runner с ключами token, instance, name.
    # PreSync hook + sync-wave -10 — синкается ДО chart-овского pre-install Job (wave 0).
    # deletionPolicy: Retain — k8s Secret переживает delete-recreate цикл ES при rerun хуков.
    - name: forgejo-runner-init
      annotations:
        argocd.argoproj.io/hook: PreSync
        argocd.argoproj.io/sync-wave: "-10"
      deletionPolicy: Retain
      vaultPath: forgejo/runner
      data:
        - secretKey: token
          property: token
        - secretKey: instance
          property: instance
        - secretKey: name
          property: name
      templateData:
        CONFIG_TOKEN: "{{ .token }}"
        CONFIG_INSTANCE: "{{ .instance }}"
        CONFIG_NAME: "{{ .name }}"
