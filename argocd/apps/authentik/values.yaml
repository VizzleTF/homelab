homelab-common:
  authentikBlueprints:
    - name: authentik-blueprint-grafana
      namespace: authentik
      enabled: true
      blueprints:
        # Blueprint 1: create groups scope mapping first (no dependencies)
        01-grafana-scope.yaml: |
          version: 1
          metadata:
            name: Grafana OIDC - Groups Scope
          entries:
            - model: authentik_providers_oauth2.scopemapping
              identifiers:
                name: "OAuth Mapping: OpenID 'groups' (Grafana)"
              attrs:
                name: "OAuth Mapping: OpenID 'groups' (Grafana)"
                scope_name: groups
                description: "Group memberships for role-based access"
                expression: "return list(request.user.ak_groups.values_list('name', flat=True))"

        # Blueprint 2: create provider + app (references scope via !Find, runs after 01-)
        02-grafana-oidc.yaml: |
          version: 1
          metadata:
            name: Grafana OIDC Integration
          entries:
            # OAuth2/OIDC Provider for Grafana
            - model: authentik_providers_oauth2.oauth2provider
              identifiers:
                name: Grafana OIDC
              attrs:
                name: Grafana OIDC
                client_type: confidential
                client_id: grafana
                client_secret: !Env GRAFANA_OIDC_CLIENT_SECRET
                authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
                redirect_uris:
                  - matching_mode: strict
                    url: https://grafana.example.com/login/generic_oauth
                signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
                property_mappings:
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
                  - !Find [authentik_providers_oauth2.scopemapping, [name, "OAuth Mapping: OpenID 'groups' (Grafana)"]]

            # Application for Grafana
            - model: authentik_core.application
              identifiers:
                slug: grafana
              attrs:
                name: Grafana
                slug: grafana
                provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Grafana OIDC]]
                launch_url: https://grafana.example.com
                open_in_new_tab: true
                meta_icon: https://grafana.com/static/assets/img/fav32.png
                meta_description: Monitoring and observability platform
                policy_engine_mode: any

    - name: authentik-blueprint-immich
      namespace: authentik
      enabled: true
      blueprints:
        # Blueprint 1: create groups scope mapping first (no dependencies)
        01-immich-scope.yaml: |
          version: 1
          metadata:
            name: Immich OIDC - Groups Scope
          entries:
            - model: authentik_providers_oauth2.scopemapping
              identifiers:
                name: "OAuth Mapping: OpenID 'groups' (Immich)"
              attrs:
                name: "OAuth Mapping: OpenID 'groups' (Immich)"
                scope_name: groups
                description: "Group memberships"
                expression: "return list(request.user.ak_groups.values_list('name', flat=True))"

        # Blueprint 2: create provider + app (references scope via !Find, runs after 01-)
        02-immich-oidc.yaml: |
          version: 1
          metadata:
            name: Immich OIDC Integration
          entries:
            - model: authentik_providers_oauth2.oauth2provider
              identifiers:
                name: Immich OIDC
              attrs:
                name: Immich OIDC
                client_type: confidential
                client_id: immich
                client_secret: !Env IMMICH_OIDC_CLIENT_SECRET
                authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
                redirect_uris:
                  - matching_mode: strict
                    url: https://immich.example.com/auth/login
                signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
                property_mappings:
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
                  - !Find [authentik_providers_oauth2.scopemapping, [name, "OAuth Mapping: OpenID 'groups' (Immich)"]]

            - model: authentik_core.application
              identifiers:
                slug: immich
              attrs:
                name: Immich
                slug: immich
                provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Immich OIDC]]
                launch_url: https://immich.example.com
                open_in_new_tab: true
                meta_description: Self-hosted photo and video backup
                policy_engine_mode: any

    - name: authentik-blueprint-nextcloud
      namespace: authentik
      enabled: true
      blueprints:
        # Blueprint 1: create groups scope mapping first (no dependencies)
        01-nextcloud-scope.yaml: |
          version: 1
          metadata:
            name: Nextcloud OIDC - Groups Scope
          entries:
            - model: authentik_providers_oauth2.scopemapping
              identifiers:
                name: "OAuth Mapping: OpenID 'groups' (Nextcloud)"
              attrs:
                name: "OAuth Mapping: OpenID 'groups' (Nextcloud)"
                scope_name: groups
                description: "Group memberships"
                expression: "return list(request.user.ak_groups.values_list('name', flat=True))"

        # Blueprint 2: create provider + app (references scope via !Find, runs after 01-)
        02-nextcloud-oidc.yaml: |
          version: 1
          metadata:
            name: Nextcloud OIDC Integration
          entries:
            - model: authentik_providers_oauth2.oauth2provider
              identifiers:
                name: Nextcloud OIDC
              attrs:
                name: Nextcloud OIDC
                client_type: confidential
                client_id: nextcloud
                client_secret: !Env NEXTCLOUD_OIDC_CLIENT_SECRET
                authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
                redirect_uris:
                  - matching_mode: strict
                    url: https://nc.example.com/apps/user_oidc/code
                signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
                property_mappings:
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
                  - !Find [authentik_providers_oauth2.scopemapping, [name, "OAuth Mapping: OpenID 'groups' (Nextcloud)"]]

            - model: authentik_core.application
              identifiers:
                slug: nextcloud
              attrs:
                name: Nextcloud
                slug: nextcloud
                provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Nextcloud OIDC]]
                launch_url: https://nc.example.com
                open_in_new_tab: true
                meta_description: Self-hosted cloud storage
                policy_engine_mode: any

    - name: authentik-blueprint-argocd
      namespace: authentik
      enabled: true
      blueprints:
        # Blueprint 0: create groups and assign members (no dependencies)
        00-argocd-groups.yaml: |
          version: 1
          metadata:
            name: ArgoCD Groups
          entries:
            - model: authentik_core.group
              identifiers:
                name: "ArgoCD Admins"
              attrs:
                name: "ArgoCD Admins"
                users:
                  - !Find [authentik_core.user, [username, vizzle]]

        # Blueprint 1: create groups scope mapping first (no dependencies)
        01-argocd-scope.yaml: |
          version: 1
          metadata:
            name: ArgoCD OIDC - Groups Scope
          entries:
            - model: authentik_providers_oauth2.scopemapping
              identifiers:
                name: "OAuth Mapping: OpenID 'groups' (ArgoCD)"
              attrs:
                name: "OAuth Mapping: OpenID 'groups' (ArgoCD)"
                scope_name: groups
                description: "Group memberships for role-based access"
                expression: "return list(request.user.ak_groups.values_list('name', flat=True))"

        # Blueprint 2: create provider + app (references scope via !Find, runs after 01-)
        02-argocd-oidc.yaml: |
          version: 1
          metadata:
            name: ArgoCD OIDC Integration
          entries:
            - model: authentik_providers_oauth2.oauth2provider
              identifiers:
                name: ArgoCD OIDC
              attrs:
                name: ArgoCD OIDC
                client_type: confidential
                client_id: argocd
                client_secret: !Env ARGOCD_OIDC_CLIENT_SECRET
                authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
                redirect_uris:
                  - matching_mode: strict
                    url: https://argocd.example.com/auth/callback
                signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
                property_mappings:
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
                  - !Find [authentik_providers_oauth2.scopemapping, [name, "OAuth Mapping: OpenID 'groups' (ArgoCD)"]]

            - model: authentik_core.application
              identifiers:
                slug: argocd
              attrs:
                name: ArgoCD
                slug: argocd
                provider: !Find [authentik_providers_oauth2.oauth2provider, [name, ArgoCD OIDC]]
                launch_url: https://argocd.example.com
                open_in_new_tab: true
                meta_description: GitOps continuous delivery
                policy_engine_mode: any

    - name: authentik-blueprint-trek
      namespace: authentik
      enabled: true
      blueprints:
        02-trek-oidc.yaml: |
          version: 1
          metadata:
            name: TREK OIDC Integration
          entries:
            - model: authentik_providers_oauth2.oauth2provider
              identifiers:
                name: TREK OIDC
              attrs:
                name: TREK OIDC
                client_type: confidential
                client_id: trek
                client_secret: !Env TREK_OIDC_CLIENT_SECRET
                # authentik 2026.5.x: grant_types defaults to [] when created via blueprint
                # → "Invalid grant_type for provider" / invalid_request. Must set explicitly.
                grant_types:
                  - authorization_code
                  - refresh_token
                authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
                redirect_uris:
                  - matching_mode: strict
                    url: https://trek.example.com/api/auth/oidc/callback
                signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
                property_mappings:
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]

            - model: authentik_core.application
              identifiers:
                slug: trek
              attrs:
                name: TREK
                slug: trek
                provider: !Find [authentik_providers_oauth2.oauth2provider, [name, TREK OIDC]]
                launch_url: https://trek.example.com
                open_in_new_tab: true
                meta_description: Collaborative travel planner
                policy_engine_mode: any

  externalSecrets:
    # Config secret for authentik (referenced via existingSecret.secretName)
    - name: authentik-config
      vaultPath: authentik/authentik
      data:
        - secretKey: secret_key
          property: secret_key
        - secretKey: db_password
          property: db_password
        - secretKey: grafana_oidc_client_secret
          property: grafana_oidc_client_secret
        - secretKey: argocd_oidc_client_secret
          property: argocd_oidc_client_secret
        - secretKey: immich_oidc_client_secret
          property: immich_oidc_client_secret
        - secretKey: nextcloud_oidc_client_secret
          property: nextcloud_oidc_client_secret
        - secretKey: forgejo_oidc_client_secret
          property: forgejo_oidc_client_secret
        - secretKey: velero_ui_oidc_client_secret
          property: velero_ui_oidc_client_secret
        - secretKey: trek_oidc_client_secret
          property: trek_oidc_client_secret
      templateData:
        AUTHENTIK_SECRET_KEY: "{{ .secret_key }}"
        # Via PgBouncer (transaction pooling) — see argocd/apps/cnpg/manifests/pooler.yaml.
        # USE_PGBOUNCER disables server-side cursors (incompatible with transaction mode).
        AUTHENTIK_POSTGRESQL__HOST: "cnpg-cluster-pooler-rw.cnpg.svc.cluster.local"
        AUTHENTIK_POSTGRESQL__USE_PGBOUNCER: "true"
        AUTHENTIK_POSTGRESQL__USER: "authentik"
        AUTHENTIK_POSTGRESQL__NAME: "authentik"
        AUTHENTIK_POSTGRESQL__PASSWORD: "{{ .db_password }}"
        AUTHENTIK_REDIS__HOST: "valkey-primary.valkey.svc.cluster.local"
        AUTHENTIK_COOKIE_DOMAIN: "example.com"
        AUTHENTIK_LISTEN__TRUSTED_PROXY_CIDRS: "0.0.0.0/0"
        AUTHENTIK_SERVER__FROM_HEADER: "true"
        GRAFANA_OIDC_CLIENT_SECRET: "{{ .grafana_oidc_client_secret }}"
        ARGOCD_OIDC_CLIENT_SECRET: "{{ .argocd_oidc_client_secret }}"
        IMMICH_OIDC_CLIENT_SECRET: "{{ .immich_oidc_client_secret }}"
        NEXTCLOUD_OIDC_CLIENT_SECRET: "{{ .nextcloud_oidc_client_secret }}"
        FORGEJO_OIDC_CLIENT_SECRET: "{{ .forgejo_oidc_client_secret }}"
        VELERO_UI_OIDC_CLIENT_SECRET: "{{ .velero_ui_oidc_client_secret }}"
        TREK_OIDC_CLIENT_SECRET: "{{ .trek_oidc_client_secret }}"


    # DB credentials secret for CNPG cluster bootstrap
    - name: authentik-db-credentials
      vaultPath: authentik/authentik
      data:
        - secretKey: db_password
          property: db_password
      templateData:
        username: "authentik"
        password: "{{ .db_password }}"

    - name: cnpg-s3-backup
      vaultPath: shared/s3-cnpg-backup
      data:
        - secretKey: ACCESS_KEY_ID
          property: ACCESS_KEY_ID
        - secretKey: ACCESS_SECRET_KEY
          property: ACCESS_SECRET_KEY


  httpRoutes:
    - name: authentik
      hostname: authentik
      gateway: external
      service:
        name: authentik-server
        port: 80
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https

# Use our ExternalSecret instead of chart-generated config secret
authentik:
  existingSecret:
    secretName: "authentik-config"

server:
  # Live usage ~32m/442Mi; memory sits close to the chart's suggested 512Mi.
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # Chart defaults (timeout 3s, threshold 3) kill the pod after 30s of GC/load
  # stalls — source of the recurring restarts + gateway 502s.
  livenessProbe:
    timeoutSeconds: 5
    failureThreshold: 5
  readinessProbe:
    timeoutSeconds: 5
    failureThreshold: 5

worker:
  # Live usage ~97m/370Mi.
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# Mount blueprints ConfigMaps (top-level chart setting, not under authentik:)
blueprints:
  configMaps:
    - authentik-blueprint-grafana
    - authentik-blueprint-argocd
    - authentik-blueprint-immich
    - authentik-blueprint-nextcloud
    - authentik-blueprint-forgejo
    - authentik-blueprint-velero-ui
    - authentik-blueprint-trek

global:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  # Rollout server+worker when ESO patches `authentik-config` (new
  # *_OIDC_CLIENT_SECRET entry added by scaffolding-authentik-oidc skill).
  # Without this, freshly-added blueprints fail !Env resolution silently.
  # Watched by stakater/reloader (argocd/infra/reloader).
  deploymentAnnotations:
    secret.reloader.stakater.com/reload: "authentik-config"
