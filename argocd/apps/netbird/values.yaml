# NetBird routing peer — joins self-hosted mesh at netbird.example.com,
# advertises home LAN subnets (10.11.11.0/24, 10.11.12.0/24) into NetBird.
# Routes themselves are configured in NetBird dashboard → Network Routes.
homelab-common:
  # netbird-peer PVC (100Mi) = identity /etc/netbird. Без бэкапа потеря = re-enroll
  # peer + пере-выдача routes (10.11.11/24, 10.11.12/24) в dashboard. Бэкапим.
  # Без exec-hook: identity-файлы статичны, CSI snapshot crash-consistent достаточно.
  veleroSchedules:
    - name: netbird-daily
      schedule: "20 2 * * *"
      template:
        includedNamespaces: [netbird]
    # Independent off-site copy → OVH (BSL ovh-direct). Тир низкоценные: weekly, 90d
    # (identity мелкая, держим дольше).
    - name: netbird-offsite
      schedule: "20 4 * * 0"
      template:
        includedNamespaces: [netbird]
        storageLocation: ovh-direct
        ttl: "2160h0m0s"

  externalSecrets:
    - name: netbird-peer
      vaultPath: netbird/peer
      data:
        - secretKey: setup-key
          property: setup-key
      templateData:
        NB_SETUP_KEY: '{{ index . "setup-key" }}'

  persistentVolumeClaims:
    - name: netbird-peer
      accessModes:
        - ReadWriteOnce
      storageClassName: longhorn
      size: 100Mi
      labels:
        app: netbird-peer

  apps:
    - name: peer
      deployment:
        metadata:
          labels:
            app: netbird-peer
        spec:
          replicas: 1
          strategy:
            type: Recreate
          selector:
            matchLabels:
              app: netbird-peer
          template:
            metadata:
              labels:
                app: netbird-peer
            spec:
              containers:
                - name: netbird
                  # renovate: image=netbirdio/netbird
                  image: netbirdio/netbird:0.72.2
                  imagePullPolicy: IfNotPresent
                  securityContext:
                    capabilities:
                      add:
                        - NET_ADMIN
                        - NET_RAW
                        - SYS_ADMIN
                        - SYS_RESOURCE
                  env:
                    - name: NB_MANAGEMENT_URL
                      value: "https://netbird.example.com"
                    - name: NB_ADMIN_URL
                      value: "https://netbird.example.com"
                    - name: NB_HOSTNAME
                      value: "k8s-homelab-peer"
                    - name: NB_LOG_LEVEL
                      value: "info"
                  envFrom:
                    - secretRef:
                        name: netbird-peer
                  resources:
                    limits:
                      cpu: 500m
                      memory: 256Mi
                    requests:
                      cpu: 30m
                      memory: 64Mi
                  volumeMounts:
                    - name: tun
                      mountPath: /dev/net/tun
                    - name: state
                      mountPath: /etc/netbird
              volumes:
                - name: tun
                  hostPath:
                    path: /dev/net/tun
                    type: CharDevice
                - name: state
                  persistentVolumeClaim:
                    claimName: netbird-peer
