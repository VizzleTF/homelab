---
# Tiny always-on nginx that fronts the KEDA HTTP add-on interceptor.
# Renders a Russian loading page during cold-start (interceptor holds requests
# for up to responseHeaderTimeout=120s; without this proxy the browser sits
# on a blank tab the entire time).
# Traffic: HTTPRoute → keda-loading-proxy:8080 → interceptor → app.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keda-loading-proxy
  namespace: keda
  labels:
    app.kubernetes.io/name: keda-loading-proxy
    app.kubernetes.io/part-of: infrastructure
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: keda-loading-proxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keda-loading-proxy
      annotations:
        # Roll the pods when the ConfigMap changes.
        checksum/config: keda-loading-proxy-config
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: keda-loading-proxy
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /__health__
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /__health__
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: html
              mountPath: /var/www/loading.html
              subPath: loading.html
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
      volumes:
        - name: config
          configMap:
            name: keda-loading-proxy-config
            items:
              - key: nginx.conf
                path: nginx.conf
        - name: html
          configMap:
            name: keda-loading-proxy-config
            items:
              - key: loading.html
                path: loading.html
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
        - name: cache
          emptyDir:
            sizeLimit: 32Mi
