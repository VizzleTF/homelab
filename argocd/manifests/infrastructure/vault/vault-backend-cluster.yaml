apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend-cluster
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "home"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "homelab-universal"
          serviceAccountRef:
            name: "vault-auth"
            namespace: "vault"
