---
# StorageClass с авто-подключением к RecurringJob "backup-daily".
# Любой PVC с storageClassName=longhorn-backup получает бэкап на Garage S3 каждые сутки.
# Новое приложение → в values ставим `persistence.storageClass: longhorn-backup` и всё.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-backup
  annotations:
    # SC.parameters immutable в K8s — добавление полей требует delete+recreate.
    argocd.argoproj.io/sync-options: Replace=true
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "2"
  staleReplicaTimeout: "2880"
  fromBackup: ""
  fsType: "ext4"
  replicaAutoBalance: "best-effort"
  # При provisioning'е Longhorn навесит на Volume label
  # recurring-job-group.longhorn.io/backup-daily=enabled
  recurringJobSelector: '[{"name":"backup-daily","isGroup":true}]'
