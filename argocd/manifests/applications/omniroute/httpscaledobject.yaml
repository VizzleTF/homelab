---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: omniroute
  namespace: omniroute
spec:
  hosts:
    - omniroute.example.com
  scaleTargetRef:
    name: omniroute
    kind: Deployment
    apiVersion: apps/v1
    service: omniroute
    port: 20128
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 21600  # 6h без запросов → scale to 0
  scalingMetric:
    requestRate:
      granularity: 1s
      targetValue: 100
      window: 1m
