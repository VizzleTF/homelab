storage:
  data: 
    name: "vaultwarden-data"
    size: "2Gi"
    class: "longhorn"
    accessMode: "ReadWriteMany"
    # keepPvc: false

domain: "https://pass.internal.example"

ingress:
  enabled: true
  hostname: "pass.internal.example"
  class: "nginx"
  tlsSecret: vw-tls
  additionalAnnotations: 
    cert-manager.io/cluster-issuer: cloudflare-issuer