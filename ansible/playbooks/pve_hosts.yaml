---
# Полный harden Proxmox-хостов. Runbook: docs/pve-hardening.md.
# Доступ к хостам — только root по SSH-ключу (ключ раскатан через cloud-init/ручную установку).
# Порядок ролей намеренный:
#   1. ssh_harden  — затягиваем sshd (handler перезапустит в конце play)
#   2. sysctl      — безопасные сетевые параметры (независимо от остального)
#   3. fail2ban    — подключаем защиту от brute-force
#   4. firewall    — последним: если что-то сломается, SSH ещё открыт
- name: Proxmox hosts hardening
  hosts: pve
  become: true
  gather_facts: true
  roles:
    - role: pve_ssh_harden
      tags: [ssh]
    - role: pve_sysctl
      tags: [sysctl]
    - role: pve_fail2ban
      tags: [fail2ban]
    - role: pve_firewall
      tags: [firewall]
