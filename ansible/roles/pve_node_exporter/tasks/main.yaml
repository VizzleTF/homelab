---
# prometheus-node-exporter на PVE-хостах. Используется только для hwmon-метрик
# (CPU coretemp, NVMe Composite) — алерты на перегрев.
# Все остальные коллекторы выключены, чтобы не плодить cardinality в VictoriaMetrics
# (CPU/disk/net уже скрейпятся pve-exporter'ом через Proxmox API).
- name: Install prometheus-node-exporter package
  ansible.builtin.apt:
    name: prometheus-node-exporter
    state: present
    update_cache: true
    cache_valid_time: 3600

# Дроп-ин override на штатный systemd-юнит. ARGS в /etc/default/... игнорируется
# юнитом из пакета (он хардкодит ExecStart), поэтому переопределяем напрямую.
- name: Ensure systemd drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/prometheus-node-exporter.service.d
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Deploy systemd override (only hwmon collector)
  ansible.builtin.copy:
    dest: /etc/systemd/system/prometheus-node-exporter.service.d/override.conf
    mode: "0644"
    owner: root
    group: root
    content: |
      # Managed by Ansible (roles/pve_node_exporter).
      [Service]
      ExecStart=
      ExecStart=/usr/bin/prometheus-node-exporter \
        --collector.disable-defaults \
        --collector.hwmon \
        --web.listen-address=:9100
  notify: Restart prometheus-node-exporter

- name: Enable and start prometheus-node-exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    state: started
    enabled: true
    daemon_reload: true
