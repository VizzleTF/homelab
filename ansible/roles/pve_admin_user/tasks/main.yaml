---
# На голом Proxmox VE пакета sudo нет — образ Debian-minimal + pveum для привилегий.
# Устанавливаем, раз уж заводим linux-админа с NOPASSWD-sudo.
- name: Ensure sudo is installed
  ansible.builtin.apt:
    name: sudo
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure linux admin group exists
  ansible.builtin.group:
    name: "{{ admin_user }}"
    state: present

- name: Ensure linux admin user exists
  ansible.builtin.user:
    name: "{{ admin_user }}"
    group: "{{ admin_user }}"
    groups: "{{ admin_groups }}"
    append: true
    shell: /bin/bash
    create_home: true
    state: present

- name: Deploy admin SSH pubkey
  ansible.posix.authorized_key:
    user: "{{ admin_user }}"
    key: "{{ admin_ssh_pubkey }}"
    state: present
    exclusive: false
    # `path` делаем явным — иначе authorized_key в --check падает, если пользователь
    # ещё не создан в рамках этого же прогона (модуль не умеет "предположить" home).
    path: "/home/{{ admin_user }}/.ssh/authorized_keys"
    manage_dir: true

- name: Grant passwordless sudo to admin
  ansible.builtin.copy:
    dest: /etc/sudoers.d/50-{{ admin_user }}
    mode: "0440"
    owner: root
    group: root
    content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
    validate: /usr/sbin/visudo -cf %s

- name: Check whether PVE realm user already exists
  ansible.builtin.command: pveum user list --output-format json
  register: pveum_users
  changed_when: false
  check_mode: false

- name: Parse PVE user list
  ansible.builtin.set_fact:
    pve_admin_exists: "{{ (pveum_users.stdout | from_json) | selectattr('userid', 'equalto', admin_user ~ '@pam') | list | length > 0 }}"

- name: Create PVE realm user admin@pam
  ansible.builtin.command: pveum user add {{ admin_user }}@pam --comment "Homelab admin (managed by Ansible)"
  when: not pve_admin_exists

- name: Check current ACL for admin@pam on /
  ansible.builtin.command: pveum acl list --output-format json
  register: pveum_acl_list
  changed_when: false
  check_mode: false

- name: Grant Administrator role to admin@pam on /
  ansible.builtin.command: pveum acl modify / --users {{ admin_user }}@pam --roles Administrator
  when: >
    (pveum_acl_list.stdout | from_json)
    | selectattr('path', 'equalto', '/')
    | selectattr('ugid', 'equalto', admin_user ~ '@pam')
    | selectattr('roleid', 'equalto', 'Administrator')
    | list | length == 0
