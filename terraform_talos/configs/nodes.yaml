cluster:
  name: homelab
  vip: 10.11.11.100
  gateway: 10.11.11.1
  apiserver_cert_sans:
    - api.k8s.example.com
  kubernetes_version: v1.36.1
  talos_version: v1.13
  talos_release: v1.13.2

# Bare-metal Talos nodes. To add a node: power it on with a Talos factory
# ISO, confirm `talosctl --insecure -e <ip> -n <ip> version` answers, then
# add an entry here and run `terraform apply`. See provisioning-talos-node
# skill for the full flow.
nodes:
  talos-cp-01:
    enabled: true
    address: 10.11.11.101/24
    role: controlplane
    install_disk: /dev/sda
  talos-cp-02:
    enabled: true
    address: 10.11.11.102/24
    role: controlplane
    install_disk: /dev/sda
  talos-cp-03:
    enabled: true
    address: 10.11.11.103/24
    role: controlplane
    install_disk: /dev/sda
