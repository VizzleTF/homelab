# Pinned CLI toolchain for the homelab repo.
# Single source of truth for "what tool versions does this repo expect".
# Renovate's native `mise` manager bumps these (datasource auto-resolved per tool).
# `scripts/kubeconform-validate.sh` (and CI) read the kubeconform pin from here.
[tools]
helm = "3.16.4"          # keep in sync with .forgejo/workflows/ci.yaml helm install
kubectl = "1.36.2"       # match cluster k8s version
talosctl = "1.13.5"
kubeconform = "0.8.0"
task = "3.51.1"
jq = "1.7.1"
yamllint = "1.35.1"
gitleaks = "8.30.1"      # keep in sync with .forgejo/workflows/ci.yaml gitleaks install
